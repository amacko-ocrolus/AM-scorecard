const calls=[
{id:1,rep:"sam",title:"HMA X Ocrolus",prospect:"Amy (Consultant)",date:"Tue 3/10",dur:"44m",type:"Demo",stage:"Pricing",s:{r:8,d:9,v:9,a:9,c:8,e:9},w:8.55,tr:46,m:{M:1,E:1,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Steph's transparency built trust","Amy volunteered ROI argument","Pricing + follow-up booked on call"],opp:["Probe partner approval deeper","Ask about competition"],q:"I'll give you a 1-day turn if you use the tool.",coach:"This was Sam's best call of the week and a textbook example of what Gap Selling calls impact identification. When Amy described the current 5-day turn times and 3 overstaffed intake employees, Sam and Steph connected that pain directly to the automated future state. What made this call work is that the MEDDPICC elements surfaced organically through genuine conversation — Amy volunteered the ROI argument, asked for pricing, and described the approval process without being interrogated. That is the goal: qualification that feels like dialogue, not a checklist. Savvy buyers like Amy can tell when a rep is running through a framework, and the reason this call scored so well is that it never felt formulaic. The one area to push further: Amy mentioned partners need to approve, and a stronger follow-up would be 'Walk me through how partner approval typically works — who weighs in, and what does their timeline look like?'",url:"https://us-29990.app.gong.io/call?id=244902142835132322"},
{id:2,rep:"sam",title:"Superior Natl Bank POV",prospect:"Bill, Nicole, Denise",date:"Tue 3/10",dur:"25m",type:"POV Check-in",stage:"Testing",s:{r:7,d:7,v:8,a:7,c:8,e:8},w:7.60,tr:55,m:{M:0,E:0,DC:0,DP:1,IP:1,Ch:1,Co:0},str:["Nicole validated self-employed calcs","Transparent union borrower handling"],opp:["Quantify ROI from errors found","Probe AI policy timeline"],q:"The ones I found appeared to be accurate.",coach:"For a mid-stage POV check-in, Sam appropriately focused on Pain validation and Champion building — Nicole confirmed the accuracy, and that is meaningful progress. A check-in call should feel like a genuine conversation about results, not a qualification exercise. Trying to force Metrics, Economic Buyer, and Competition into a 25-minute POV review would feel transactional to experienced operators like Nicole and Bill — and would undermine the trust Sam has built. Where Sam can naturally deepen the conversation is converting Nicole's validation into quantifiable impact. When she said 'the ones I found appeared to be accurate,' that was a golden Never Split the Difference moment — a tactical empathy label like 'It sounds like you were pleasantly surprised by the accuracy' would have deepened the endorsement. Then the Gap Selling follow-up: 'When your team does find errors in the manual process, what is the downstream impact?' That moves from anecdotal validation to measurable business impact organically, without feeling like a checklist.",url:"https://us-29990.app.gong.io/call?id=967853026113172916"},
{id:3,rep:"sam",title:"Republic Bank",prospect:"Tim, Sonya",date:"Tue 3/10",dur:"54m",type:"First Demo",stage:"Early Eval",s:{r:7,d:7,v:7,a:6,c:7,e:8},w:7.20,tr:46,m:{M:0,E:0,DC:0,DP:1,IP:1,Ch:0,Co:0},str:["Authentic humor landed well","Processing mgr asked fraud questions"],opp:["Initiate pricing for $7B bank","Book follow-up live"],q:"I work for a bank. So I think of crazy sh*t.",coach:"For an early-stage first demo, the v8 MEDDPICC framework says the priority elements are Identify Pain, Metrics, and Decision Process. Sam covered Pain and Process — that is appropriate progress for a first meeting. The miss was Metrics: Republic Bank is a $7B publicly traded institution, and the opportunity to quantify was there when Sonya asked about fraud detection. A Gap Selling response would be: 'How many files per month hit that fraud exception? What does each one cost you in rework time?' That establishes measurable pain early. The Challenger framework says first demos with enterprise accounts should lead with a commercial insight that reframes the prospect's thinking — not just show features. Something like: 'Most banks your size have normalized a rework rate they have never actually measured. When we benchmark it, the number usually surprises people.' The Advancement score (6) reflects vague next steps — Voss teaches that anchoring a specific date is critical: 'Would Thursday at 2 work for a deeper dive, or is next week better?'",url:"https://us-29990.app.gong.io/call?id=8048322502833316181"},
{id:4,rep:"sam",title:"Shea Mortgage Demo",prospect:"Kelly, Tim, Matt (CFO)",date:"Tue 3/10",dur:"47m",type:"Demo (2nd)",stage:"Pricing",s:{r:8,d:8,v:8,a:7,c:8,e:9},w:7.85,tr:50,m:{M:0,E:1,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Kelly validated product to own CFO","CFO highly engaged on tech"],opp:["Create urgency when prospect stalls","Quantify ROI with CFO present"],q:"I vote you keep her. She's good.",coach:"This is a mid-stage call with the CFO present — exactly when MEDDPICC says to advance Economic Buyer, Decision Criteria, and Champion. Sam covered all three with depth: Kelly is the Champion actively selling internally, Matt (CFO) is the Economic Buyer engaging on tech stack, and Decision Criteria were explored through the prior POV. Strong stage-appropriate qualification. The coaching opportunity is Metrics — the one element missing that this call stage demanded. When a CFO asks about AWS and data isolation, he is ready to talk numbers. A Challenger reframe: 'Matt, most CFOs we work with find the ROI is not just in time savings — it is in the error reduction. For your volume, our clients typically see a 40% reduction in manual touches per file.' The Voss coaching point: when Matt said 'let us reach out to you,' that is the prospect controlling the deal pace. A no-oriented question works here: 'Would it be a terrible idea to lock in a quick 15 minutes next Wednesday, just so we have a placeholder?'",url:"https://us-29990.app.gong.io/call?id=1884016992800208423"},
{id:5,rep:"sam",title:"VanDyk Pricing Review",prospect:"Jeanie, Lindsay",date:"Wed 3/11",dur:"14m",type:"Pricing",stage:"Board Approval",s:{r:8,d:7,v:7,a:9,c:8,e:8},w:7.85,tr:52,m:{M:0,E:0,DC:1,DP:1,IP:0,Ch:1,Co:0},str:["Andrew's close got verbal commit","No sticker shock on $130K"],opp:["Outline SLA protections proactively","Ask what objections board may raise"],q:"You're front and center.",coach:"This is a late-stage pricing call heading into board approval — the v8 MEDDPICC framework says the priority here is validating prior elements and refining Competition. Sam covered Decision Criteria, Decision Process, and Champion well — Jeanie confirmed she will recommend Ocrolus to the board. Andrew's direct close question was a textbook Challenger take-control moment. The coaching opportunity is that late-stage calls should explicitly revisit Competition: 'Is the board evaluating any alternatives, or is this the primary recommendation?' Even if the answer is no, it surfaces last-minute threats. The strongest Gap Selling move for this stage: arm the Champion. Jeanie will present without you in the room. A Voss calibrated question — 'When you present this to the board, what questions do you expect them to ask? What data would make your recommendation bulletproof?' — helps her prepare for objections you cannot address directly. Also missing: proactively outlining SLA protections. Boards want to know what happens when something goes wrong, not just when it goes right.",url:"https://us-29990.app.gong.io/call?id=5284007527972607206"},
{id:6,rep:"kyle",title:"Mission Mortgage Demo",prospect:"Multiple stakeholders",date:"Mon 3/9",dur:"61m",type:"Full Demo",stage:"Initial Demo",s:{r:7,d:8,v:8,a:7,c:8,e:8},w:7.75,tr:48,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["Comprehensive 61-min full product demo","Strong Encompass integration positioning"],opp:["ID champion and econ buyer earlier","Quantify business impact during demo"],q:"",coach:"For an early-stage first demo, the v8 MEDDPICC priorities are Pain, Metrics, and Decision Process. Kyle covered Pain and Decision Process with good depth through the Encompass integration discussion — that is appropriate progress. Decision Criteria was also touched, which is a bonus for a first meeting. The key development area is Metrics: at 61 minutes, there was ample time to ask a Gap Selling current-state question like 'How many files per month does your team process manually, and how long does income calculation take on a complex borrower?' That quantifies the pain and creates the ROI foundation for later conversations. The Challenger opportunity: Kyle should lead the first 15 minutes with a commercial insight before showing any product — 'Most lenders your size have normalized a manual process they have never benchmarked. When we do, the rework rate usually surprises people.' That reframes their thinking before the demo even begins. At 61 minutes, consider tightening to 45 with a mid-call check-in: 'Before I show more, is this addressing the right problems?'",url:"https://us-29990.app.gong.io/call?id=5012764401525604158"},
{id:7,rep:"kyle",title:"Gulf Coast Bank POV",prospect:"Multiple stakeholders",date:"Mon 3/9",dur:"56m",type:"Refresher + POV",stage:"POV Setup",s:{r:8,d:8,v:8,a:8,c:8,e:8},w:8.00,tr:45,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Effective refresher tailored to bank","Smooth demo-to-POV transition"],opp:["Discuss bank-specific ROI metrics","Probe competitive landscape"],q:"",coach:"This is a mid-stage call transitioning from demo to POV — the MEDDPICC priorities here are advancing Champion, Decision Criteria, and Economic Buyer. Kyle covered Champion (someone is driving the evaluation internally) and Decision Criteria with real depth. That is strong stage-appropriate progress. The Gap Selling opportunity: before starting the POV, frame it around specific success criteria tied to the bank's current pain. Keenan would say: 'Before we start the test drive, let us agree on what success looks like — if accuracy is above X% and processing time drops by Y%, is that enough to move forward?' That establishes Decision Criteria before the evaluation, not after. The Challenger teaching moment for bank prospects specifically: proactively address the AI policy concern that surfaces with every bank. 'Most banks we work with had the same hesitation about AI in their underwriting workflow. Here is what changed their mind.' Teaching the prospect that their concern is normal and solvable is textbook commercial teaching.",url:"https://us-29990.app.gong.io/call?id=1018191465795230656"},
{id:8,rep:"kyle",title:"Mortgage Fin Svcs POV",prospect:"Kelly, Susan, Karen",date:"Mon 3/9",dur:"34m",type:"POV Kickoff",stage:"POV Active",s:{r:9,d:8,v:8,a:9,c:9,e:9},w:8.60,tr:44,m:{M:1,E:0,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Outstanding rapport — Waymo story","Kelly prepped 11 files unprompted — champion activated"],opp:["Probe budget/economic buyer","Confirm decision timeline post-POV"],q:"Until I test it, I don't believe a damn word you say.",coach:"This call is a masterclass in rapport that other reps should study. The Waymo story and the espresso martini promise are textbook Never Split the Difference — Kyle built 'that's right' moments throughout, and Kelly's comment ('until I test it, I don't believe a damn word you say') shows she trusts Kyle enough to be blunt. That level of candor is the result of tactical empathy done well. Kelly prepping 11 test files unprompted is the strongest Champion signal on any call this week — in MEDDPICC terms, she's not just a Champion, she's actively driving the evaluation internally. The Gap Selling miss was not quantifying the current state cost. Kelly described her underwriting workflow pain, but Kyle didn't push into: 'What does it cost you per file when that manual process breaks down? How many files per month hit that exception?' Those numbers would have built the ROI case that the Economic Buyer (absent from this call) will need to see.",url:"https://us-29990.app.gong.io/call?id=5670717139300812606"},
{id:9,rep:"kyle",title:"HomeBridge NFTYDoor",prospect:"Noel, Frank, Erica",date:"Tue 3/10",dur:"33m",type:"Contract Close",stage:"Closing",s:{r:9,d:8,v:8,a:10,c:9,e:9},w:8.90,tr:42,m:{M:1,E:1,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Deal closed on the call — 1yr contract, same-day signature","Planted Optima POS upsell for phase 2"],opp:["Pin exact implementation kickoff date","Share change mgmt resources"],q:"Ocrolus is the giant double-island Viking fridge kitchen.",coach:"The highest-scored call of the week and a study in Challenger deal control. Kyle navigated a complex organizational change (NFTYDoor splitting from HomeBridge, standing up a new Encompass instance, hiring 20 offshore underwriters through Sutherland) without losing the thread. The Challenger 'take control' moment came when Kyle asked 'What are we feeling in terms of the package?' and Noel immediately said 'one year' — no negotiation needed because the value had been established across prior conversations. The Voss technique was subtle but effective: Kyle mirrored Noel's language about 'the house' metaphor, which kept the tone light while discussing a complex org change. Where this call could improve: Kyle introduced the Optima POS product as a phase 2 upsell — smart Gap Selling (planting the future state before the current deal closes). But he should have been more explicit about implementation timing: 'If we get signatures today, we can have your kickoff call on the 19th with API keys in hand — does that work for your team?' Locking the implementation date on the same call as the close would have compressed the time-to-value.",url:"https://us-29990.app.gong.io/call?id=7311205256574420592"},
{id:10,rep:"kyle",title:"TexasBank Test-Drive",prospect:"Multiple stakeholders",date:"Tue 3/10",dur:"42m",type:"POV Test-Drive",stage:"POV Active",s:{r:8,d:8,v:8,a:8,c:8,e:8},w:8.00,tr:47,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Structured POV with clear test params","Good SE team selling"],opp:["Quantify expected efficiency gains","Probe competitive evaluation"],q:"",coach:"Mid-stage POV execution with appropriate MEDDPICC focus — Kyle advanced Pain, Decision Criteria, and Champion, which are the right elements for this stage. The SE coordination was effective and the test parameters were clearly defined. The Gap Selling opportunity during a POV is to make the prospect feel the gap in real time: 'Now that you have seen what 15 minutes looks like with automation, how long does this same file take your team today?' Let them experience the contrast firsthand. The Metrics gap is worth noting at this stage because quantified results from the POV will drive the business case. Kyle should proactively set up the measurement: 'During this test, let us track three things — accuracy rate, time per file, and exception rate. Those numbers will tell the story when you present internally.' That is MEDDPICC Metrics being established through the POV process itself.",url:"https://us-29990.app.gong.io/call?id=564170903269650994"},
{id:11,rep:"kyle",title:"Steadfast Mortgage",prospect:"Multiple stakeholders",date:"Thu 3/12",dur:"60m",type:"Deep Demo",stage:"Active Eval",s:{r:8,d:8,v:9,a:7,c:8,e:8},w:8.00,tr:48,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["60-min demo shows strong engagement","Good workflow pain discovery"],opp:["Firmer next steps with date","ID and engage economic buyer"],q:"",coach:"For a mid-stage active evaluation, Kyle covered the right MEDDPICC elements — Pain, Decision Criteria, and Champion all had depth. The Economic Buyer gap is becoming a pattern across Kyle's calls this week and is worth addressing: mid-stage is exactly when the question 'Who else needs to weigh in on a decision like this?' should surface. The Advancement score (7) reflects loose next steps. The Challenger framework says after 30 minutes of product depth, pause and tailor: 'Before I show you more, I want to make sure we are focused on what matters most to your team. Based on what you have seen so far, where does this solve your biggest pain?' This converts a long demo into a discovery-driven conversation. The Voss technique for firming up next steps: a no-oriented question — 'Would it be unreasonable to set up a POV next week so you can test this against your own files?' That gives the prospect the illusion of control while driving a specific commitment.",url:"https://us-29990.app.gong.io/call?id=6001985602965987747"},
{id:12,rep:"kyle",title:"Mega Capital Proposal",prospect:"Multiple stakeholders",date:"Thu 3/12",dur:"21m",type:"Proposal",stage:"Pricing",s:{r:8,d:8,v:8,a:9,c:9,e:8},w:8.45,tr:44,m:{M:1,E:1,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Concise 21-min pricing walkthrough","Mutual next steps with timeline"],opp:["Probe competitive alternatives","Confirm internal approval process"],q:"",coach:"This is how a late-stage pricing call should run: 21 minutes, focused, with clear mutual next steps. The qualification depth here reflects strong work across prior conversations — Kyle did not need to re-establish Pain or Champion because that groundwork was already laid. That is the v8 MEDDPICC principle in action: each call builds on the last rather than trying to cover everything in one sitting. Attempting to touch all seven elements on a pricing call would have felt redundant and formulaic to a buyer this far along. The one element that does belong at this stage is Competition: if Mega Capital is comparing you to another vendor, you need to know before they go silent. A Voss label works perfectly here: 'It sounds like you have done your homework on the market. How does our proposal compare to what else you have seen?' The Challenger reframe for pricing discussions: 'The question is not whether this investment makes sense. The question is what it costs you every month you do not have this running.'",url:"https://us-29990.app.gong.io/call?id=6210740012227288150"},
{id:13,rep:"charlie",title:"WR Exec Debrief",prospect:"Julie & team",date:"Mon 3/9",dur:"49m",type:"Strategy",stage:"Active Client",s:{r:7,d:7,v:8,a:7,c:8,e:7},w:7.30,tr:50,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Strategic exec debrief planning","Good cross-functional coordination"],opp:["Quantify expansion ROI","Identify additional stakeholders"],q:"",coach:"For an active client strategy call, the MEDDPICC elements that matter are different from a new prospect: Champion validation, Decision Process for expansion, and Metrics to justify additional investment. Charlie covered Champion and Decision Process — Julie is clearly engaged, and the cross-functional coordination shows account depth. The coaching opportunity is Metrics: executive debriefs should quantify the value already delivered as a foundation for expansion. A Gap Selling approach: 'Julie, based on what we have seen across your portfolio, teams that add the conditioning module see a 25% reduction in post-close exceptions. Is that a problem worth solving for your team right now?' That turns an account review into a discovery conversation for the next sale. The Challenger commercial teaching principle applies: do not just review what has been done — teach the client something new about their own business that creates urgency for the next phase.",url:"https://us-29990.app.gong.io/call?id=7846082633042693952"},
{id:14,rep:"charlie",title:"NH Mutual Demo",prospect:"Multiple stakeholders",date:"Mon 3/9",dur:"64m",type:"Full Demo",stage:"Initial Demo",s:{r:7,d:8,v:8,a:7,c:7,e:8},w:7.60,tr:52,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["Thorough 64-min Encompass demo","Strong prospect question engagement"],opp:["64 min is long — tighten to 45","Build champion explicitly"],q:"",coach:"For an early-stage first demo, the priority is establishing Pain with enough depth that the prospect feels understood — not running through a qualification checklist. Charlie covered Pain and Decision Criteria with genuine engagement, and the prospect's questions showed real interest. That is the right foundation for a first meeting. Experienced buyers can immediately sense when a rep is mentally ticking boxes, and it erodes trust. Charlie's thorough product coverage shows he cares about educating the prospect — the next evolution is leading with diagnosis before prescription. Start with the current state: 'Walk me through what happens today when a self-employed borrower file hits your desk. How long does the income calculation take, and what happens when it is wrong?' That is Gap Selling at its core — understand the problem before presenting the solution. At 64 minutes, try a mid-call check-in at the 25-minute mark: 'Based on what you have seen so far, is this addressing the right problems?' That tests engagement and surfaces a potential Champion naturally — if someone says 'absolutely,' follow up with 'Would you be willing to advocate for testing this internally?'",url:"https://us-29990.app.gong.io/call?id=6974865037967602683"},
{id:15,rep:"charlie",title:"LendSure ROI Sync",prospect:"Multiple stakeholders",date:"Tue 3/10",dur:"35m",type:"ROI Review",stage:"Expansion",s:{r:8,d:8,v:8,a:8,c:8,e:8},w:8.10,tr:48,m:{M:1,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["ROI-focused conversation","Existing client expansion opportunity"],opp:["Identify economic buyer for expansion","Probe competitive alternatives"],q:"",coach:"Charlie's best call of the week and the template he should replicate. The ROI focus is exactly what Gap Selling prescribes for expansion conversations — grounding the discussion in measurable outcomes. Charlie covered Metrics, Pain, Decision Process, Decision Criteria, and Champion with real depth. For an expansion call, that is excellent stage-appropriate qualification. The one element worth advancing at this stage is Economic Buyer: the current Champion may not control the budget for additional modules. A natural question for an existing relationship: 'To expand what we are doing together, is that something you can approve directly, or does it go through a procurement process?' For Competition — even with existing clients, alternatives are always being evaluated. A Voss calibrated question that is soft enough for the relationship: 'How are you thinking about your technology stack for next year? Anything else on your radar?' This surfaces threats without feeling interrogative. The key learning: Charlie can do Metrics-driven conversations when the context is right. The goal is to bring this same discipline to new prospect calls.",url:"https://us-29990.app.gong.io/call?id=9121896233413914421"},
{id:16,rep:"spencer",title:"Absolute Home Demo",prospect:"Multiple stakeholders",date:"Wed 3/5",dur:"34m",type:"Demo",stage:"Initial Demo",s:{r:7,d:8,v:8,a:7,c:7,e:8},w:7.70,tr:50,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["Solid demo structure","Good technical depth"],opp:["Identify champion explicitly","Probe competition and timeline"],q:"",coach:"For an early-stage first demo, the v8 MEDDPICC priorities are Pain, Metrics, and Decision Process. Spencer covered Pain and Decision Criteria — solid progress for a first meeting. He does not need to cover Economic Buyer or Competition on a first demo; those elements belong to mid and late-stage calls. The development area is Metrics: Spencer's technical depth is a real asset, and pairing it with quantification would elevate his pitch. A Challenger commercial teaching approach: 'Most lenders think their income calculation process works fine because they have never measured the rework rate. When we benchmark it, the typical lender is touching 30% of files twice. That is where the real cost hides.' That reframes the prospect's worldview before they see any product. The Voss opportunity: open with an accusation audit — 'You are probably thinking this is just another vendor demo. I want to make sure it is not. What is actually broken in your process today?' That disarms skepticism and immediately starts Gap Selling's current-state diagnosis.",url:"https://us-29990.app.gong.io/call?id=8643301461981605040"},
{id:17,rep:"spencer",title:"Equifax Financial Model",prospect:"Multiple stakeholders",date:"Thu 3/6",dur:"30m",type:"Partner Q&A",stage:"Partner",s:{r:7,d:7,v:7,a:7,c:8,e:7},w:7.20,tr:48,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["Strong technical depth on financial model","Good Q&A handling"],opp:["More call volume needed","Build champion within partner org"],q:"",coach:"Partner calls operate on different MEDDPICC dynamics — the Champion here is the person at Equifax who will actively recommend Ocrolus to shared customers. Spencer should identify and cultivate that person: 'Who on your team is most excited about this integration? I would love to make sure they have everything they need to position it.' The Gap Selling lens for partner calls is about the partner's gap: 'What is the biggest challenge your team faces when positioning the financial model to lenders? If we can solve that together, it makes both of us more effective.' The Challenger teaching opportunity: 'We are seeing lenders prioritize accuracy over speed this year — here is how that changes the way we should position the model together.' Spencer's technical depth shines on calls like this. The broader coaching point: 2 qualifying calls in a week is not enough pipeline activity for an AE. The frameworks and techniques improve with repetition — more at-bats means faster skill development. Volume should be the primary focus alongside technique."}
];
const coaching={
sam:{narrative:"Sam had a productive week with 5 calls across different deal stages. His standout was the HMA demo — where the prospect asked for pricing unprompted and the follow-up was booked on the call. His team selling with SE Steph continues to be a major asset; their chemistry is evident and prospects respond well to the transparency.<br><br><strong style=\"color:#93c5fd\">Framework Coaching:</strong> Looking at Sam's calls as a multi-call body of work, his stage-appropriate MEDDPICC coverage is solid. On early-stage calls (Republic Bank), he focused on Pain and Process. On mid-stage calls (Shea Mortgage), he advanced Champion and Economic Buyer with depth. On VanDyk, he validated Champion and moved toward board approval. This is how MEDDPICC should work — each call advances 2-3 elements with genuine depth, building qualification across the cycle. Trying to hit all seven in a single conversation would feel like an interrogation to experienced buyers, and Sam's natural conversational style avoids that trap. The <em>pattern-level</em> gap across the week is Metrics: Sam quantified ROI on only 1 of 5 calls. This is not about any single call missing a checkbox — it is about a consistent missed opportunity to translate pain into dollars, regardless of deal stage. From <em>Gap Selling</em>: the shift is from 'I hear you have 5-day turn times' to 'What does that cost you in pipeline fallout per month?' From <em>Never Split the Difference</em>, Sam missed two mirroring opportunities where prospects made revealing statements that deserved to be echoed back rather than moved past.",keep:"Team selling with Steph is gold. Transparency on limitations builds trust. Natural humor lands authentically.",start:"Quantify ROI every call (Metrics 1/5). Probe competition (1/5). Book meetings live on call.",stop:"Letting prospects control follow-up pace. Always propose a specific date."},
kyle:{narrative:"Kyle had the strongest week on the team — 7 calls with a closing deal, two active POVs, and a pricing proposal. The HomeBridge close (8.90) was the highest-scored call across all reps: he navigated a complex org change, secured a same-day contract signature, and planted the seed for a phase 2 upsell. His MFS POV kickoff showed elite rapport-building, and his champion (Kelly) prepped 11 test files before the call even started.<br><br><strong style=\"color:#93c5fd\">Framework Coaching:</strong> Kyle's 7 calls demonstrate what good multi-call MEDDPICC progression looks like: early calls (Mission Mortgage) focused on Pain and Process; mid-stage calls (Gulf Coast, MFS, TexasBank) advanced Champion and Decision Criteria; late-stage calls (HomeBridge, Mega Capital) validated the deal without redundantly re-covering elements already established. Kyle never fell into the trap of running through a checklist — his qualification feels like a natural conversation, which is why prospects like Noel and Kelly are so engaged. Experienced buyers can sense when they are being qualified, and Kyle avoids that. The <em>pattern-level</em> gap worth addressing: Competition was probed on only 2 of 7 calls, and more importantly, it was absent from mid-stage calls (Gulf Coast, TexasBank) where it is most valuable. Knowing the competitive landscape during an active evaluation shapes how you position the POV. Kyle's <em>Voss</em> technique is the best on the team. His development area: the two 60-minute demos could benefit from more <em>Gap Selling</em> diagnostic time upfront — spending 10-15 minutes understanding the current state before showing product compresses the demo and increases impact.",keep:"Exceptional deal control — HomeBridge closed same day. POV success criteria shared upfront. Strong rapport across all calls.",start:"Probe competition more (1/7). ID economic buyer earlier. Quantify ROI in first meetings.",stop:"60+ min demos without time checks. Shorter focused sessions drive faster decisions."},
charlie:{narrative:"Lighter week for Charlie with 3 qualifying calls — a strategic exec debrief, a full Encompass demo, and an ROI sync with an existing client. The LendSure ROI review (8.10) was his best, showing a metrics-driven approach that should be replicated across all call types.<br><br><strong style=\"color:#93c5fd\">Framework Coaching:</strong> Across Charlie's 3 calls, his stage-appropriate MEDDPICC coverage tells an interesting story. On the LendSure expansion call, he covered 5 elements with real depth including Metrics — showing he can do rigorous qualification when the context feels right. On the NH Mutual first demo, he appropriately focused on Pain and Decision Criteria — the right elements for an early-stage meeting. The <em>pattern-level</em> insight: Charlie's Metrics gap is situational, not systematic. He does it well on ROI calls but skips it on demos. The goal: bring the same quantification discipline to first meetings. From a <em>Challenger</em> perspective, Charlie's demos run long (64 min) because he leads with product depth rather than a commercial insight that creates urgency. Try opening with 10 minutes of <em>Gap Selling</em> current-state diagnosis before showing anything. The <em>Voss</em> opportunity: use labels and calibrated questions to test for Champions mid-demo.",keep:"ROI-focused approach on LendSure. Thorough product coverage. Good account depth on WR.",start:"Tighten demos to 45 min max. Build champions explicitly. Probe competition every call.",stop:"64-min demos without interactivity checkpoints."},
spencer:{narrative:"Spencer had the lightest week with only 2 qualifying external calls — an Absolute Home Mortgage demo and an Equifax financial model Q&A. A third call (City National Bank) was a 3-minute no-show. The call volume itself is a flag worth discussing.<br><br><strong style=\"color:#93c5fd\">Framework Coaching:</strong> Applying the v8 multi-call lens to Spencer's 2 calls: on the Absolute Home first demo, he covered Pain and Decision Criteria — appropriate for an early-stage meeting. He does not need Champion or Competition on a first demo. The <em>pattern-level</em> concern is that with only 2 calls, there is not enough data to identify true patterns vs. one-off gaps. What we can say: Spencer's technical depth is a genuine asset. The <em>Challenger</em> coaching is to pair that depth with commercial teaching — lead with an insight that reframes the prospect's thinking before diving into product. From a <em>Voss</em> perspective, accusation audits at call openings would differentiate Spencer's demos immediately. The primary focus should be increasing call volume — the frameworks improve with repetition, and 2 calls per week does not provide enough at-bats for skill development.",keep:"Strong technical depth on financial model discussions. Solid demo structure.",start:"More call volume — only 2 qualifying calls this week. Build champions explicitly.",stop:"Short/canceled calls (City National was 3 min no-show)."}
};
let st={rep:"sam",sel:null,view:"overview"};
function sc(s){return s>=8.5?"#10b981":s>=7.5?"#3b82f6":"#f59e0b"}
function render(){
const el=document.getElementById("app");
const f=calls.filter(c=>c.rep===st.rep);
const rd=reps.find(r=>r.id===st.rep);
const avg=(f.reduce((a,c)=>a+c.w,0)/f.length).toFixed(2);
const best=f.reduce((a,c)=>c.w>a.w?c:a,f[0]);
const det=st.sel?calls.find(c=>c.id===st.sel):null;
const co=coaching[st.rep];
let h="";
// Rep tabs
h+=`<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">`;
reps.forEach(r=>{
h+=`<button class="tab ${st.rep===r.id?"active":""}" onclick="st.rep='${r.id}';st.sel=null;st.view='overview';render()"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><div><div class="name" style="color:${st.rep===r.id?"#e2e8f0":"#64748b"}">${r.name}</div><div class="sub">${r.title} · ${r.n} calls</div></div><div style="font-size:18px;font-weight:700;color:${sc(r.avg)}">${r.avg}</div></div></button>`;
});
h+=`</div>`;
// View tabs
h+=`<div style="display:flex;gap:6px;margin-bottom:14px">`;
["overview","meddpicc","compare"].forEach(v=>{
h+=`<button class="vtab mono ${st.view===v?"active":""}" onclick="st.view='${v}';st.sel=null;render()">${v}</button>`;
});
h+=`</div>`;
// KPIs
h+=`<div class="kpi-grid">`;
h+=`<div class="card kpi"><div class="label mono">Avg Score</div><div style="font-size:24px;font-weight:700;color:${sc(parseFloat(avg))}">${avg}</div></div>`;
h+=`<div class="card kpi"><div class="label mono">Best Call</div><div style="font-size:24px;font-weight:700;color:#3b82f6">${best.w}</div></div>`;
h+=`<div class="card kpi"><div class="label mono">Calls</div><div style="font-size:24px;font-weight:700;color:#8b5cf6">${f.length}</div></div>`;
h+=`<div class="card kpi"><div class="label mono">Profile</div><div style="font-size:15px;font-weight:700;color:#f59e0b">${rd.profile}</div></div>`;
h+=`</div>`;
if(st.view==="compare"&&!det){
h+=`<div class="card" style="overflow-x:auto"><div class="mono" style="font-size:11px;font-weight:600;color:#93c5fd;margin-bottom:12px;letter-spacing:1px">REP COMPARISON</div><table><thead><tr><th>Metric</th>`;
reps.forEach(r=>{h+=`<th style="text-align:center">${r.name.split(" ")[0]}</th>`});
h+=`</tr></thead><tbody>`;
[{l:"Avg Score",f:r=>r.avg},{l:"Calls",f:r=>r.n},{l:"Profile",f:r=>r.profile},{l:"MEDDPICC %",f:r=>{const rc=calls.filter(c=>c.rep===r.id);const t=rc.length*7;const h2=rc.reduce((s,c)=>s+MK.filter(k=>c.m[k]).length,0);return Math.round(h2/t*100)+"%"}}].forEach(row=>{
h+=`<tr><td style="color:#94a3b8">${row.l}</td>`;
reps.forEach(r=>{const v=row.f(r);h+=`<td style="text-align:center;font-weight:${typeof v==="number"?700:400};color:${typeof v==="number"?sc(v):"#94a3b8"}">${v}</td>`});
h+=`</tr>`;
});
h+=`</tbody></table></div>`;
}
if(st.view==="overview"&&!det){
h+=`<div class="card" style="margin-bottom:14px;border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Week in Review: ${rd.name}</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${co.narrative}</div></div>`;
f.forEach(c=>{
h+=`<div class="card call-row" style="border-left-color:${sc(c.w)}" onclick="st.sel=${c.id};render()"><div style="display:flex;justify-content:space-between;align-items:center;gap:6px"><div style="flex:1;min-width:160px"><div style="font-size:13px;font-weight:600">${c.title}</div><div style="font-size:10px;color:#64748b">${c.prospect} · ${c.date} · ${c.dur}</div></div><div style="display:flex;gap:2px" class="dots-wrap">`;
MK.forEach(k=>{h+=`<span class="dot ${c.m[k]?"dot-on":"dot-off"}"></span>`});
h+=`</div><div style="font-size:18px;font-weight:700;color:${sc(c.w)};min-width:36px;text-align:right">${c.w}</div><div style="color:#475569">›</div></div></div>`;
});
h+=`<div class="card" style="margin-top:14px"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Coaching: ${rd.name}</div><div class="coaching-grid"><div><div style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:3px">✦ KEEP</div><div style="font-size:11px;color:#94a3b8;line-height:1.5">${co.keep}</div></div><div><div style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:3px">▲ START</div><div style="font-size:11px;color:#94a3b8;line-height:1.5">${co.start}</div></div><div><div style="font-size:10px;font-weight:600;color:#ef4444;margin-bottom:3px">■ STOP</div><div style="font-size:11px;color:#94a3b8;line-height:1.5">${co.stop}</div></div></div></div>`;
}
if(st.view==="meddpicc"&&!det){
const mf=MK.map(k=>({k,l:ML[k],n:f.filter(c=>c.m[k]).length,f:f.filter(c=>c.m[k]).length>=Math.ceil(f.length*.7)?"Always":f.filter(c=>c.m[k]).length>=Math.ceil(f.length*.3)?"Sometimes":"Rarely"}));
h+=`<div class="card" style="overflow-x:auto"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">MEDDPICC — ${rd.name} (${f.length} calls)</div><table><thead><tr><th>Element</th>`;
f.forEach(c=>{h+=`<th style="text-align:center;font-size:9px;max-width:70px">${c.title.split(" ")[0]}</th>`});
h+=`<th style="text-align:center">Freq</th></tr></thead><tbody>`;
mf.forEach(m=>{
h+=`<tr><td><span class="mono" style="color:#93c5fd;font-size:10px;margin-right:3px">${m.k}</span><span style="color:#94a3b8">${m.l}</span></td>`;
f.forEach(c=>{h+=`<td style="text-align:center"><div style="width:18px;height:18px;border-radius:3px;margin:0 auto;display:flex;align-items:center;justify-content:center;background:${c.m[m.k]?"rgba(16,185,129,0.15)":"rgba(239,68,68,0.06)"};color:${c.m[m.k]?"#10b981":"#475569"};font-size:11px;font-weight:600">${c.m[m.k]?"✓":"—"}</div></td>`});
const fc=m.f==="Always"?"#10b981":m.f==="Sometimes"?"#f59e0b":"#ef4444";
const fb=m.f==="Always"?"rgba(16,185,129,0.15)":m.f==="Sometimes"?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.1)";
h+=`<td style="text-align:center"><span class="tag mono" style="background:${fb};color:${fc}">${m.f}</span></td></tr>`;
});
h+=`</tbody></table></div>`;
}
if(det){
h+=`<button class="vtab mono" onclick="st.sel=null;render()" style="margin-bottom:10px">← Back</button>`;
h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px"><div><h2 style="font-size:16px;font-weight:700"><a href="${det.url}" target="_blank" style="color:#e2e8f0;text-decoration:none;border-bottom:1px solid #3b82f6;padding-bottom:1px;transition:color .15s" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#e2e8f0'">${det.title} ↗</a></h2><div style="font-size:11px;color:#64748b;margin-top:2px">${det.prospect} · ${det.date} · ${det.dur} · ${det.type}</div><div style="font-size:10px;color:#475569">Stage: ${det.stage} · Talk: <span style="color:${det.tr<=60?"#10b981":"#f59e0b"}">${det.tr}%</span></div></div><div style="text-align:center"><div style="font-size:28px;font-weight:700;color:${sc(det.w)}">${det.w}</div><div class="mono" style="font-size:9px;color:#475569">WEIGHTED</div></div></div>`;
DK.forEach(d=>{
const s=det.s[d];const bg=s>=8?"#10b981":s>=7?"#f59e0b":"#ef4444";
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0"><span style="font-size:11px;color:#94a3b8;min-width:110px">${DL[d]} <span style="color:#475569;font-size:9px">(${DW[d]})</span></span><div style="display:flex;align-items:center;gap:6px"><div class="bar"><div class="fill" style="width:${s*10}%;background:${bg}"></div></div><span style="font-size:11px;font-weight:600;color:${bg};min-width:20px">${s}</span></div></div>`;
});
h+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px">`;
MK.forEach(k=>{h+=`<div class="tag mono" style="background:${det.m[k]?"rgba(16,185,129,0.12)":"rgba(100,116,139,0.06)"};color:${det.m[k]?"#10b981":"#475569"};border:1px solid ${det.m[k]?"rgba(16,185,129,0.25)":"#1e293b"}">${k}</div>`});
h+=`</div></div>`;
h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0" class="detail-grid">`;
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:6px">STRENGTHS</div>`;
det.str.forEach(s=>{h+=`<div class="strength">${s}</div>`});
h+=`</div><div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:6px">OPPORTUNITIES</div>`;
det.opp.forEach(o=>{h+=`<div class="opp">${o}</div>`});
h+=`</div></div>`;
if(det.coach){h+=`<div class="card" style="border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:6px;letter-spacing:1px">COACHING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${det.coach}</div></div>`}
if(det.q){h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:4px">KEY QUOTE</div><div style="font-size:13px;color:#e2e8f0;font-style:italic;border-left:3px solid #8b5cf6;padding-left:10px">"${det.q}"</div></div>`}
h+=`<a href="${det.url}" target="_blank" class="mono" style="font-size:10px;display:inline-block;margin-top:8px">View in Gong →</a>`;
}
h+=`<div style="margin-top:20px;text-align:center;font-size:9px;color:#1e293b" class="mono">v7 rubric · MEDDPICC 30% · Gap Selling 30% · Challenger 25% · NSTD 15% · ${calls.length} calls · 4 reps</div>`;
el.innerHTML=h;
}
render();
</script>
