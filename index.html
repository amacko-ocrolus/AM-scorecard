<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:24px 20px;max-width:960px;margin:0 auto}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:.5px}
.card{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:16px;margin-bottom:10px}
.bar{height:4px;background:#1e293b;border-radius:2px;overflow:hidden;width:90px}
.fill{height:100%;border-radius:2px}
.green{color:#10b981}.blue{color:#3b82f6}.amber{color:#f59e0b}.red{color:#ef4444}.purple{color:#8b5cf6}
.bg-green{background:#10b981}.bg-blue{background:#3b82f6}.bg-amber{background:#f59e0b}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:#10b981}.dot-off{background:#334155}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
.tab{padding:8px 16px;border-radius:7px;background:transparent;border:1px solid #1e293b;text-align:left;transition:all .15s}
.tab.active{border-color:#3b82f6;background:#1e293b}
.tab .name{font-size:13px;font-weight:600}.tab .sub{font-size:10px;color:#475569}
.vtab{padding:4px 10px;font-size:10px;border-radius:4px;border:1px solid #1e293b;background:transparent;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.vtab.active{border-color:#3b82f6;background:#1e293b;color:#93c5fd}
.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}
</style>
</head>

const calls=[{"id":1,"rep":"anjelica","title":"First Bank TN x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Wed 3/18","dur":"31m","type":"Client Call","s":{"rq":7,"cd":3,"vd":2,"sa":6,"ce":8},"w":4.65,"tr":36,"p":{"KDM":1,"CS":0,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Strong rapport building through casual conversation and personal connection","Effective coordination of training logistics with multiple stakeholders"],"opp":["Missed opportunity to validate current Ocrolus value and client success metrics","No exploration of expansion opportunities or additional use cases"],"q":"I'm very excited about actually seeing it in dev","qt":"Client","coach":"While the rapport building was excellent, this call missed critical opportunities to advance the account strategically. When Danita expressed excitement about seeing the product in dev, you could have asked 'What specific outcomes are you hoping to achieve once the training is complete?' or 'How will you measure success with Ocrolus over the next quarter?' The training discussion was a perfect opening to explore expansion by asking 'Beyond processors and underwriters, are there other teams that might benefit from Ocrolus capabilities?' Instead of just scheduling training, position it as a value driver.","prep":["Prepare specific ROI questions about current Ocrolus impact on processing times","Research new Ocrolus features that could benefit mortgage processors","Identify expansion opportunities within their loan officer or other departments"],"url":"https://us-29990.app.gong.io/call?id=6223128566048405615"},{"id":2,"rep":"anjelica","title":"Catalyst x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Wed 3/18","dur":"6m","type":"Client Call","s":{"rq":1,"cd":1,"vd":1,"sa":1,"ce":1},"w":1,"tr":50,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":[],"str":["Unable to identify strengths from empty transcript","No observable AM behaviors to evaluate"],"opp":["Schedule and conduct actual client conversations","Establish basic communication protocols with client"],"q":"","qt":"","coach":"This appears to be a missed connection or technical failure rather than a client conversation. For weekly syncs to be effective, establish clear dial-in protocols and backup communication methods. When technical issues arise, immediately follow up via email or phone to reschedule. Consider sending a brief agenda beforehand to ensure both parties are prepared and engaged. Use these regular touchpoints to advance at least one strategic pillar per call.","prep":["Send calendar invite with clear dial-in instructions and backup phone number","Prepare 2-3 specific discussion topics to maximize the rescheduled conversation","Follow up immediately to reschedule and acknowledge the missed connection"],"url":"https://us-29990.app.gong.io/call?id=8312712962323387566"},{"id":3,"rep":"anjelica","title":"Northpoint X Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Thu 3/19","dur":"29m","type":"Client Call","s":{"rq":7,"cd":6,"vd":5,"sa":4,"ce":7},"w":5.65,"tr":43,"p":{"KDM":1,"CS":1,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Strong personal rapport building - the transcript shows extensive personal conversation about travel plans and rodeo experiences that created genuine connection","Responsive issue resolution - immediately addressed client concerns about income calculation discrepancies and notification timing problems"],"opp":["Missed expansion exploration - when client mentioned 'the big O' nickname and team adoption, could have asked 'What's driving the increased usage that has your whole processing team talking about it daily?'","Limited strategic advancement - resolved immediate issues but didn't establish next steps beyond meeting cadence or explore how current challenges connect to broader business goals"],"q":"the whole processing team is calling your system the big o... they're like the big o is having trouble today or the big o is, have you guys loaded?","qt":"Client","coach":"While the personal connection was excellent, you missed a significant expansion signal when Cindy mentioned the processing team's daily engagement with 'the big O.' Instead of just acknowledging the nickname, try: 'That's fantastic they've adopted it so fully - what's changed in your workflow that has them interacting with it so frequently?' This could have uncovered volume growth or new use cases. When discussing the income calc issues, you focused on the technical fix but missed the strategic angle: 'How are these calculation discrepancies impacting your loan approval timelines or borrower experience?' would connect the technical issue to business outcomes.","prep":["Research Northpoint's loan volume trends to quantify the 'big O' usage increase","Prepare specific examples of how income calc improvements have helped similar lenders","Come with 2-3 roadmap features that address processing team efficiency"],"url":"https://us-29990.app.gong.io/call?id=4892204429085518269"},{"id":4,"rep":"anjelica","title":"FAHM x Ocrolus - Dashboard Q&A Session","prospect":"Multiple stakeholders","date":"Thu 3/19","dur":"78m","type":"Client Call","s":{"rq":6,"cd":7,"vd":8,"sa":4,"ce":8},"w":6.65,"tr":4,"p":{"KDM":1,"CS":1,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Provided hands-on product training with screen sharing to demonstrate editing capabilities and income calculations","Maintained strong client engagement throughout a 78-minute technical session with active participation from multiple stakeholders"],"opp":["Missed expansion signals when client mentioned complex scenarios like 17 tax returns and 119 rental properties - could have explored volume pricing or advanced features","No discussion of product roadmap or upcoming features that could address current workflow limitations"],"q":"I could have used that last may one borrower at 17 separate corporate tax returns... She had 119 rental properties... she ran it through ocrolus, and the borrower didn't end up qualifying, you know, for their program that they were doing, but it had at least saved her some time","qt":"Client","coach":"Strong technical support delivery, but missed key expansion opportunities when clients shared pain points about complex scenarios. When the client mentioned '17 separate corporate tax returns' and '119 rental properties,' the AM should have asked 'How often do you encounter these high-volume scenarios?' and explored whether bulk processing features or volume pricing could add value. The session focused entirely on current functionality without discussing upcoming features that could address workflow limitations like the encompass integration timeline.","prep":["Prepare expansion conversation around high-volume processing scenarios and potential volume pricing","Research product roadmap items relevant to encompass integration and bulk processing capabilities","Identify additional stakeholders who handle complex loan scenarios for potential multi-threading opportunities"],"url":"https://us-29990.app.gong.io/call?id=1797984843354683654"},{"id":5,"rep":"anjelica","title":"Nations Direct x Ocrolus - Weekly Touch Base","prospect":"Multiple stakeholders","date":"Thu 3/19","dur":"17m","type":"Client Call","s":{"rq":6,"cd":4,"vd":7,"sa":5,"ce":7},"w":5.65,"tr":63,"p":{"KDM":0,"CS":0,"AV":1,"PR":1},"keyAreas":["Expansion"],"str":["Delivered comprehensive product training on Fannie Mae functionality with clear step-by-step walkthrough","Proactively offered training materials when client requested them"],"opp":["Missed opportunity to validate client success and ROI during feature demonstration","Failed to identify decision maker authority or explore strategic business impact"],"q":"Do you have, you know how you guys have, you know, your little trainings? Do you have a little training on this that we can send to our team?","qt":"Client","coach":"Strong product demonstration, but you missed critical opportunities to connect features to business value. When showing the Fannie Mae calculation, instead of just explaining mechanics, try: 'How much time is your team currently spending on manual Fannie calculations, and what would getting that time back mean for your processing capacity?' The client's request for training materials was a perfect opening to ask about rollout timeline and user adoption goals. When discussing automated conditions, probe deeper: 'What percentage of your conditions work is currently manual, and how would automation impact your turn times?'","prep":["Follow up on delivery of training materials and gauge team adoption timeline","Quantify current manual processes to build ROI case for automated conditions","Identify decision maker for web-based scenario desk implementation"],"url":"https://us-29990.app.gong.io/call?id=3150420865993903907"},{"id":6,"rep":"anjelica","title":"MortgageRight x Ocrolus - Bi-Weekly Sync","prospect":"Multiple stakeholders","date":"Thu 3/19","dur":"18m","type":"Client Call","s":{"rq":6,"cd":4,"vd":3,"sa":5,"ce":4},"w":4.4,"tr":73,"p":{"KDM":0,"CS":1,"AV":1,"PR":0},"keyAreas":["Retention"],"str":["Proactive follow-up on technical issues with specific case numbers and internal coordination","Clear communication of product updates like the duplicates folder enhancement"],"opp":["Missed opportunity to dig deeper when client said 'I haven't heard anything' about user feedback - could have asked specific discovery questions","Failed to create urgency around pending contract signatures from October"],"q":"I haven't nothing at all… but I don't know that it's making it to me though. I guess underwriting, I'd be able to say better, but I definitely haven't heard anything","qt":"Colin","coach":"When Colin said he hadn't heard feedback but 'underwriting would be able to say better,' this was a perfect moment to suggest connecting directly with underwriting or ask 'What would it take to get that feedback loop established?' Instead of accepting 'I haven't heard anything,' try 'Let's set up 15 minutes with your underwriting team next week - I'd love to hear how the 41 loans processed this month went.' The October contract signature follow-up lacked urgency - instead of just asking Colin to check, say 'This has been pending since October - can we get Tanner on a quick call this week to walk through the benefits and get this signed?'","prep":["Identify and invite the actual decision maker (Tanner) to next call","Prepare specific ROI metrics from the 41 loans processed this month","Create urgency timeline for pending contract signatures with clear business impact"],"url":"https://us-29990.app.gong.io/call?id=6512206696565852810"},{"id":7,"rep":"anjelica","title":"Meeting with Anjelica Purnell","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"25m","type":"Client Call","s":{"rq":6,"cd":4,"vd":7,"sa":5,"ce":6},"w":5.45,"tr":57,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Provided clear technical guidance on document mapping functionality with step-by-step instructions","Maintained patience and supportive tone throughout technical troubleshooting session"],"opp":["Missed opportunity to explore broader workflow challenges or additional use cases beyond the immediate mapping issue","Could have validated overall client satisfaction with Ocrolus platform while addressing technical concerns"],"q":"So once we map, it will automatically go to this verification of employment folder, which is what we would prefer","qt":"Client","coach":"This was effective technical problem-solving, but you missed strategic account management opportunities. When the client said 'which is what we would prefer,' that was a perfect moment to ask 'What other workflow improvements would make your team more efficient?' or 'How is the current document processing impacting your loan turnaround times?' Instead of ending with logistics, you could have transitioned with 'While I have you, how is the team feeling about Ocrolus overall - any other pain points I should know about?' This would have elevated the conversation from reactive support to proactive account management.","prep":["Follow up on the screenshot request to resolve the mapping interface issue","Prepare broader workflow assessment questions to identify additional optimization opportunities","Schedule a more strategic check-in to discuss overall platform satisfaction and potential expansion needs"],"url":"https://us-29990.app.gong.io/call?id=1429690062158410131"},{"id":8,"rep":"anjelica","title":"Compass Mortgage x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"30m","type":"Client Call","s":{"rq":6,"cd":8,"vd":3,"sa":4,"ce":3},"w":5.05,"tr":47,"p":{"KDM":1,"CS":0,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Deep technical troubleshooting - the transcript shows detailed investigation of employer name parsing issues and container creation problems","Collaborative problem-solving approach - worked through specific examples with the client to understand root causes"],"opp":["Missed opportunity to acknowledge client frustration and provide implementation timeline - when client expressed concerns about testing priority, AM could have said 'I understand your frustration with feeling like you're at the bottom of the priority queue. Let me get you a clear timeline on fixes and escalate this internally'","Failed to validate current value or discuss success metrics - no exploration of what's working well or ROI measurement"],"q":"I'm continually surprised at your guys implementation process that we were at the bottom of the priority queue for testing","qt":"Client","coach":"While your technical problem-solving was thorough, you missed a critical moment to address the client's implementation concerns. When they said 'I'm continually surprised at your guys implementation process,' this required immediate acknowledgment and action planning. Instead of just saying 'Understandable,' try: 'I hear your frustration about feeling deprioritized. Let me escalate this internally and get you a clear timeline on these fixes by Monday.' You also missed an opportunity to balance the technical issues with value validation - asking 'What aspects of the system are working well for your team?' could have provided important context.","prep":["Prepare implementation timeline and escalation plan to address client's priority concerns","Identify what's working well in current setup to balance technical issues discussion","Research potential additional use cases or features that could benefit their workflow"],"url":"https://us-29990.app.gong.io/call?id=5282375941142600272"},{"id":9,"rep":"anjelica","title":"Luxury Mortgage Corp x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"29m","type":"Client Call","s":{"rq":6,"cd":4,"vd":3,"sa":5,"ce":7},"w":4.65,"tr":4,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":[],"str":["Strong collaborative problem-solving approach during the correspondent loan review","Responsive to client requests, immediately offering to investigate the 60-day activity report"],"opp":["Missed opportunity to validate business value when client mentioned processing 1,800+ documents","No strategic discussion about optimizing the correspondent loan workflow that's been problematic for a month"],"q":"Mike and I have been trying to get a correspondent loan through oculus for a month now because we know that it's not right","qt":"Client","coach":"When the client revealed they've been struggling with correspondent loans for a month, this was a critical moment to dig deeper with discovery questions like 'What specific challenges are you seeing with correspondent loans versus your regular workflow?' Instead of just troubleshooting the current package, the AM should have explored the business impact: 'How is this month-long delay affecting your processing times and team productivity?' The client also mentioned processing 1,800+ documents with over 1,000 being unused tax forms - this was a perfect opening to discuss workflow optimization and demonstrate ongoing value.","prep":["Prepare specific questions about correspondent loan processing challenges and business impact","Research workflow optimization features that could address the unused tax document issue","Come ready to discuss how other clients handle similar high-volume correspondent loan scenarios"],"url":"https://us-29990.app.gong.io/call?id=8308183908836016277"},{"id":10,"rep":"anjelica","title":"Quorum x Ocrolus - Income Conversation","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"20m","type":"Client Call","s":{"rq":6,"cd":7,"vd":4,"sa":3,"ce":6},"w":5.25,"tr":53,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Responsive technical support - immediately acknowledged client's integration error and committed to having technical team investigate","Proactive follow-up approach - referenced previous call items and structured the conversation to continue unfinished business"],"opp":["Missed opportunity to validate overall client success and satisfaction while addressing technical issues","Failed to explore expansion opportunities despite active user engagement signals"],"q":"They did say it would work eventually, but it takes a few tries to get the documents to come up","qt":"Client","coach":"While your technical responsiveness was solid, you missed strategic opportunities during this support interaction. When the client mentioned 'a few of them are getting it' and referenced team usage patterns, you could have asked 'How many team members are actively using Ocrolus now compared to when we first launched?' This would uncover adoption metrics and potential expansion signals. Instead of just solving the immediate technical issue, try bridging to value: 'Once we resolve this integration delay, I'd love to understand how the income verification is impacting your loan processing times overall.'","prep":["Follow up on technical resolution and confirm integration errors are resolved","Prepare adoption metrics questions to understand current user engagement levels","Research Quorum's loan volume trends to identify expansion conversation starters"],"url":"https://us-29990.app.gong.io/call?id=7012240070864886291"},{"id":11,"rep":"anjelica","title":"Farm Credit East <> Ocrolus testimonial call","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"20m","type":"Client Call","s":{"rq":6,"cd":4,"vd":3,"sa":2,"ce":7},"w":4.05,"tr":57,"p":{"KDM":0,"CS":1,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Built strong rapport through personal connection about pickleball tournament and shared ICE conference experience","Successfully gathered testimonial content with client providing unprompted positive feedback about implementation speed and team performance"],"opp":["Missed expansion opportunity when client mentioned exploring API connections with other software and agricultural loan potential","Failed to ask discovery questions about specific ROI metrics or quantified business impact from Ocrolus usage"],"q":"This is probably one of the most out of the box technology concepts that we've ever implemented. And there's a lot of value that I see for the organization as a whole with some of the technology components out there.","qt":"Client","coach":"While the rapport-building was excellent, you missed a significant expansion signal when the client said they're 'working with your teams to see what sort of API connections can go along with other softwares' and mentioned 'huge potential' on the agricultural loan side. Instead of just acknowledging this, you could have asked 'Tell me more about those API connections you're exploring - what specific agricultural use cases are you considering?' This would have opened expansion discussions. Additionally, when they mentioned 'a lot of value,' you should have quantified it with 'What does that value look like in terms of time savings or processing efficiency?'","prep":[ <script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}
function authCheck(){
  var e=document.getElementById('auth-email').value.trim().toLowerCase();
  if(e.endsWith('@ocrolus.com')){
    localStorage.setItem('am-scorecard-auth',e);
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(e,'login');
  } else {
    document.getElementById('auth-error').style.display='block';
  }
}
(function(){
  var saved=localStorage.getItem('am-scorecard-auth');
  if(saved && saved.endsWith('@ocrolus.com')){
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(saved,'return_visit');
  }
})();
</script>
