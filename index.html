<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:24px 20px;max-width:960px;margin:0 auto}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:.5px}

.bar{height:4px;background:#1e293b;border-radius:2px;overflow:hidden;width:90px}

.bg-green{background:#10b981}.bg-blue{background:#3b82f6}.bg-amber{background:#f59e0b}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:#10b981}.dot-off{background:#334155}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
.tab{padding:8px 16px;border-radius:7px;background:transparent;border:1px solid #1e293b;text-align:left;transition:all .15s}
.tab.active{border-color:#3b82f6;background:#1e293b}
.tab .name{font-size:13px;font-weight:600}.tab .sub{font-size:10px;color:#475569}
.vtab{padding:4px 10px;font-size:10px;border-radius:4px;border:1px solid #1e293b;background:transparent;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.vtab.active{border-color:#3b82f6;background:#1e293b;color:#93c5fd}
.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}
</style>
</head>

:{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"medium"}},{"id":5,"rep":"anjelica","title":"REV Federal Credit Union x Ocrolus - Auto Conditions Demo","prospect":"Multiple stakeholders","date":"Wed 4/1","dur":"25m","type":"Client Call","s":{"rq":7,"cd":6,"vd":7,"sa":6,"ce":8},"w":6.5,"tr":38,"p":{"KDM":1,"CS":1,"AV":1,"PR":1},"keyAreas":["Retention"],"str":["Strong empathy and responsiveness - immediately acknowledged client pain points and committed to follow-up sessions","Excellent ownership - took detailed notes and created specific action items for addressing client feedback"],"opp":["Missed opportunity to quantify business impact of the pain points mentioned by clients","Could have explored expansion potential around the new conditions feature beyond just addressing current issues"],"q":"I recently had one where I think it was three years worth of pay stubs. We had to manually calculate it because the year to date didn't like the year to date didn't break down the income and the written voe, provided wasn't accurate to us. So we had to manually calculate that and that took hours","qt":"Jenaveve","coach":"While you handled the client feedback well, you missed an opportunity to quantify the business impact when Jenaveve mentioned spending 'hours' on manual calculations. Instead of just saying 'I'm taking notes,' try asking 'How often does this happen per week?' or 'What's the time impact across your team?' This would help build a stronger business case for product improvements and demonstrate deeper strategic thinking about their operational efficiency.","prep":["Schedule individual follow-up sessions with Rhonda and Jenaveve to deep-dive on their specific workflow challenges","Prepare questions to quantify the business impact of manual calculation processes","Research potential product roadmap items that could address the income calculation pain points mentioned"],"url":"https://us-29990.app.gong.io/call?id=1123322968657351741","ml":"AM I ","Prepare questions about their current underwriting timeline and pain points with document collection","Come ready to discuss Ocrolus workflow optimization features beyond basic document processing"],"url":"https://us-29990.app.gong.io/call?id=824941640003365665","ml":"AM I","mls":"The AM demonstrated foundational product knowledge by walking through Ocrolus features and resolving technical questions, but remained reactive throughout the session without proactive discovery or strategic advancement.","val":{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"medium"}},{"id":7,"rep":"anjelica","title":"United Community Bank x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Wed 4/1","dur":"6m","type":"Client Call","s":{"rq":6,"cd":3,"vd":2,"sa":2,"ce":6},"w":3.25,"tr":33,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":[],"str":["Responsive to client technical issues and immediately sought appropriate technical resources","Maintained friendly rapport and asked about recent SME training feedback"],"opp":["Missed opportunity to conduct meaningful discovery during the wait time for technical support","Failed to advance any strategic account objectives or explore expansion opportunities during client engagement"],"q":"They were excited about it","qt":"Client","coach":"While your responsiveness to the technical issue was appropriate, you missed a valuable opportunity to advance the account during the wait time. Instead of just asking about SME training feedback, you could have used discovery questions like 'Now that your team has been through the training, what additional workflows are they considering for Ocrolus?' or 'What's the timeline for rolling this out to more users once we resolve this integration issue?' Even short calls can advance strategic objectives when you prepare 2-3 discovery questions that connect immediate issues to broader business goals.","prep":["Prepare follow-up questions about SME training outcomes and next implementation steps","Research their integration timeline and identify expansion opportunities post-resolution","Develop discovery questions connecting technical progress to business value and volume growth"],"url":"https://us-29990.app.gong.io/call?id=5848208490387205369","ml":"AM I","mls":"The AM was purely reactive, handling a technical issue escalation without proactive discovery or strategic advancement, demonstrating foundational support behaviors.","val":{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"medium"}},{"id":8,"rep":"anjelica","title":"Southern Bank x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Wed 4/1","dur":"34m","type":"Client Call","s":{"rq":7,"cd":4,"vd":6,"sa":5,"ce":6},"w":5.45,"tr":54,"p":{"KDM":1,"CS":1,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Strong technical problem-solving when client reported Freddie/Fannie saving issues","Clear ownership of next steps with specific action items for Laura and Kristen"],"opp":["Missed opportunity to explore expansion with new user group mentioned by client","Limited discovery about client satisfaction or business impact beyond immediate technical issues"],"q":"So we have a new group of users as we expanded last week from last Thursday's training","qt":"Client","coach":"When the client mentioned 'we have a new group of users as we expanded last week from last Thursday's training,' this was a clear expansion signal that went unexplored. Instead of moving directly to technical troubleshooting, try: 'That's great to hear about the expansion - how many new users came on board and what workflows are they focusing on?' This discovery could have revealed additional value opportunities. The technical problem-solving was solid, but balance reactive support with proactive account development by asking about the broader impact of their Ocrolus usage.","prep":["Research the new user expansion mentioned and prepare questions about their onboarding experience","Follow up on the underwriter meeting outcome and how it impacts their Ocrolus workflow","Prepare to discuss product roadmap items that address current technical limitations they experienced"],"url":"https://us-29990.app.gong.io/call?id=8523589648088134985","ml":"AM I","mls":"The AM demonstrated foundational product knowledge and resolved technical issues but remained primarily reactive, addressing client-raised problems without proactive discovery or strategic advancement.","val":{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"high"}},{"id":9,"rep":"anjelica","title":"First Bank TN x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Wed 4/1","dur":"30m","type":"Client Call","s":{"rq":6,"cd":3,"vd":2,"sa":4,"ce":6},"w":3.85,"tr":44,"p":{"KDM":1,"CS":0,"AV":0,"PR":0},"keyAreas":[],"str":["Maintained collaborative tone and facilitated group scheduling effectively","Demonstrated responsiveness by accommodating multiple stakeholders' availability constraints"],"opp":["Missed opportunity to conduct discovery about training needs, current usage challenges, or success metrics","Failed to articulate value or connect training to business outcomes"],"q":"We're doing loans over here, bud, we got loans to close","qt":"Client","coach":"This call was a missed opportunity to understand training objectives and current workflow challenges. When the client mentioned 'we got loans to close,' you could have asked 'How is Ocrolus helping with your current loan volume?' or 'What specific challenges are your underwriters facing that we should address in training?' Instead of pure scheduling logistics, weave in discovery questions like 'What outcomes are you hoping to achieve from this training?' to understand success metrics and tailor the session accordingly.","prep":["Prepare discovery questions about current underwriter/processor challenges with Ocrolus","Research client's loan volume trends and processing metrics","Develop training agenda that connects to spe if(det.ml){const mlc=det.ml.includes("Senior")?"#10b981":det.ml.includes("II")?"#3b82f6":"#8b5cf6";h+=`<div style="margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="tag mono" style="background:${mlc}18;color:${mlc};border:1px solid ${mlc}33;font-size:10px;font-weight:600">${det.ml}</span>`;if(det.mls){h+=`<span style="font-size:11px;color:#64748b;font-style:italic">${det.mls}</span>`}h+=`</div>`}
h+=`</div>`;
h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0" class="detail-grid">`;
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:6px">STRENGTHS</div>`;
det.str.forEach(s=>{h+=`<div class="strength">${s}</div>`});
h+=`</div><div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:6px">OPPORTUNITIES</div>`;
det.opp.forEach(o=>{h+=`<div class="opp">${o}</div>`});
h+=`</div></div>`;
if(det.coach){h+=`<div class="card" style="border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:6px">COACHING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${det.coach}</div></div>`}
if(det.prep&&det.prep.length){h+=`<div class="card" style="border-left:3px solid #10b981"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:8px">NEXT CALL PREP</div>`;det.prep.forEach((p,i)=>{h+=`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:${i<det.prep.length-1?8:0}px"><div style="min-width:18px;height:18px;border-radius:4px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);display:flex;align-items:center;justify-content:center;font-size:9px;color:#10b981;font-weight:600">${i+1}</div><div style="font-size:12px;color:#94a3b8;line-height:1.5">${p}</div></div>`});h+=`</div>`}
if(det.q){h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:4px">KEY QUOTE</div><div style="font-size:13px;color:#e2e8f0;font-style:italic;border-left:3px solid #8b5cf6;padding-left:10px">"${det.q}"${det.qt?` <span class="mono" style="font-size:9px;color:#475569;font-style:normal">${det.qt}</span>`:""}</div></div>`}
h+=`<a href="${det.url}" target="_blank" class="mono" style="font-size:10px;display:inline-block;margin-top:8px">View in Gong →</a>`;
}

h+=`<div style="margin-top:20px;text-align:center;font-size:9px;color:#1e293b" class="mono">AM Scorecard v1.1 · RQ 20% · CD 25% · VD 25% · SA 20% · CE 10% · ${calls.length} calls · ${reps.length} reps</div>`;
el.innerHTML=h;
}
render();
</script>
</div><!-- end dashboard-content -->
<script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}
function authCheck(){
  var e=document.getElementById('auth-email').value.trim().toLowerCase();
  if(e.endsWith('@ocrolus.com')){
    localStorage.setItem('am-scorecard-auth',e);
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(e,'login');
  } else {
    document.getElementById('auth-error').style.display='block';
  }
}
(function(){
  var saved=localStorage.getItem('am-scorecard-auth');
  if(saved && saved.endsWith('@ocrolus.com')){
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(saved,'return_visit');
  }
})();
</script>
