<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:24px 20px;max-width:960px;margin:0 auto}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:.5px}
.card{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:16px;margin-bottom:10px}
.bar{height:4px;background:#1e293b;border-radius:2px;overflow:hidden;width:90px}
.fill{height:100%;border-radius:2px}
.green{color:#10b981}.blue{color:#3b82f6}.amber{color:#f59e0b}.red{color:#ef4444}.purple{color:#8b5cf6}
.bg-green{background:#10b981}.bg-blue{background:#3b82f6}.bg-amber{background:#f59e0b}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:#10b981}.dot-off{background:#334155}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
.tab{padding:8px 16px;border-radius:7px;background:transparent;border:1px solid #1e293b;text-align:left;transition:all .15s}
.tab.active{border-color:#3b82f6;background:#1e293b}
.tab .name{font-size:13px;font-weight:600}.tab .sub{font-size:10px;color:#475569}
.vtab{padding:4px 10px;font-size:10px;border-radius:4px;border:1px solid #1e293b;background:transparent;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.vtab.active{border-color:#3b82f6;background:#1e293b;color:#93c5fd}
.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}
</style>
</head>

const calls=[{"id":1,"rep":"anjelica","title":"First Bank TN x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Wed 3/18","dur":"31m","type":"Client Call","s":{"rq":7,"cd":3,"vd":4,"sa":6,"ce":7},"w":5.05,"tr":36,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":[],"str":["Strong rapport building through casual conversation about meteors and weather, creating comfortable atmosphere","Proactive training coordination by sending multiple scheduling options and accommodating client preferences for virtual format"],"opp":["Missed opportunity to explore business impact or ROI during training discussion - could have asked 'What specific outcomes are you hoping to see from this training rollout?'","Failed to validate current system performance or client satisfaction despite weekly sync format - should have included 'How has the Ocrolus platform been performing for your team this week?'"],"q":"I'm very excited about actually seeing it in dev","qt":"Client","coach":"While the rapport building was excellent, this weekly sync missed opportunities to advance the account strategically. When the client expressed excitement about training, you could have deepened the conversation with 'What specific challenges are you hoping this training will solve for your processors?' Instead of just logistics, explore the business drivers. The call lacked any validation of current platform performance or satisfaction levels - essential elements for a weekly sync. Consider opening future calls with 'Before we dive into training logistics, how has the platform been performing for your team this week?'","prep":["Confirm training dates and finalize attendee lists for processor and underwriter groups","Prepare discovery questions about current platform challenges to inform training focus","Ask about recent loan volume trends and any operational changes affecting Ocrolus usage"],"url":"https://us-29990.app.gong.io/call?id=6223128566048405615"},{"id":2,"rep":"anjelica","title":"Northpoint X Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Thu 3/19","dur":"29m","type":"Client Call","s":{"rq":8,"cd":6,"vd":5,"sa":4,"ce":7},"w":5.85,"tr":43,"p":{"KDM":1,"CS":1,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Strong personal rapport building - the transcript shows extensive personal conversation about travel plans and rodeo experiences that clearly strengthened the relationship","Responsive to client operational needs - immediately addressed notification timing issues and agreed to turn off confusing alerts based on client feedback"],"opp":["Missed expansion conversation - when client mentioned 'the whole processing team is calling your system the big o', the AM could have asked 'How many people are actively using it daily now compared to when we started?'","Limited strategic value discussion - could have explored the impact of income calc improvements on client's business outcomes rather than just troubleshooting technical issues"],"q":"So I should be happy to see the sun but it's not very helpful when you're working","qt":"Client","coach":"While the personal connection was excellent, this call missed strategic opportunities. When the client mentioned 'the whole processing team is calling your system the big o,' instead of just acknowledging the nickname, ask 'That's great to hear - how has adoption grown across your processing team since we started?' This would naturally lead to usage expansion discussions. The income calc conversation stayed purely tactical - after resolving the technical issues, try asking 'How much time is your team saving now that these calculations are more accurate?' to validate ongoing value and potentially uncover additional use cases.","prep":["Prepare usage metrics to show adoption growth since implementation","Research new Ocrolus features that could benefit their processing team workflow","Develop specific ROI questions about time savings from income calculation improvements"],"url":"https://us-29990.app.gong.io/call?id=4892204429085518269"},{"id":3,"rep":"anjelica","title":"FAHM x Ocrolus - Dashboard Q&A Session","prospect":"Multiple stakeholders","date":"Thu 3/19","dur":"78m","type":"Client Call","s":{"rq":3,"cd":4,"vd":6,"sa":2,"ce":7},"w":4.2,"tr":3,"p":{"KDM":1,"CS":1,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Strong product demonstration showing income editing capabilities and changelog features","Responsive support addressing technical questions about dashboard access and underwriter workflows"],"opp":["Missed expansion signals when client mentioned 17 tax returns and 119 rental properties use cases","Limited discovery about broader business impact or satisfaction metrics"],"q":"I could have used that last may one borrower at 17 separate corporate tax returns. I had. A client just the other day... She had 119 rental properties... she ran it through ocrolus, and the borrower didn't end up qualifying, you know, for their program that they were doing, but it had at least saved her some time","qt":"Client","coach":"When the client mentioned handling 17 tax returns and 119 rental properties, this was a perfect moment to explore volume-based expansion. Instead of just acknowledging the pain point, try: 'It sounds like complex deals with multiple entities are common for your team - have you considered our volume pricing for high-document deals?' Also, when they mentioned time savings, dig deeper with: 'Beyond time savings, what other operational improvements have you seen?' The client gave clear expansion signals that went unexplored.","prep":["Prepare volume pricing discussion for complex multi-entity deals","Research their current usage patterns vs. potential expansion opportunities","Develop ROI calculation showing time savings converted to cost benefits"],"url":"https://us-29990.app.gong.io/call?id=1797984843354683654"},{"id":4,"rep":"anjelica","title":"Nations Direct x Ocrolus - Weekly Touch Base","prospect":"Multiple stakeholders","date":"Thu 3/19","dur":"17m","type":"Client Call","s":{"rq":6,"cd":4,"vd":7,"sa":6,"ce":7},"w":5.85,"tr":3,"p":{"KDM":0,"CS":0,"AV":1,"PR":1},"keyAreas":["Expansion"],"str":["Proactive product education - walked the client through the new Fannie Mae feature step-by-step with screen sharing","Solution-oriented follow-through - immediately offered training materials when client requested them"],"opp":["Missed discovery around business impact - could have asked 'What volume of Fannie loans do you process monthly?' to quantify value","No validation of current satisfaction or pain points - should explore how existing Ocrolus usage is performing"],"q":"Do you have, you know how you guys have, you know, your little trainings? Do you have a little training on this that we can send to our team?","qt":"Client","coach":"Strong product demonstration execution, but missed critical discovery opportunities. When the client asked about training materials, you could have followed up with 'How many underwriters will be using this feature?' to understand scale and impact. The client's interest in web-based processing for scenario desk people was a clear expansion signal - instead of just confirming readiness, ask 'What's driving the need for scenario desk access?' to uncover the business case and urgency. This positions you as a strategic advisor, not just a feature demonstrator.","prep":["Follow up on training material delivery and initial user feedback","Prepare business case questions for scenario desk web access expansion","Research typical volume metrics for Fannie Mae processing to frame value discussion"],"url":"https://us-29990.app.gong.io/call?id=3150420865993903907"},{"id":5,"rep":"anjelica","title":"MortgageRight x Ocrolus - Bi-Weekly Sync","prospect":"Multiple stakeholders","date":"Thu 3/19","dur":"18m","type":"Client Call","s":{"rq":6,"cd":4,"vd":3,"sa":5,"ce":3},"w":4.35,"tr":73,"p":{"KDM":0,"CS":1,"AV":1,"PR":0},"keyAreas":["Retention"],"str":["Proactive follow-up on technical issues with specific case numbers and internal coordination","Clear communication of product updates and new features like duplicate handling improvement"],"opp":["Missed opportunity to dig deeper when client said 'I haven't heard anything' about user feedback - could have explored what good feedback would look like","Failed to create urgency around unsigned contracts from October - could have positioned business impact of delayed FHA/VA coverage"],"q":"I haven't nothing at all… but I don't know that it's making it to me though. I guess underwriting, I'd be able to say better, but I definitely haven't heard anything","qt":"Colin","coach":"When Colin mentioned he hasn't heard feedback but 'underwriting would be able to say better,' this was a perfect moment to suggest: 'Would it be valuable to get someone from underwriting on our next call to hear their perspective directly?' This would have advanced multi-threading. Additionally, when discussing the October contract that Tanner hasn't signed, rather than just asking about status, the AM could have said: 'That FHA/VA coverage could protect you on the 41 loans processed this month - should we schedule 10 minutes with Tanner to walk through the terms?' This creates business urgency around the delay.","prep":["Invite underwriting stakeholder to discuss user experience and feedback","Follow up on Tanner's contract signatures with specific business impact messaging","Prepare technical update on ICE integration resolution and timeline"],"url":"https://us-29990.app.gong.io/call?id=6512206696565852810"},{"id":6,"rep":"anjelica","title":"Meeting with Anjelica Purnell","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"25m","type":"Client Call","s":{"rq":6,"cd":4,"vd":7,"sa":5,"ce":6},"w":5.5,"tr":43,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":[],"str":["Provided hands-on technical guidance through screen sharing to resolve document mapping issues","Maintained patience and supportive tone with a self-described 'not tech savvy' client"],"opp":["Missed opportunity to validate overall client success with Ocrolus platform beyond this technical issue","Could have explored whether similar mapping challenges indicate broader workflow optimization needs"],"q":"So once we map, it will automatically go to this verification of employment folder, which is what we would prefer","qt":"Client","coach":"This was effective reactive support, but missed strategic opportunities. When Michelle said 'So once we map, it will automatically go to this verification of employment folder, which is what we would prefer,' Anjelica could have asked 'What other workflow improvements would make the biggest difference for your team's efficiency?' The technical problem-solving was solid, but there was no validation of broader client health or exploration of additional value opportunities. Instead of just resolving the immediate mapping issue, consider asking 'How frequently do you encounter these document categorization challenges, and what impact does that have on your processing time?'","prep":["Follow up on the screenshot Michelle mentioned sending to ensure the mapping issue is fully resolved","Prepare questions about overall document processing workflow efficiency and pain points","Research other Ocrolus features that could optimize their verification of employment processing"],"url":"https://us-29990.app.gong.io/call?id=1429690062158410131"},{"id":7,"rep":"anjelica","title":"Compass Mortgage x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"30m","type":"Client Call","s":{"rq":6,"cd":8,"vd":3,"sa":4,"ce":3},"w":5.2,"tr":47,"p":{"KDM":1,"CS":0,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Deep technical troubleshooting - the transcript shows detailed investigation of employer name parsing issues and E-folder creation problems","Strong client rapport building through personal connection about Vegas trip and maintaining regular weekly touchpoints"],"opp":["Missed opportunity to address client's broader implementation frustration - when client said 'I'm continually surprised at your guys implementation process', AM could have said 'Let me understand your biggest concern about our process and how we can rebuild your confidence'","No exploration of client success metrics or ROI validation despite being in implementation phase"],"q":"I'm continually surprised at your guys implementation process that we were at the bottom of the priority queue for testing","qt":"Client","coach":"When the client expressed deep frustration about implementation quality, you focused on technical fixes but missed the strategic relationship moment. Instead of just acknowledging the technical issues, you could have said 'I hear that this experience isn't meeting your expectations for a established product - let me understand what success looks like for you and create a plan to get us there.' The client's comment about being 'at the bottom of the priority queue' signals a relationship trust issue that needs executive attention, not just technical resolution.","prep":["Escalate implementation concerns internally and come prepared with executive-level response to process issues","Prepare specific timeline and success metrics for resolving E-folder creation problems","Research other client implementation learnings to demonstrate this isn't standard experience"],"url":"https://us-29990.app.gong.io/call?id=5282375941142600272"},{"id":8,"rep":"anjelica","title":"Luxury Mortgage Corp x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"29m","type":"Client Call","s":{"rq":7,"cd":4,"vd":3,"sa":4,"ce":8},"w":4.75,"tr":40,"p":{"KDM":1,"CS":0,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Strong collaborative approach - the transcript shows the AM facilitated detailed product testing with multiple stakeholders present","High client engagement - clients actively participated in troubleshooting and provided specific feedback about document processing"],"opp":["Missed critical opportunity to validate client success - when client mentioned correspondent loans 'not working right for a month', the AM focused on technical resolution without exploring business impact","No exploration of expanded value - despite discovering the client has 1,800+ unused tax forms, the AM didn't discuss optimization or additional use cases"],"q":"Mike and I have been trying to get a correspondent loan through oculus for a month now because we know that it's not right","qt":"Client","coach":"While your collaborative troubleshooting approach built strong rapport, you missed two critical moments to elevate the conversation strategically. When the client said they've been trying to process correspondent loans 'for a month because we know it's not right,' instead of diving into technical details, you could have asked 'What business impact has this processing delay had on your operations?' This would have uncovered the real cost of the issue. Later, when they mentioned having 1,800+ unused tax forms, rather than just acknowledging it, try 'That's interesting - are there workflows where those additional tax documents could add value to your underwriting process?' This positions you as a strategic advisor, not just a problem-solver.","prep":["Quantify business impact of the correspondent loan processing issues over the past month","Research optimization opportunities for the 1,800+ unused tax forms they mentioned","Prepare to discuss product roadmap improvements for correspondent loan processing"],"url":"https://us-29990.app.gong.io/call?id=8308183908836016277"},{"id":9,"rep":"anjelica","title":"Quorum x Ocrolus - Income Conversation","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"20m","type":"Client Call","s":{"rq":6,"cd":7,"vd":4,"sa":3,"ce":6},"w":5.2,"tr":6,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Responsive technical support - immediately acknowledged the integration error and committed to having the technical team investigate","Clear problem-solving approach - asked specific diagnostic questions about whether the error occurs on multiple loans and with multiple users"],"opp":["Missed opportunity to validate overall client satisfaction and success with Ocrolus beyond the technical issue","Could have explored expansion opportunities while discussing the print-to-E-folder functionality that only one team member is using"],"q":"They did say it would work eventually, but it takes a few tries to get the documents to come up","qt":"Client","coach":"While the AM handled the technical issue responsively, they missed strategic opportunities during this problem-solving moment. When the client mentioned 'at least one person in our team that is using the print to E folder option, most of them are not,' the AM could have asked 'What's preventing the rest of your team from adopting that workflow?' This would uncover adoption barriers and potential training needs. Additionally, after acknowledging the technical issue, the AM could have asked 'Beyond this integration hiccup, how is Ocrolus performing against your income verification goals this quarter?' to validate ongoing value and client health.","prep":["Follow up with technical resolution status and any preventive measures implemented","Explore barriers preventing broader team adoption of print-to-E-folder functionality","Validate overall client satisfaction and success metrics beyond the technical issue"],"url":"https://us-29990.app.gong.io/call?id=7012240070864886291"},{"id":10,"rep":"anjelica","title":"Farm Credit East <> Ocrolus testimonial call","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"20m","type":"Client Call","s":{"rq":4,"cd":5,"vd":3,"sa":2,"ce":7},"w":4.05,"tr":0.57,"p":{"KDM":0,"CS":1,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Built genuine rapport through shared conference experience and pickleball conversation","Allowed client to provide extensive positive feedback about implementation success"],"opp":["Missed expansion opportunity when client mentioned agricultural loan potential and API connections","Failed to establish decision-making authority or explore stakeholder involvement"],"q":"This is probably one of the most out of the box technology concepts that we've ever implemented... I am pleasantly surprised to see that we are here before the next ice because usually things take a lot longer","qt":"Client","coach":"Strong rapport building, but you left significant value on the table. When the client mentioned 'agricultural loan side of things that there's some huge potential there' and wanting to explore 'API connections with other softwares,' you should have immediately asked 'Tell me more about that agricultural loan opportunity - what would success look like there?' This was a clear expansion signal that needed exploration. The testimonial format doesn't preclude strategic questions - use phrases like 'For context in the case study, help me understand...' to naturally weave in discovery.","prep":["Research Farm Credit East's agricultural lending division and loan volumes","Prepare specific questions about API integration needs and technical requirements","Identify internal champions who could facilitate agricultural loan expansion"],"url":"https://us-29990.app.gong.io/call?id=2550370883500069361"},{"id":11,"rep":"anjelica","title":"HighTechLending x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Fri 3/20","dur":"31m","type":"Client Call","s":{"rq":7,"cd":8,"vd":6,"sa":5,"ce":8},"w":6.6,"tr":47,"p":{"KDM":1,"CS":1,"AV":1,"PR":0},"keyAreas":["Retention"],"str":["Provided hands-on troubleshooting for document classification issues, walking the client through specific screens","Offered proactive solution for email notifications to improve user experience"],"opp":["Missed opportunity to quantify ROI or business impact when client mentioned operational challenges","Could have explored expansion use cases when discussing underwriter workflow h+=`<div class="card" style="overflow-x:auto"><div class="mono" style="font-size:11px;font-weight:600;color:#93c5fd;margin-bottom:12px;letter-spacing:1px">REP COMPARISON</div><table><thead><tr><th>Metric</th>`;
reps.forEach(r=>{h+=`<th style="text-align:center">${r.name.split(" ")[0]}</th>`});
h+=`</tr></thead><tbody>`;
[{l:"Avg Score",f:r=>r.avg},{l:"Calls",f:r=>r.n},{l:"Profile",f:r=>r.profile},{l:"Pillars %",f:r=>{const rc=calls.filter(c=>c.rep===r.id);const t=rc.length*4;const h2=rc.reduce((s,c)=>s+PK.filter(k=>c.p[k]).length,0);return t?Math.round(h2/t*100)+"%":"0%"}}].forEach(row=>{
h+=`<tr><td style="color:#94a3b8">${row.l}</td>`;
reps.forEach(r=>{const v=row.f(r);h+=`<td style="text-align:center;font-weight:${typeof v==="number"?700:400};color:${typeof v==="number"?sc(v):"#94a3b8"}">${v}</td>`});
h+=`</tr>`;
});
// Dimension comparison
DK.forEach(d=>{
h+=`<tr><td style="color:#94a3b8">${DL[d]} <span style="color:#475569;font-size:9px">(${DW[d]})</span></td>`;
reps.forEach(r=>{
const rc=calls.filter(c=>c.rep===r.id);
const davg=rc.length?(rc.reduce((a,c)=>a+c.s[d],0)/rc.length).toFixed(1):"—";
h+=`<td style="text-align:center;font-weight:600;color:${davg>=8?"#10b981":davg>=7?"#3b82f6":"#f59e0b"}">${davg}</td>`;
});
h+=`</tr>`;
});
h+=`</tbody></table></div>`;
}

// ── OVERVIEW VIEW ──
if(st.view==="overview"&&!det){
h+=`<div class="card" style="margin-bottom:14px;border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Week in Review: ${rd.name}</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${co.narrative}</div></div>`;
// Keep / Start / Stop
h+=`<div class="card" style="margin-bottom:10px"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Coaching: ${rd.name}</div>`;
h+=`<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:6px;letter-spacing:0.5px">✦ KEEP DOING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7;padding-left:10px;border-left:2px solid rgba(16,185,129,0.3)">${co.keep}</div></div>`;
h+=`<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:6px;letter-spacing:0.5px">▲ START DOING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7;padding-left:10px;border-left:2px solid rgba(245,158,11,0.3)">${co.start}</div></div>`;
h+=`<div><div style="font-size:10px;font-weight:600;color:#ef4444;margin-bottom:6px;letter-spacing:0.5px">■ STOP DOING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7;padding-left:10px;border-left:2px solid rgba(239,68,68,0.3)">${co.stop}</div></div>`;
h+=`</div>`;
// Framework Coaching (combined)
if(co.pillarCoaching){
h+=`<div class="card" style="margin-bottom:14px;border-left:3px solid #8b5cf6"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase">Pillar Coaching: ${rd.name}</div>`;
h+=`<div style="font-size:12px;color:#94a3b8;line-height:1.8">${co.pillarCoaching}</div>`;
h+=`</div>`;
}
// Call list (below coaching)
h+=`<div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Calls This Week</div>`;
f.forEach(c=>{
h+=`<div class="card call-row" style="border-left-color:${sc(c.w)}" onclick="st.sel=${c.id};render()"><div style="display:flex;justify-content:space-between;align-items:center;gap:6px"><div style="flex:1;min-width:160px"><div style="font-size:13px;font-weight:600">${c.title}</div><div style="font-size:10px;color:#64748b">${c.prospect} · ${c.date} · ${c.dur}</div></div><div style="display:flex;gap:2px" class="dots-wrap">`;
PK.forEach(k=>{h+=`<span class="dot ${c.p[k]?"dot-on":"dot-off"}"></span>`});
h+=`</div><div style="display:flex;gap:3px;flex-wrap:wrap">`;
if(c.keyAreas)c.keyAreas.forEach(a=>{const ac={Retention:"#10b981",Expansion:"#3b82f6",Advocacy:"#8b5cf6"};h+=`<span class="tag" style="background:${ac[a]||"#475569"}22;color:${ac[a]||"#475569"};border:1px solid ${ac[a]||"#475569"}44">${a}</span>`});
h+=`</div><div style="font-size:18px;font-weight:700;color:${sc(c.w)};min-width:36px;text-align:right">${c.w}</div><div style="color:#475569">›</div></div></div>`;
});
}

// ── PILLARS VIEW ──
if(st.view==="pillars"&&!det){
const pf=PK.map(k=>({k,l:PL[k],n:f.filter(c=>c.p[k]).length,f:f.filter(c=>c.p[k]).length>=Math.ceil(f.length*.7)?"Always":f.filter(c=>c.p[k]).length>=Math.ceil(f.length*.3)?"Sometimes":"Rarely"}));
h+=`<div class="card" style="overflow-x:auto"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">FOUR PILLARS — ${rd.name} (${f.length} calls)</div><table><thead><tr><th>Pillar</th>`;
f.forEach(c=>{h+=`<th style="text-align:center;font-size:9px;max-width:70px">${c.title.split(" ")[0]}</th>`});
h+=`<th style="text-align:center">Freq</th></tr></thead><tbody>`;
pf.forEach(p=>{
h+=`<tr><td><span class="mono" style="color:#93c5fd;font-size:10px;margin-right:3px">${p.k}</span><span style="color:#94a3b8">${p.l}</span></td>`;
f.forEach(c=>{h+=`<td style="text-align:center"><div style="width:18px;height:18px;border-radius:3px;margin:0 auto;display:flex;align-items:center;justify-content:center;background:${c.p[p.k]?"rgba(16,185,129,0.15)":"rgba(100,116,139,0.06)"};color:${c.p[p.k]?"#10b981":"#475569"};font-size:11px;font-weight:600">${c.p[p.k]?"✓":"—"}</div></td>`});
const fc=p.f==="Always"?"#10b981":p.f==="Sometimes"?"#f59e0b":"#ef4444";
const fb=p.f==="Always"?"rgba(16,185,129,0.15)":p.f==="Sometimes"?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.1)";
h+=`<td style="text-align:center"><span class="tag mono" style="background:${fb};color:${fc}">${p.f}</span></td></tr>`;
});
h+=`</tbody></table></div>`;
}

// ── HISTORY VIEW ──
if(st.view==="history"&&!det){
const repHist=history.map(w=>{const rh=w.reps.find(r=>r.id===st.rep);return rh?{weekOf:w.weekOf,...rh}:null}).filter(Boolean);
if(history.length<3){
h+=`<div class="card" style="text-align:center;padding:40px 20px">`;
h+=`<div style="font-size:48px;margin-bottom:12px;opacity:0.3">📊</div>`;
h+=`<div style="font-size:16px;font-weight:600;color:#64748b;margin-bottom:6px">Collecting History</div>`;
h+=`<div style="font-size:12px;color:#475569;line-height:1.6">Score trends and weekly coaching will appear here after 3 weeks of data.<br>`;
h+=`<span style="color:#3b82f6;font-weight:600">${history.length}/3 weeks</span> collected so far.</div>`;
h+=`<div style="margin-top:16px;display:flex;gap:6px;justify-content:center">`;
for(let i=0;i<3;i++){
h+=`<div style="width:32px;height:32px;border-radius:6px;border:2px solid ${i<history.length?"#10b981":"#1e293b"};background:${i<history.length?"rgba(16,185,129,0.1)":"transparent"};display:flex;align-items:center;justify-content:center;font-size:11px;color:${i<history.length?"#10b981":"#475569"}">${i<history.length?"✓":i+1}</div>`;
}
h+=`</div></div>`;
} else {
// Score trend table
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">SCORE TREND — ${rd.name}</div>`;
h+=`<table><thead><tr><th>Week</th><th style="text-align:center">Avg</th><th style="text-align:center">Calls</th>`;
DK.forEach(d=>{h+=`<th style="text-align:center">${DL[d].slice(0,3)}</th>`});
h+=`</tr></thead><tbody>`;
repHist.forEach(w=>{
h+=`<tr><td class="mono" style="color:#94a3b8;font-size:10px">${w.weekOf}</td>`;
h+=`<td style="text-align:center;font-weight:700;color:${sc(w.avg)}">${w.avg}</td>`;
h+=`<td style="text-align:center;color:#8b5cf6">${w.n}</td>`;
DK.forEach(d=>{
const v=w.scores[d];
h+=`<td style="text-align:center;color:${v>=8?"#10b981":v>=7?"#3b82f6":"#f59e0b"}">${v.toFixed(1)}</td>`;
});
h+=`</tr>`;
});
h+=`</tbody></table></div>`;

// Visual trend bars
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">WEEKLY TREND</div>`;
h+=`<div style="display:flex;align-items:end;gap:8px;height:60px;padding:0 4px">`;
repHist.forEach((w,i)=>{
const pct=Math.max(((w.avg-5)/5)*100,5);
h+=`<div style="flex:1;text-align:center"><div style="height:${pct}%;background:${sc(w.avg)};border-radius:3px 3px 0 0;min-height:8px;margin:0 auto;max-width:40px;position:relative">`;
h+=`<div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:${sc(w.avg)}">${w.avg}</div>`;
h+=`</div><div class="mono" style="font-size:8px;color:#475569;margin-top:4px">${w.weekOf.slice(5)}</div></div>`;
});
h+=`</div></div>`;

// Weekly coaching history
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">COACHING HISTORY — ${rd.name}</div>`;
repHist.slice().reverse().forEach(w=>{
h+=`<div class="history-week"><div class="mono" style="font-size:10px;color:#64748b;margin-bottom:6px">Week of ${w.weekOf}</div>`;
h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px">`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#10b981;margin-bottom:2px">KEEP</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.keep}</div></div>`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#f59e0b;margin-bottom:2px">START</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.start}</div></div>`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#ef4444;margin-bottom:2px">STOP</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.stop}</div></div>`;
h+=`</div></div>`;
});
h+=`</div>`;
}
}

// ── CALL DETAIL VIEW ──
if(det){
h+=`<button class="vtab mono" onclick="st.sel=null;render()" style="margin-bottom:10px">← Back</button>`;
h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px"><div><h2 style="font-size:16px;font-weight:700"><a href="${det.url}" target="_blank" style="color:#e2e8f0;text-decoration:none;border-bottom:1px solid #3b82f6;padding-bottom:1px;transition:color .15s" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#e2e8f0'">${det.title} ↗</a></h2><div style="font-size:11px;color:#64748b;margin-top:2px">${det.prospect} · ${det.date} · ${det.dur} · ${det.type}</div><div style="font-size:10px;color:#475569">Talk: <span style="color:${det.tr<=60?"#10b981":"#f59e0b"}">${det.tr}%</span></div></div><div style="text-align:center"><div style="font-size:28px;font-weight:700;color:${sc(det.w)}">${det.w}</div><div class="mono" style="font-size:9px;color:#475569">WEIGHTED</div></div></div>`;
DK.forEach(d=>{
const s=det.s[d];const bg=sc(s);
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0"><span style="font-size:11px;color:#94a3b8;min-width:110px">${DL[d]} <span style="color:#475569;font-size:9px">(${DW[d]})</span></span><div style="display:flex;align-items:center;gap:6px"><div class="bar"><div class="fill" style="width:${s*10}%;background:${bg}"></div></div><span style="font-size:11px;font-weight:600;color:${bg};min-width:20px">${s}</span></div></div>`;
});
h+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px">`;
PK.forEach(k=>{h+=`<div class="tag mono" style="background:${det.p[k]?"rgba(16,185,129,0.12)":"rgba(100,116,139,0.06)"};color:${det.p[k]?"#10b981":"#475569"};border:1px solid ${det.p[k]?"rgba(16,185,129,0.25)":"#1e293b"}">${k} <span style="font-size:8px;font-weight:400">${PL[k]}</span></div>`});
h+=`</div>`;
if(det.keyAreas&&det.keyAreas.length){h+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">`;const ac={Retention:"#10b981",Expansion:"#3b82f6",Advocacy:"#8b5cf6"};det.keyAreas.forEach(a=>{h+=`<span class="tag" style="background:${ac[a]||"#475569"}22;color:${ac[a]||"#475569"};border:1px solid ${ac[a]||"#475569"}44;font-size:10px">${a}</span>`});h+=`</div>`}
h+=`</div>`;
h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0" class="detail-grid">`;
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:6px">STRENGTHS</div>`;
det.str.forEach(s=>{h+=`<div class="strength">${s}</div>`});
h+=`</div><div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:6px">OPPORTUNITIES</div>`;
det.opp.forEach(o=>{h+=`<div class="opp">${o}</div>`});
h+=`</div></div>`;
if(det.coach){h+=`<div class="card" style="border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:6px">COACHING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${det.coach}</div></div>`}
if(det.prep&&det.prep.length){h+=`<div class="card" style="border-left:3px solid #10b981"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:8px">NEXT CALL PREP</div>`;det.prep.forEach((p,i)=>{h+=`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:${i<det.prep.length-1?8:0}px"><div style="min-width:18px;height:18px;border-radius:4px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);display:flex;align-items:center;justify-content:center;font-size:9px;color:#10b981;font-weight:600">${i+1}</div><div style="font-size:12px;color:#94a3b8;line-height:1.5">${p}</div></div>`});h+=`</div>`}
if(det.q){h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:4px">KEY QUOTE</div><div style="font-size:13px;color:#e2e8f0;font-style:italic;border-left:3px solid #8b5cf6;padding-left:10px">"${det.q}"${det.qt?` <span class="mono" style="font-size:9px;color:#475569;font-style:normal">${det.qt}</span>`:""}</div></div>`}
h+=`<a href="${det.url}" target="_blank" class="mono" style="font-size:10px;display:inline-block;margin-top:8px">View in Gong →</a>`;
}

h+=`<div style="margin-top:20px;text-align:center;font-size:9px;color:#1e293b" class="mono">AM Scorecard v1 · RQ 20% · CD 25% · VD 25% · SA 20% · CE 10% · ${calls.length} calls · ${reps.length} reps</div>`;
el.innerHTML=h;
}
render();
</script>
</div><!-- end dashboard-content -->
<script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}
function authCheck(){
  var e=document.getElementById('auth-email').value.trim().toLowerCase();
  if(e.endsWith('@ocrolus.com')){
    localStorage.setItem('am-scorecard-auth',e);
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(e,'login');
  } else {
    document.getElementById('auth-error').style.display='block';
  }
}
(function(){
  var saved=localStorage.getItem('am-scorecard-auth');
  if(saved && saved.endsWith('@ocrolus.com')){
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(saved,'return_visit');
  }
})();
</script>
</body>
