const calls=[
{id:1,rep:"sam",title:"HMA X Ocrolus",prospect:"Amy (Consultant)",date:"Tue 3/10",dur:"44m",type:"Demo",stage:"Pricing",s:{r:8,d:9,v:9,a:9,c:8,e:9},w:8.55,tr:46,m:{M:1,E:1,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Steph's transparency built trust","Amy volunteered ROI argument","Pricing + follow-up booked on call"],opp:["Probe partner approval deeper","Ask about competition"],q:"I'll give you a 1-day turn if you use the tool.",coach:"Best call of the week — and for good reason. The team selling dynamic with Steph was exceptional. Steph's transparency about product limitations didn't weaken the pitch — it actually built trust. Amy felt respected enough to volunteer her own ROI argument, which is the holy grail of selling: the prospect articulating why they should buy before you have to tell them.<br><br>The pricing discussion landed with no sticker shock, and you booked both pricing and follow-up on the call — that's exactly the kind of deal control that separates good reps from great ones. Given this was a pricing-stage call with a consultant, the MEDDPICC elements that surfaced naturally (Pain, Decision Process, Champion) were the right ones for this stage — you didn't force coverage, it flowed from the conversation.<br><br>Where to sharpen: when Amy said she'd present this internally, that was a critical moment you let pass. You should have mapped the full decision process right there: 'Walk me through what happens after you present this to your team — who else weighs in, and what does their timeline look like?' Understanding the internal path to yes is what turns a strong demo into a closed deal. Also, when Amy mentioned partner approval concerns, try labeling the emotion: 'It sounds like the approval process is weighing on you.' Labels like this feel empathetic but they're actually diagnostic — they surface the real blocker so you can help remove it.",prep:["Map Amy's internal decision process — who else needs to approve beyond her?","Prepare a one-pager Amy can use to present internally (ROI summary, key differentiators)","Ask about the partner approval timeline and whether there are specific concerns to address","Probe competitive landscape: 'What else has your team looked at?'"],url:"https://us-29990.app.gong.io/call?id=244902142835132322"},
{id:2,rep:"sam",title:"Superior Natl Bank POV",prospect:"Bill, Nicole, Denise",date:"Tue 3/10",dur:"25m",type:"POV Check-in",stage:"Testing",s:{r:7,d:7,v:8,a:7,c:8,e:8},w:7.60,tr:55,m:{M:0,E:0,DC:0,DP:1,IP:1,Ch:1,Co:0},str:["Nicole validated self-employed calcs","Transparent union borrower handling"],opp:["Quantify ROI from errors found","Probe AI policy timeline"],q:"The ones I found appeared to be accurate.",coach:"Nicole validating the self-employed calculations is a clear champion signal — she's doing the work of proving the product to herself, which means she's already mentally bought in. Your handling of the union borrower complexity was transparent and trust-building, which is exactly right for a POV check-in.<br><br>The biggest missed opportunity on this call was quantification. When Nicole said 'the ones I found appeared to be accurate,' that was your golden moment to turn her validation into a business case. Try: 'That's great to hear, Nicole — if you're catching these discrepancies on every file, what does that save you in rework hours per month? Ten hours? Twenty?' When the prospect puts their own number on the pain, it's 10x more powerful than when you do it. That number becomes the ROI story that sells this deal internally.<br><br>The AI policy mention was a buried buying signal that you let pass. Bill mentioned it casually, but it could be a real blocker or just a formality — you don't know because you didn't explore it. A simple mirror — just repeating 'AI policy?' — would have drawn out the full story. Mirrors feel almost too simple, but they work because they signal curiosity without judgment. The other person fills the silence with exactly the context you need.<br><br>For MEDDPICC, covering Decision Process and Champion on a mid-stage POV check-in is appropriate. But Metrics should be your #1 target next call — the accuracy validation gives you the opening to quantify.",prep:["Prepare ROI calculation: get Nicole to quantify time saved per file during next check-in","Ask about the AI policy timeline and who owns that approval process","Identify the Economic Buyer — ask Nicole: 'When you're ready to move forward, who on your side approves the budget?'","Bring a comparison report showing before/after accuracy on their test files"],url:"https://us-29990.app.gong.io/call?id=967853026113172916"},
{id:3,rep:"sam",title:"Republic Bank",prospect:"Tim, Sonya",date:"Tue 3/10",dur:"54m",type:"First Demo",stage:"Early Eval",s:{r:7,d:7,v:7,a:6,c:7,e:8},w:7.20,tr:46,m:{M:0,E:0,DC:0,DP:1,IP:1,Ch:0,Co:0},str:["Authentic humor landed well","Processing mgr asked fraud questions"],opp:["Initiate pricing for $7B bank","Book follow-up live"],q:"I work for a bank. So I think of crazy sh*t.",coach:"The humor connected with Tim in a genuine way — the 'crazy sh*t' moment showed authentic rapport that you can't fake. Tim felt comfortable enough to be himself, which means you set the right tone from the opening. That's a real strength.<br><br>But here's the issue: this is a $7B bank, and the deal advancement was the softest of all your calls this week. When Tim said 'follow up in about a week,' that was the defining moment of this call — and you let him drive. For a deal this size, you need to take control of the timeline. Try: 'Tim, I'd love that — and I want to make sure I bring you exactly what you need. Let me lock in Wednesday at 2pm so I can have the security answers and a preliminary pricing model ready. Does that work, or is Thursday better?' Giving two options feels collaborative but keeps you in the driver's seat.<br><br>Sonya, the processing manager, asking about fraud detection was a strong engagement signal that you should be actively channeling. She's showing interest in a specific use case — that's potential champion material. Follow up with her directly: 'Sonya, you had great questions about the fraud detection capabilities. Would it make sense for me to do a focused 20-minute deep dive on that with you and your team?' This creates a second thread into the account and builds your champion from the operations side.<br><br>For a first demo with a $7B bank, you also need to start planting the seed on Metrics. Try: 'Tim, banks your size typically process X thousand files a month — what does that look like for Republic?' Get the baseline numbers early so you can build the ROI case in the next conversation.",prep:["Send Tim a summary email within 24 hours with security answers and a proposed Wednesday 2pm follow-up","Reach out to Sonya directly with a fraud detection deep-dive offer","Research Republic Bank's loan volume to prep preliminary ROI numbers","Prepare initial pricing framework appropriate for a $7B institution","Ask about their evaluation process: 'How does Republic typically evaluate new technology vendors?'"],url:"https://us-29990.app.gong.io/call?id=8048322502833316181"},
{id:4,rep:"sam",title:"Shea Mortgage Demo",prospect:"Kelly, Tim, Matt (CFO)",date:"Tue 3/10",dur:"47m",type:"Demo (2nd)",stage:"Pricing",s:{r:8,d:8,v:8,a:7,c:8,e:9},w:7.85,tr:50,m:{M:0,E:1,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Kelly validated product to own CFO","CFO highly engaged on tech"],opp:["Create urgency when prospect stalls","Quantify ROI with CFO present"],q:"I vote you keep her. She's good.",coach:"Two things went really well here. First, Kelly validated the product to her own CFO on the call — that's textbook champion activation. She's not just interested, she's advocating. Second, Matt (the CFO) asking probing technical questions means he's genuinely engaged, not just sitting in out of obligation. A CFO who leans into product details is a rare and valuable signal.<br><br>Here's where this call fell short: you had a CFO in the room and you didn't speak his language. Matt thinks in dollars, margins, and ROI — not in features and workflows. When you had his attention, that was the moment to reframe everything in financial terms: 'Matt, your team processes X files per month. At your current error rate, what does rework cost you annually? We typically see teams cut that by 60%.' You should have had a pre-built ROI model ready for this second demo — knowing the CFO would be in the room, that's table stakes preparation.<br><br>The close was too passive. 'Let us get our numbers and reach back out' gives them all the control and you none of the timeline. Instead, try: 'Matt, I completely understand you need to run the numbers internally. How about I send you a preliminary ROI model today based on what we've discussed, and we block 20 minutes next Tuesday to walk through it together? That way we can make sure the numbers reflect your actual workflow.' This respects their process while maintaining your momentum.<br><br>One more thing: Kelly saying 'I vote you keep her' about your product to her own CFO is gold. That quote should be in your back pocket for every future conversation with this account.",prep:["Build a custom ROI model for Shea Mortgage using their file volume and rework estimates","Send Matt the ROI model with a proposed 20-minute review meeting for next week","Ask Kelly privately: 'What concerns do you think Matt might have about moving forward?'","Probe competition: 'Are you evaluating any other solutions alongside us?'","Prepare a one-page executive summary Matt can share with his finance team"],url:"https://us-29990.app.gong.io/call?id=1884016992800208423"},
{id:5,rep:"sam",title:"VanDyk Pricing Review",prospect:"Jeanie, Lindsay",date:"Wed 3/11",dur:"14m",type:"Pricing",stage:"Board Approval",s:{r:8,d:7,v:7,a:9,c:8,e:8},w:7.85,tr:52,m:{M:0,E:0,DC:1,DP:1,IP:0,Ch:1,Co:0},str:["Andrew's close got verbal commit","No sticker shock on $130K"],opp:["Outline SLA protections proactively","Ask what objections board may raise"],q:"You're front and center.",coach:"The verbal commit on $130K with zero sticker shock tells you the groundwork you laid in prior calls was effective — the value narrative landed before the price did. Andrew's closing assist was well-timed team selling. This is a deal that's moving in the right direction.<br><br>At the board approval stage, your job shifts from selling to enabling. Jeanie is your champion, and she's about to walk into a room and sell this for you. The question is: did you arm her with everything she needs? You should have asked: 'Jeanie, when you present this to the board, what questions do you think they'll push back on? Let me help you build the case.' This does two things — it shows you care about her success (not just the deal), and it gives you intel on potential objections before they surprise you.<br><br>Try an accusation audit here: 'You're probably thinking $130K is a big ask for the board — especially if they haven't seen a live demo.' Saying the scary thing out loud defuses it. Jeanie will either say 'Actually, they're fine with the budget' (great news) or she'll tell you what the real concern is (even better, because now you can address it). Either way, you learn something you didn't know before.<br><br>The SLA conversation is a missed opportunity to derisk the board presentation. If Jeanie can say 'they guarantee X uptime and Y turnaround,' that removes a category of board objection entirely. Offer it proactively next call.",prep:["Send Jeanie a board-ready one-pager: ROI summary, SLA terms, implementation timeline","Ask: 'What questions do you think the board will push back on? Let me help you prep.'","Offer to join the board meeting or be on standby for live Q&A","Proactively outline SLA protections and include them in the proposal","Set a follow-up for the day after the board meeting to debrief"],url:"https://us-29990.app.gong.io/call?id=5284007527972607206"},
{id:6,rep:"kyle",title:"Mission Mortgage Demo",prospect:"Multiple stakeholders",date:"Mon 3/9",dur:"61m",type:"Full Demo",stage:"Initial Demo",s:{r:7,d:8,v:8,a:7,c:8,e:8},w:7.75,tr:48,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["Comprehensive 61-min full product demo","Strong Encompass integration positioning"],opp:["ID champion and econ buyer earlier","Quantify business impact during demo"],q:"",coach:"The Encompass integration positioning was the strongest section — deep product knowledge with engaged prospects throughout. The 61-minute runtime reflects genuine interest from the prospect team, which is a strong signal.<br><br>The strategic miss is champion and economic buyer identification. Questions like 'Who on your team would drive this decision forward internally?' and 'What does the approval process typically look like?' feel conversational but they map MEDDPICC in the middle of the demo. These should be standard before the 30-minute mark on any first call.<br><br>Business impact was not quantified during the demo itself. When showing a feature that saves time, anchoring it immediately compounds the value: 'For a team processing 300 files a month, this typically saves 15-20 hours per week. What does that look like for your team?' Prospects who do the math themselves create their own urgency.",prep:["Follow up with a 'key takeaways' email highlighting the 2-3 capabilities they reacted to most","Identify who was most engaged and reach out for a focused follow-up with them","Ask about their evaluation process and timeline","Probe: 'Who else should be involved as you evaluate this further?'","Prepare a tailored ROI estimate based on what you learned about their volume"],url:"https://us-29990.app.gong.io/call?id=5012764401525604158"},
{id:7,rep:"kyle",title:"Gulf Coast Bank POV",prospect:"Multiple stakeholders",date:"Mon 3/9",dur:"56m",type:"Refresher + POV",stage:"POV Setup",s:{r:8,d:8,v:8,a:8,c:8,e:8},w:8.00,tr:45,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Effective refresher tailored to bank","Smooth demo-to-POV transition"],opp:["Discuss bank-specific ROI metrics","Probe competitive landscape"],q:"",coach:"The demo-to-POV transition was seamless — you set clear success criteria for the POV, which is strong Decision Criteria work. The bank-specific tailoring showed you did your homework, and the prospects noticed. This is a well-run call.<br><br>The development area is metrics. For a bank POV, you need to establish baseline numbers before testing starts — otherwise you have nothing to compare results against. Before the first test file goes through, ask: 'What's your current cost per file and average processing time? That way when we review the POV results, we can measure the exact delta.' This is the setup for a quantified business case that writes itself at the end of the POV.<br><br>Competition is your blind spot again — not probed on this call. For a bank evaluating a POV, they're likely looking at alternatives. A casual calibrated question works perfectly: 'What other solutions have you evaluated so far?' or 'How did you end up looking at Ocrolus specifically?' These feel like natural curiosity but they give you positioning intel. If they're comparing you to someone, you need to know who and on what criteria — it changes how you present your POV results.",prep:["Send baseline metrics worksheet for them to fill out before testing begins","During POV, check in weekly with a 15-minute call to monitor progress","Ask: 'What other solutions have you looked at or are currently evaluating?'","Prepare a bank-specific ROI template that maps to their regulatory environment","Identify who the economic buyer is for this initiative"],url:"https://us-29990.app.gong.io/call?id=1018191465795230656"},
{id:8,rep:"kyle",title:"Mortgage Fin Svcs POV",prospect:"Kelly, Susan, Karen",date:"Mon 3/9",dur:"34m",type:"POV Kickoff",stage:"POV Active",s:{r:9,d:8,v:8,a:9,c:9,e:9},w:8.60,tr:44,m:{M:1,E:0,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Outstanding rapport — Waymo story","Kelly prepped 11 files unprompted — champion activated"],opp:["Probe budget/economic buyer","Confirm decision timeline post-POV"],q:"Until I test it, I don't believe a damn word you say.",coach:"This was the second-best call of the week and it shows why rapport matters. The Waymo story created a personal connection that made this feel like a partnership, not a sales call. And Kelly prepping 11 test files before the call even started? That's elite champion activation — she's selling internally without being asked. You earned that by setting clear POV success criteria and making her feel like a partner in the process.<br><br>Kelly's quote — 'Until I test it, I don't believe a damn word you say' — is actually one of the best buying signals on any call this week. It sounds negative but it means she cares enough to be skeptical, which means she's invested in the outcome. Here's the move you missed: mirror it. Just repeat her words back: 'You don't believe a damn word we say?' Then pause. She'll fill that silence with her past vendor experiences — every disappointment, every broken promise. That intel is gold for the rest of this deal because now you know exactly what she's afraid of, and you can proactively address it.<br><br>The one structural gap: you never asked who signs off on the budget. Kelly is your champion, but she may not be the economic buyer. Before the POV results come in, you need to know this: 'Kelly, when the POV results look good and you're ready to move forward, who on your side signs off on the investment?' If you wait until after the POV to ask this question, you've added weeks to the timeline.",prep:["Ask Kelly: 'When the POV results look good, who signs off on the budget?'","Confirm the decision timeline: what happens after POV results are reviewed?","Prepare a POV results template that quantifies time saved, accuracy improvement, and cost reduction","Check in with Kelly mid-POV to see how testing is going — maintain the partnership dynamic","Ask about post-POV concerns: 'What would make you hesitate even if the results are strong?'"],url:"https://us-29990.app.gong.io/call?id=5670717139300812606"},
{id:9,rep:"kyle",title:"HomeBridge NFTYDoor",prospect:"Noel, Frank, Erica",date:"Tue 3/10",dur:"33m",type:"Contract Close",stage:"Closing",s:{r:9,d:8,v:8,a:10,c:9,e:9},w:8.90,tr:42,m:{M:1,E:1,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Deal closed on the call — 1yr contract, same-day signature","Planted Optima POS upsell for phase 2"],opp:["Pin exact implementation kickoff date","Share change mgmt resources"],q:"Ocrolus is the giant double-island Viking fridge kitchen.",coach:"This is the highest-scored call across all reps this week — and it deserves to be. Same-day signature on a 1-year contract, a phase 2 upsell already planted, and you navigated a complex org change (NFTYDoor departure) by reframing disruption as opportunity. That's elite deal execution.<br><br>The 'Viking fridge kitchen' analogy from the prospect is the most important signal on this call. When a buyer creates their own metaphor for your value, they've internalized the narrative. They're not repeating your pitch — they're telling themselves why they bought. This is exactly what great selling produces: the prospect articulates their own future state in language that's more compelling than anything you could say. File this as a reference story for your other deals.<br><br>The one refinement: you should have pinned the implementation kickoff date on the call. The contract is signed, but without a specific go-live date, implementation can drift. Try: 'What's the latest date your team could go live and still hit your May targets?' This creates urgency through their own timeline, not yours. You should also offer change management resources proactively — a smooth implementation protects the relationship and sets up the phase 2 conversation.<br><br>Study this call. It's the model for how you want every deal to close: prepared, controlled, and with the next opportunity already seeded.",prep:["Pin the implementation kickoff date — send calendar invite for kickoff meeting this week","Share change management resources and onboarding timeline","Set a 30-day check-in to review initial usage and begin phase 2 (Optima POS) conversation","Document this deal as a case study: org change navigation + same-day close","Send a personal thank-you note to Noel, Frank, and Erica"],url:"https://us-29990.app.gong.io/call?id=7311205256574420592"},
{id:10,rep:"kyle",title:"TexasBank Test-Drive",prospect:"Multiple stakeholders",date:"Tue 3/10",dur:"42m",type:"POV Test-Drive",stage:"POV Active",s:{r:8,d:8,v:8,a:8,c:8,e:8},w:8.00,tr:47,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Structured POV with clear test params","Good SE team selling"],opp:["Quantify expected efficiency gains","Probe competitive evaluation"],q:"",coach:"Well-structured POV test-drive — clear parameters, good SE team selling dynamic, and the prospects stayed engaged throughout. All dimensions scored consistently at 8, which reflects solid execution across the board.<br><br>The next conversation is where this deal gets won or lost. Start with a self-discovery question: 'Now that you've seen the results on your own files, how does this compare to your current process in terms of time and accuracy?' When the prospect articulates the gap themselves — 'It was faster' or 'The accuracy was better than what we're doing now' — that's more powerful than any slide deck. Follow up immediately with: 'If you could get that kind of improvement across all your files, what would that mean for your team's capacity?' Let them build their own business case.<br><br>Competition remains your blind spot — you didn't probe it on this call, and it's a pattern across your week. At the POV stage, a direct question is appropriate and expected: 'Are you evaluating anyone else alongside us, or are we the primary solution you're testing?' If they are comparing, you need to know now — it changes how you present results. If they're not, that's even better intel because it means you're the frontrunner.",prep:["Prepare POV results summary with quantified before/after metrics","Start the next call with: 'How did the results compare to your current process?'","Ask directly: 'Are you evaluating anyone else alongside us?'","Identify the economic buyer: 'Who approves the budget for a tool like this?'","Propose a results review meeting with the decision-maker present"],url:"https://us-29990.app.gong.io/call?id=564170903269650994"},
{id:11,rep:"kyle",title:"Steadfast Mortgage",prospect:"Multiple stakeholders",date:"Thu 3/12",dur:"60m",type:"Deep Demo",stage:"Active Eval",s:{r:8,d:8,v:9,a:7,c:8,e:8},w:8.00,tr:48,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["60-min demo shows strong engagement","Good workflow pain discovery"],opp:["Firmer next steps with date","ID and engage economic buyer"],q:"",coach:"The pain discovery on this call was strong — specific workflow friction points were identified that the prospect had not fully articulated themselves. That is why value articulation scored a 9, the highest single dimension across all calls this week. Teaching prospects something new about their own inefficiencies is what separates a demo from a consulting conversation.<br><br>The pattern worth noting: exceptional demos that do not close with a firm next step. Advancement scored a 7 — same issue as Mission Mortgage. Strong engagement deserves a strong close. Try: 'Based on what you have seen today, the logical next step is a focused pricing conversation with whoever owns the budget — can we get that on the calendar for next week?' This does two things at once: identifies the economic buyer and advances the deal with a specific date. If they push back, the response reveals where they really are in the evaluation.",prep:["Send a follow-up with 2-3 key pain points they identified and proposed solutions","Propose a pricing conversation: 'Based on what we covered, I'd like to bring you a pricing model — who should be in that meeting?'","Ask about their evaluation timeline: 'When does your team need to make a decision by?'","Identify the economic buyer before the next meeting","Prepare a tailored business case based on the workflow pain points discussed"],url:"https://us-29990.app.gong.io/call?id=6001985602965987747"},
{id:12,rep:"kyle",title:"Mega Capital Proposal",prospect:"Multiple stakeholders",date:"Thu 3/12",dur:"21m",type:"Proposal",stage:"Pricing",s:{r:8,d:8,v:8,a:9,c:9,e:8},w:8.45,tr:44,m:{M:1,E:1,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Concise 21-min pricing walkthrough","Mutual next steps with timeline"],opp:["Probe competitive alternatives","Confirm internal approval process"],q:"",coach:"This is how pricing conversations should run. 21 minutes, concise, with mutual next steps and a clear timeline. No wasted time, no unnecessary demo rehash — just business. The call control (9) and advancement (9) reflect tight execution. For a pricing-stage conversation, you naturally surfaced the MEDDPICC elements that matter most — Metrics, Economic Buyer, Decision Process — which shows strong deal awareness.<br><br>The one gap that concerns me is Competition — and at the pricing stage, that's the most dangerous blind spot you can have. If there's an alternative being evaluated, it changes your entire pricing strategy. You might be competing on price against a cheaper option, or competing on capability against a different type of solution. Either way, you need to know. Here's a move that surfaces competition and objections in a single question: 'Is there any reason you wouldn't move forward with this proposal by end of month?' This is a 'no'-oriented question — it invites them to say what's wrong, which feels safe. If they say 'no reason,' you've just gotten a soft commit. If they say 'well, we're also looking at X,' you've just learned the most important thing about this deal.<br><br>The mutual action plan with timeline is textbook deal control — keep doing this. You've built a strong picture of this deal over multiple conversations — the key qualification elements have emerged naturally through your process. Competition is the remaining blind spot that could derail an otherwise well-qualified deal.",prep:["Follow up with a formal proposal document and timeline","Ask: 'Is there any reason you wouldn't move forward by end of month?'","Confirm the internal approval process: 'Walk me through what happens after you review the proposal'","Set a specific date for their decision or follow-up","Prepare responses to potential competitive objections in case they surface"],url:"https://us-29990.app.gong.io/call?id=6210740012227288150"},
{id:14,rep:"charlie",title:"NH Mutual Demo",prospect:"Multiple stakeholders",date:"Mon 3/9",dur:"64m",type:"Full Demo",stage:"Initial Demo",s:{r:7,d:8,v:8,a:7,c:7,e:8},w:7.60,tr:52,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["Thorough 64-min Encompass demo","Strong prospect question engagement"],opp:["Build champion explicitly — identify who asked the most questions and follow up directly","Quantify business impact during the demo to anchor the value proposition"],q:"",coach:"Prospect engagement on this call was legitimately strong — a high volume of questions is one of the best buying signals on a first demo. It means they are mentally applying the product to their own workflow. The 64-minute runtime reflects that genuine interest, which is a strong foundation to build on.<br><br>The champion gap is the most important miss. With a room full of people, the question is: who is going to carry this forward internally? After the demo, review notes — who asked the most questions? Who reacted most strongly? Follow up with that person directly: 'I noticed you had great questions about the income workflow — would it make sense for me to do a focused 20-minute deep dive with you and your team?' This creates an internal advocate. Without a champion, this deal risks stalling.<br><br>Talk ratio (52%) is worth watching on first demos. The more the prospect talks, the more they reveal and the more invested they feel in the outcome.",prep:["Identify who asked the most questions and reach out for a focused follow-up","Ask: 'Who else should be involved as you evaluate this?'","Send a tailored follow-up highlighting the 2-3 capabilities that got the strongest reaction","Prepare a shorter, focused deep dive (30 min max) for the next meeting","Research NH Mutual's loan volume to prepare preliminary ROI estimates"],url:"https://us-29990.app.gong.io/call?id=6974865037967602683"},
{id:16,rep:"spencer",title:"Absolute Home Demo",prospect:"Multiple stakeholders",date:"Wed 3/5",dur:"34m",type:"Demo",stage:"Initial Demo",s:{r:7,d:8,v:8,a:7,c:7,e:8},w:7.70,tr:50,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["Solid demo structure","Good technical depth"],opp:["Identify champion explicitly","Probe competition and timeline"],q:"",coach:"The demo structure was clean and the technical depth was solid — the prospect was able to follow along and ask relevant questions throughout. That's a good foundation. Your discovery score (8) shows you're asking the right questions to uncover pain and understand their process. These are real positives to build on.<br><br>The two gaps are champion building and competitive intelligence — and they're related. Without a champion, you don't have someone inside the account advocating for you. Without competitive intel, you don't know what you're up against. Both need to become standard parts of your call closing.<br><br>For champion building, try this at the end of every first demo: 'Who on your team would be the best person to evaluate this further with us? I'd love to set up a focused 20-minute session with them on the capabilities that matter most to your workflow.' This creates your internal advocate and gives you a reason for the next meeting. The person who asks the most questions during the demo is usually your champion candidate.<br><br>For competition and timeline, one calibrated question covers both: 'How does your team typically evaluate new technology — is there a process you go through?' This surfaces the Decision Process, timeline, and Competition all at once. If they say 'We're looking at a few options,' you know the competitive landscape. If they say 'We haven't really done this before,' you know you need to help them build an evaluation process — which puts you in a position of influence.<br><br>Your talk ratio (50%) is fine for a demo, but aim for 40-45% on your next first call. The more they talk, the more you learn.",prep:["Identify who was most engaged and reach out for a focused follow-up","Ask: 'How does your team typically evaluate new technology?'","Ask: 'Who else should be involved in the evaluation?'","Research Absolute Home's volume to prepare a preliminary ROI estimate","Open the next call with a label: 'It seems like processing efficiency is a big priority for your team right now'"],url:"https://us-29990.app.gong.io/call?id=8643301461981605040"},
{id:18,rep:"sam",title:"LCF X Ocrolus",prospect:"Rob, Alka",date:"Mon 3/9",dur:"21m",type:"Discovery",stage:"Early Discovery",s:{r:7,d:6,v:7,a:7,c:6,e:6},w:6.45,tr:44,m:{M:0,E:0,DC:0,DP:1,IP:1,Ch:0,Co:1},str:["Successfully expanded the conversation beyond extraction to broader analytics value proposition", "Identified key stakeholders (Saleem, Julia, Alka) and their roles in the decision process", "Secured concrete next step to connect with Saleem directly for deeper technical evaluation"],opp:["Sam let the SE (David) and prospect drive too much of the conversation \u2014 only 34% of words were from the Ocrolus team leads", "Missed opportunity to quantify pain or establish metrics around the competitor evaluation already underway"],q:"We had our best day at LCF ever on Friday. Just did so many deals. We smashed our old record by like 30 percent.",qt:"5:12",coach:"This was a solid multi-stakeholder call where you effectively navigated a complex org chart at LCF. You identified that Rob, Alka, Julia, and Saleem all play different roles in this evaluation, which is critical for mapping the decision process. Your instinct to push the conversation beyond pure extraction toward analytics and better decision-making was the right move.<br><br>That said, you were relatively passive on this call. With five speakers and a lot of internal LCF dynamics playing out, you let David and the prospect drive much of the discussion. In a call like this, you want to be the one asking the calibrated questions that steer the conversation toward pain and impact. Rob volunteered that competitors are getting better every day — that was a golden thread to pull on, and it deserved a deeper follow-up.<br><br>The close was clean — you got direct access to Saleem and a clear next step. But I would have liked to see you establish a timeline or mutual action plan. When Rob says competitors are improving, that creates urgency you can anchor to. Next time, try something like: 'Rob, given the competitive pressure you are describing, what does your timeline look like for making a decision here?'<br><br>For the Saleem call, come prepared with specific analytics use cases that tie back to Rob's comments about decision-making quality. The more you can connect Ocrolus capabilities to LCF's stated goal of avoiding bad decisions, the stronger your position will be against the pure extraction competitors.",prep:["Prepare 2-3 specific analytics use cases showing how Ocrolus helps lenders make better decisions (not just extract data)", "Research LCF's current tech stack and any public info on their risk model approach", "Draft a brief one-pager for Saleem comparing pure extraction tools vs. Ocrolus full analytics platform", "Coordinate with David on demo talking points that emphasize the analytics and fraud detection capabilities", "Confirm meeting time with Saleem and CC Rob for visibility as promised"],url:"https://us-29990.app.gong.io/call?id=1411451468748071693"},
{id:19,rep:"sam",title:"First Bank Mortgage ROI",prospect:"Chris",date:"Mon 3/9",dur:"25m",type:"ROI Review",stage:"Mid-Evaluation",s:{r:8,d:6,v:8,a:7,c:7,e:6},w:6.9,tr:82,m:{M:1,E:0,DC:0,DP:0,IP:1,Ch:0,Co:1},str:["Excellent rapport building \u2014 extended small talk about Chris's son created genuine personal connection", "Strong ROI walkthrough with editable investment summary that empowered Chris to customize", "Good competitive awareness \u2014 probed on DDA and other tools Chris has evaluated"],opp:["Talk ratio of 82% is far too high for a mid-stage call \u2014 Chris barely spoke during the ROI section", "No economic buyer identified \u2014 Chris mentioned a CFO rubber-stamps vendors but Sam did not explore that relationship"],q:"Soon, soon we need this. I think we need a tool that can calculate income by reading tax returns.",qt:"21:30",coach:"The rapport game on this call was exceptional. The extended conversation about Chris's son, his job changes, and Texas weather felt natural and genuine. Chris clearly feels comfortable with you, which is a strong foundation for this deal. The ROI walkthrough was well-structured and the editable format is smart — it gives Chris ownership of the numbers.<br><br>The biggest issue here is your talk ratio at 82%. For a 25-minute call where you are presenting an ROI, some skew is expected, but this is extreme. You were doing most of the talking during the pricing section when Chris should have been reacting, asking questions, and revealing his internal buying criteria. When Chris asked 'application or funded loan?' — that was a great buying signal showing he was thinking about real cost. You handled it well, but there were not enough moments like that because you were in presentation mode.<br><br>Chris revealed two critical pieces of information: he needs AI approval (which he says is a formality) and the CFO does vendor approval. You acknowledged these but did not dig deeper. Who approves the AI usage? What is the CFO's typical process? These are Decision Process gaps that could slow you down later. Chris also mentioned evaluating DDA and other tools — you asked about timeline but did not probe what criteria he is using to compare.<br><br>For the next conversation, flip the ratio. Send the ROI doc ahead of time, let Chris fill in his numbers, and use the call to discuss what he found. That will naturally reduce your talk time and increase his engagement. Also, get a clear picture of the approval process before you send the agreement.",prep:["Send ROI calculator and reference customer materials to Chris as promised", "Draft initial agreement for Chris to review with Eli and legal", "Prepare questions about the AI approval process and CFO vendor review timeline", "Identify a reference customer similar to First Bank Mortgage in size and use case", "Plan for a lower talk ratio on the next call \u2014 send materials ahead so Chris can react rather than absorb"],url:"https://us-29990.app.gong.io/call?id=8398116141473897164"},
{id:20,rep:"sam",title:"Armed Forces Bank Demo",prospect:"Tim, John, Brian",date:"Wed 3/12",dur:"45m",type:"Demo",stage:"Early Discovery / Demo",s:{r:8,d:7,v:8,a:7,c:7,e:8},w:7.35,tr:48,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:0},str:["Excellent multi-stakeholder engagement \u2014 John (lending leader) and Tim both contributed actively throughout", "Strong competitive positioning without being heavy-handed \u2014 referenced past LTE/Prism failure naturally", "Identified Holly Dowd as the real decision maker and secured an ICE conference meeting with her"],opp:["No pricing discussion despite a 45-minute call with engaged prospects \u2014 missed window to anchor value", "Did not establish metrics or quantify the pain around their scalability challenges"],q:"And just saving time like heck, we might give you our job, our obstacle job because they are so busy they can not see straight.",qt:"35:20",coach:"Strong demo call.. You and David (SE) did a great job handling a room with multiple stakeholders who each had different interests. Tim gave you a gift early by identifying Holly Dowd as the real decision maker and you smartly locked in a meeting with her at ICE next week. That is excellent deal navigation.<br><br>The engagement from John was outstanding — he was asking forward-looking questions about the 'run' phase, not just the 'crawl,' which signals genuine interest in a deeper partnership. Tim's comment about giving you their 'obstacle job' because his team is overwhelmed is a powerful pain statement that you should reference in every future conversation with this account. That is the kind of quote that belongs in your executive summary.<br><br>Where I want to see improvement is on the metrics side. John talked about scalability challenges and capacity swings from 75% to 125% — but nobody quantified that in dollars or hours. How many extra hires do they make during peaks? What does that cost? How many loans fall through during capacity crunches? These numbers would make your value proposition concrete for Holly and Scott when you meet them at ICE.<br><br>Also, Tim brought up a failed experience with LTE/Prism — that is competitive intel gold. You acknowledged it but did not dig into what specifically went wrong. Understanding their past vendor failure in detail will help you position against it and address their objections proactively with the operations team.",prep:["Prepare a one-page brief for the Holly and Scott meeting at ICE focused on scalability and fraud detection", "Quantify the cost of their peak/valley staffing challenge \u2014 prepare a framework to walk through with Holly", "Send collateral materials to Tim, John, and Brian as promised", "Coordinate with David on ICE meeting logistics and demo readiness", "Research Armed Forces Bank product mix (VA-heavy) and tailor the value prop accordingly"],url:"https://us-29990.app.gong.io/call?id=8525800101550911208"},
{id:21,rep:"sam",title:"Arvest Demo",prospect:"Chase, Stephanie, Jordan, Tabby",date:"Wed 3/12",dur:"52m",type:"Demo",stage:"Re-engagement Demo",s:{r:7,d:7,v:8,a:7,c:7,e:7},w:7.15,tr:60,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["SE Stephanie drove excellent product depth \u2014 covered income calculators, classification, and inspect capabilities thoroughly", "Good change management positioning \u2014 addressed adoption concerns proactively with training and onboarding details", "Prospect team asked highly specific operational questions showing genuine evaluation intent"],opp:["Sam was largely absent during the demo portion \u2014 Stephanie carried the call while Sam set up and closed", "Did not identify or engage an economic buyer \u2014 Chase and David are systems/analyst roles, not budget holders"],q:"I don't know if anybody else wants to unmute and talk, but, you know, this is great.",qt:"38:00",coach:"The Arvest demo was technically strong and Stephanie did an excellent job handling the product walkthrough. The prospect team was engaged — Stephanie (prospect) asked detailed questions about compliance, access controls, and income types, which shows genuine operational interest. The change management discussion was a nice touch and clearly resonated with this group.<br><br>My concern is your visibility on this call. In a 52-minute call with five Arvest stakeholders, your SE did the majority of the heavy lifting. You opened well, set context, and closed with next steps at ICE — but the middle 40 minutes were largely Stephanie's show. As the AE, you need to be the one connecting product capabilities to business outcomes. When Stephanie (prospect) asked about limiting access to certain roles, that was a buying signal about adoption concerns — you should have jumped in to share how other clients have handled phased rollouts.<br><br>The data point David shared about 2,900-3,000 hours per year on manual document review is a massive pain metric that you should be building your entire business case around. That number should be front and center in your follow-up and any pricing discussions. Convert that to dollars and you have a compelling ROI story.<br><br>For ICE, make sure you have a clear agenda for the Chase and David meeting. They are your internal champions but you still need to map the economic buyer and decision process. Who signs off on a tool like this at Arvest?",prep:["Calculate ROI based on the 2,900-3,000 hours per year manual review metric David provided", "Prepare a follow-up matrix of questions asked vs. answers provided, including items Stephanie needed to follow up on", "Identify the economic buyer at Arvest \u2014 Chase and David are influencers, not decision makers", "Plan the ICE meeting agenda with Chase and David \u2014 focus on next steps and timeline, not just relationship building", "Follow up on the specific capabilities Stephanie promised to research (permanent residency card detection, title/appraisal roadmap)"],url:"https://us-29990.app.gong.io/call?id=3123780725277988364"},
{id:22,rep:"sam",title:"Superior National Bank Pricing",prospect:"Bill",date:"Thu 3/13",dur:"16m",type:"Pricing",stage:"Late-stage / Contract",s:{r:8,d:5,v:7,a:9,c:7,e:8},w:7.05,tr:65,m:{M:1,E:1,DC:0,DP:1,IP:0,Ch:0,Co:0},str:["Bill is ready to buy \u2014 'that is a no brainer, that is easy' on Tier 1 pricing shows strong buying signal", "Clean deal advancement \u2014 agreement to be drafted and sent same day with clear execution timeline", "Good rapport and personal connection with Bill throughout"],opp:["Did not explore the multi-year option more assertively \u2014 Bill was clearly open to it but Sam did not push", "Missed opportunity to identify other stakeholders or expand the deal scope beyond the initial tier"],q:"That is a no brainer that is easy. Okay, great. I am comfortable with tier one.",qt:"12:45",coach:"This is a deal that is ready to close and you handled the pricing call efficiently. Bill came in hot — he already knew he wanted to move forward, had his AI approval in process, and was thinking about timelines. The pricing walkthrough was clear and Bill's immediate math ('10,000 divided by 28.50 is 351 units') shows he was actively calculating the value.<br><br>Where I want to push you is on deal size. Bill said 'tier one, one year, that is where my brain is going.' You acknowledged that and moved to draft the agreement. But Bill also said 'almost guaranteed we would come back' — that is an opening for a multi-year conversation. You mentioned the option but did not quantify the savings of a longer commitment. Even if Bill lands on one year now, planting the seed of a two-year deal with better pricing could increase your ACV.<br><br>The discovery on this call was minimal, which is expected for a pricing call, but you did not ask about growth plans, additional use cases, or how success would be measured. Bill has 42 LOs and is doing about 150 funded loans — if volume grows, you want to have already framed Ocrolus as the scalability partner. That positions you well for the renewal conversation.<br><br>The execution plan is solid: draft agreement today, Bill reviews with Eli and legal next week, AI approval comes through, CFO rubber stamps. Make sure you stay on top of each of those milestones so nothing stalls quietly.",prep:["Draft and send the Tier 1 agreement to Bill before end of day as promised", "Prepare a brief multi-year pricing comparison in case Bill or the CFO ask about longer commitment options", "Set calendar reminders for each milestone: AI approval, legal review, CFO sign-off", "Identify the onboarding team and prepare for a quick rollout \u2014 Bill wants to start by end of March", "Send the NDA and ROI documentation as discussed"],url:"https://us-29990.app.gong.io/call?id=6142338344488977399"},
{id:24,rep:"sam",title:"LCF Follow-up with Saleem",prospect:"Saleem",date:"Thu 3/13",dur:"24m",type:"Discovery / Value Demo",stage:"Mid-Discovery",s:{r:7,d:8,v:8,a:6,c:7,e:6},w:7.1,tr:51,m:{M:0,E:0,DC:0,DP:0,IP:1,Ch:0,Co:1},str:["David (SE) asked excellent technical discovery questions about risk models, roll rates, and data sources", "Strong competitive positioning \u2014 differentiated Ocrolus from pure extraction tools by emphasizing analytics and fraud detection", "Identified Decision Logic as an existing tool and positioned Ocrolus as a consolidation/upgrade play"],opp:["Advancement was weak \u2014 ended with 'let us know what makes sense' rather than a specific next step with a date", "Did not connect the fraud detection and analytics capabilities to quantifiable business impact for LCF"],q:"Yeah, good question. Yeah, that is done by a different team like, how do they do it? I have no idea. Is it manual? Is it automated? No idea.",qt:"14:20",coach:"Technically rich follow-up with Saleem and David drove an excellent discovery conversation about LCF's risk models, data sources, and fraud detection processes. The revelation that Saleem has 'no idea' how his team matches Decision Logic data to bank statements is a major pain indicator — it means there is a manual process happening somewhere that nobody fully understands. That is exactly where Ocrolus can create value.<br><br>David's competitive positioning was sharp — telling Saleem 'if the goal is just pure extraction, I would not use any of us' was a bold and honest move that differentiated Ocrolus from the pack. It reframed the conversation from cost-per-extraction to value-of-analytics, which is exactly where you want to be.<br><br>The weakness here was in deal advancement. You closed with 'let us know what makes sense' and 'we would love to run a brief test.' That is too passive for a prospect who just told you he has no visibility into a critical manual process in his own organization. You should have proposed a specific test with a specific date. Something like: 'Saleem, it sounds like there is a real gap in how Decision Logic data gets matched today. What if we ran a test with five of your recent applications next week so you can see exactly what that automated matching looks like?'<br><br>Saleem also asked about pricing at the end — and you deflected well by positioning the premium as justified by depth. But make sure you follow up with a concrete pricing framework before the next conversation so Saleem can socialize it internally with Julia and Rob.",prep:["Prepare a specific test proposal with a defined scope (number of applications, timeline, success criteria)", "Create a comparison document showing Ocrolus analytics vs. Decision Logic for the bank statement matching use case", "Follow up with Rob to confirm alignment and keep him engaged as the executive sponsor", "Draft preliminary pricing for Alka and the team to review ahead of the next meeting", "Research LCF's portfolio size and fraud exposure to quantify the potential ROI of the analytics suite"],url:"https://us-29990.app.gong.io/call?id=5436352310965188010"},
{id:25,rep:"kyle",title:"MFS POV Results Sync",prospect:"Kelly, Debbie, Tracy, Steve",date:"Thu 3/13",dur:"42m",type:"POV Review",stage:"Late-stage POV",s:{r:8,d:7,v:9,a:8,c:8,e:9},w:7.95,tr:68,m:{M:1,E:0,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Outstanding value demonstration \u2014 walked through live POV files with underwriters, showing real income calculations and getting real-time validation", "Reps and warrants discussion drove powerful buying signal from Kelly about guaranteed income figures", "Excellent deal advancement \u2014 secured specific follow-up meeting (Wednesday 3/24 at 10:30 ET) with commercial numbers ready"],opp:["Economic buyer still unidentified \u2014 Kelly is the champion but who signs the check? Must be resolved before March 24th commercial meeting", "Could have paused more during the income walkthrough to let underwriters process and react before moving to the next file"],q:"We, this is huge, I mean, and we would love to see... that is what is killing our underwriters right now is trying to go in and extract and analyze all of that data.",qt:"22:15",coach:"One of the strongest calls of the week. You ran a masterful POV review by using live, active Encompass files that the underwriting team recognized and could validate in real time. That was not a canned demo — it was proof that Ocrolus works on their actual data, and it resonated deeply. Debbie's comment that this is 'huge' and that the buy now pay later detection is 'what is killing our underwriters' is the kind of visceral pain acknowledgment that closes deals.<br><br>The income calculation walkthrough was technically excellent. You went line by line through the Mobley file, showed how overtime income was flagged as declining, and then asked the underwriters how they would have handled it. That is Challenger teaching at its best — you taught them something about their own process while simultaneously validating the product. Kelly's question about reps and warrants shows she is already thinking about risk mitigation in a production environment, which is a late-stage buying signal.<br><br>Your advancement was strong — you locked in a specific date, got agreement on including more reviewed files by then, and promised commercial numbers. The one thing I want you to tighten up is the economic buyer identification. Kelly is clearly your champion, but when she says 'I need to compare and look at hopefully more income reviewed files,' she is building a case for someone. Find out who that someone is and whether they need to be in the March 24th meeting.<br><br>The competitive angle is also worth noting — Kelly mentioned a correspondent lender already using Ocrolus. That is social proof you can leverage. Make sure you have a reference customer ready if the executive team asks during the commercial discussion.",prep:["Prepare commercial pricing options for the March 24th meeting \u2014 include tiered options based on volume", "Review all POV files and prepare a summary scorecard showing accuracy rates and efficiency gains", "Identify the economic buyer and determine if they should be in the next meeting", "Have a reference customer ready (especially the correspondent lender Kelly mentioned) for social proof", "Send the income worksheet cheat sheet to Kelly, Debbie, and Tracy as promised"],url:"https://us-29990.app.gong.io/call?id=7231037630984299077"},
{id:26,rep:"charlie",title:"AACU POV Alignment",prospect:"Susan",date:"Tue 3/11",dur:"22m",type:"POV Planning",stage:"Early-Mid / Pre-POV",s:{r:8,d:6,v:7,a:7,c:6,e:6},w:6.6,tr:76,m:{M:0,E:0,DC:0,DP:1,IP:1,Ch:0,Co:1},str:["Strong rapport with Susan \u2014 natural conversation about St. Patrick's Day, ICE, and ACUMA conferences", "Good competitive positioning by acknowledging competitor landscape without being defensive", "Secured concrete next step (April 2nd follow-up) and NDA execution as the gating item"],opp:["Talk ratio of 76% is too high \u2014 Charlie dominated the conversation and Susan had limited opportunity to elaborate on her needs", "Did not dig into the Lender Toolkit relationship Susan mentioned \u2014 she said their program is 'embedded' in Ocrolus, which deserved exploration"],q:"Well, you know, it is interesting. I had a quick demo with Lender Toolkit a few days ago and they said your program is embedded in theirs?",qt:"15:40",coach:"Good relationship with Susan and the rapport on this call was genuine. The conversation flowed naturally from personal topics to business, and Susan seems comfortable with you. The POV planning process is moving forward with the NDA as the next gating item and April 2nd as the follow-up date.<br><br>The biggest area for improvement is your talk ratio. At 76%, you were doing three-quarters of the talking on a call where you should have been listening more. Susan made several interesting comments — about budget constraints last year, about her role on the AI curriculum advisory board, about the Lender Toolkit demo — and each one deserved deeper exploration. When Susan said Lender Toolkit told her Ocrolus is embedded in their system, that was a significant competitive intelligence moment. You should have asked: 'That is interesting — what did you think of what they showed you? How does that compare to what you are looking for?'<br><br>Susan also mentioned she has not been authorized to sign the NDA yet, which hints at internal processes you have not fully mapped. Who authorizes her? Is there a vendor management process? These are Decision Process questions that will determine your timeline. You mentioned you are one of four sales reps — that personal touch was nice for building credibility, but make sure the conversation stays focused on Susan's needs, not your organizational structure.<br><br>For April 2nd, come with a clear POV kickoff plan and be ready to move fast if the NDA is signed. Susan said she is 'kind of sad' she is not going to ICE — that tells you she is engaged in the industry and values being current. Use that.",prep:["Follow up on NDA status before April 2nd \u2014 do not wait for the meeting to find out", "Research the Lender Toolkit partnership and prepare a clear explanation of how it relates to Ocrolus", "Prepare a POV kickoff plan with timeline, success criteria, and team involvement requirements", "Plan for a lower talk ratio on April 2nd \u2014 prepare 5-6 calibrated questions about AACU's evaluation criteria and decision process", "Send relevant case studies from similar credit unions or community lenders"],url:"https://us-29990.app.gong.io/call?id=5410910146830569630"},
{id:27,rep:"charlie",title:"Intelliloan Demo",prospect:"Stephanie, Rosie, Rachel, Daryl, Courtney",date:"Tue 3/11",dur:"55m",type:"Demo",stage:"Early Discovery / Demo",s:{r:7,d:7,v:8,a:8,c:7,e:7},w:7.3,tr:52,m:{M:1,E:0,DC:1,DP:1,IP:1,Ch:0,Co:0},str:["Excellent engagement from the prospect team \u2014 Rosie asked detailed operational questions about bank statement analysis and income documentation", "Strong deal advancement \u2014 secured NDA as next step with POV kickoff planned for the following week", "Good discovery around workflow \u2014 identified that docs come through a portal to unassigned folders, which positions the classification value prop well"],opp:["Did not probe on the competitive landscape \u2014 Stephanie mentioned evaluating other tools but Charlie did not dig into specifics", "Economic buyer still unclear \u2014 Stephanie is the point of contact but mentioned needing to 'talk to my team,' suggesting she is not the final decision maker"],q:"Go ahead and send that over. I think there is some form that I probably have to have you sign, but you know, if you want to go and send that over, we will get that vendor management process or that NDA process started.",qt:"48:30",coach:"The Intelliloan demo was well-executed and the engagement from the prospect team was strong. Having five stakeholders on the call — including underwriters and processors — is a great sign of organizational interest. Rosie in particular asked highly specific questions about bank statement analysis, alimony documentation, and missing months detection that show she was evaluating this against her real workflow.<br><br>Your SE Stephanie McNabb delivered an excellent technical demo, and you did a good job of weaving in higher-level business context when appropriate. The pricing discussion was handled smoothly — you positioned the $20K minimum as an implementation-waiver plus credits model, which Stephanie (prospect) seemed to accept without pushback. At 100-150 loans ramping to 200, the math works and you framed it well.<br><br>The advancement was solid — NDA as the immediate next step, POV kickoff targeted for the following week, and Stephanie agreed to initiate vendor management on her end. That shows mutual commitment to moving forward.<br><br>Where I would push you is on the discovery side. You identified the workflow (portal to unassigned folders, manual sorting) but you did not quantify the pain. How many hours per week is the team spending on document management? What is the error rate? How does that impact turn times? These numbers will be critical when you need to justify the investment to whoever Stephanie reports to. Also, Stephanie said she needs to 'talk to my team' — find out who that is and whether they need to see the product before a decision is made.",prep:["Send the mutual NDA to Stephanie before end of day as promised", "Prepare a POV kickoff plan with clear success criteria tied to document classification accuracy and time savings", "Follow up on the specific questions Rosie asked about alimony, child support, and social security detection capabilities", "Identify the economic buyer \u2014 who does Stephanie report to and what is the vendor approval process?", "Calculate estimated time savings based on their current workflow (100-150 loans, portal to unassigned folders, manual sorting)"],url:"https://us-29990.app.gong.io/call?id=1050506643799865648"},
{id:28,rep:"charlie",title:"Presidential POV Review #2",prospect:"Dan, Brooke, Lori, Tracy, Josh",date:"Tue 3/11",dur:"48m",type:"POV Review",stage:"Late-stage POV",s:{r:8,d:7,v:8,a:9,c:8,e:9},w:8.0,tr:43,m:{M:0,E:1,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Outstanding engagement \u2014 multiple underwriters actively tested complex files and provided real-time feedback", "Excellent competitive intelligence \u2014 probed on Gateless testing status and learned they have not gotten to income yet", "Strong deal advancement \u2014 locked in debrief on 3/19 with commercial numbers and plan to involve executive leadership"],opp:["Could have leveraged Brooke's statement 'there are so many things I do love about it' to ask for a formal endorsement or internal champion commitment", "Did not quantify the time savings from the files already reviewed during the POV"],q:"I mean, there are so many things I do love about it. I love the hovering instinct. I like the bank statement piece, you know, I, I don't know, it just, I love the way it just categorizes pulls everything out.",qt:"36:45",coach:"Excellent POV review call and arguably the strongest call you had this week. The Presidential team tested complex files — they even broke your rental income record with 108 properties — and the feedback was overwhelmingly positive. Brooke's unprompted statement about loving multiple features is a powerful champion signal.<br><br>Your call control was outstanding. With eight people on the call, you managed transitions smoothly, kept the conversation focused, and made sure multiple voices were heard. The competitive intelligence gathering was sharp — you asked directly about Gateless and learned they have not even gotten to income calculations yet. That gives you a significant timing advantage if you can move this to commercial quickly.<br><br>The advancement was the best of your calls this week. You locked in a specific date (Thursday 3/19 at 4 PM), promised commercial numbers, and acknowledged the need to involve executive leadership. The plan to record the meeting if leadership cannot attend and schedule a follow-up the following week shows you are thinking about multi-threaded deal management.<br><br>One thing I would do differently: when Brooke said 'there are so many things I do love about it,' that was the moment to ask her to be your internal champion explicitly. Something like: 'Brooke, that means a lot coming from someone who has tested this hands-on. When we get to the commercial conversation with Josh and the leadership team, would you be willing to share that perspective with them?' Turning implicit champions into explicit ones is what separates good deals from great ones.<br><br>Also, do not forget the record-breaking borrower with 108 rental properties. That is a story worth telling in your debrief — it proves Ocrolus can handle the edge cases that no competitor can touch.",prep:["Prepare commercial pricing for the 3/19 debrief \u2014 include options that align with Presidential's volume", "Create a POV summary document highlighting key wins: rental property record, income accuracy, bank statement categorization", "Confirm whether executive leadership (Josh) will attend the 3/19 meeting \u2014 if not, plan the follow-up week", "Prepare competitive comparison points vs. Gateless for the commercial discussion", "Quantify time savings from the POV files reviewed and convert to dollar impact for the executive presentation"],url:"https://us-29990.app.gong.io/call?id=6750637752140431328"},
{id:29,rep:"charlie",title:"Ocrolus Demo for Felix",prospect:"Felix, Bob, Ryan, Sean, Suzanne",date:"Thu 3/13",dur:"61m",type:"Demo",stage:"Early Discovery / Demo",s:{r:7,d:7,v:8,a:8,c:7,e:8},w:7.4,tr:51,m:{M:0,E:0,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Excellent engagement from Bob \u2014 asked probing technical questions about the human verification process and AI confidence scoring", "Strong competitive positioning \u2014 prospect is testing another vendor simultaneously, and Charlie navigated that cleanly", "Secured a specific POV kickoff date (Friday 3/20 or Monday/Tuesday following week) with the right stakeholders"],opp:["Technical difficulties at the start (Google Meet vs. Zoom) created a rocky first impression \u2014 should have verified platform compatibility beforehand", "HFA product mix (40% of their business) was identified but not deeply explored as a differentiation angle"],q:"This was a great demonstration. It was a great conversation and I am looking forward to testing with you guys.",qt:"52:30",coach:"Strong first demo with a well-engaged prospect team. Bob's enthusiasm at the end — calling it a 'great demonstration' and saying he is 'looking forward to testing' — is exactly the outcome you want from a first demo.<br><br>The SE tag-teaming was effective — business context and commercial framing paired with strong technical content. Bob's questions about the human verification process and AI confidence scoring show he is a technically sophisticated buyer who values accuracy. Lean into that in future conversations.<br><br>The competitive dimension is important. They are testing another vendor simultaneously, and suggesting the same people evaluate both tools was a strong strategic move — it positions for a fair comparison and signals confidence. The HFA angle (40% of their business) is a potential differentiator worth exploring deeper — if Ocrolus handles HFA-specific requirements better than the competitor, that could be the deciding factor.<br><br>Deal advancement was strong — POV kickoff locked in, Sean's schedule accommodated, and the follow-up email with preparation guidance keeps control of the process.",prep:["Send a Zoom link for all future meetings \u2014 confirm with Felix's team that Zoom works for them", "Prepare a POV test plan that specifically addresses HFA use cases and investor overlays", "Research the competitor they are testing and prepare differentiation points", "Follow up email with preparation instructions for the POV kickoff as promised", "Identify the economic buyer \u2014 Felix seems to be the internal champion but who makes the final decision?"],url:"https://us-29990.app.gong.io/call?id=735977720935232116"},
{id:30,rep:"charlie",title:"Service Credit Union Discovery",prospect:"Tyler",date:"Thu 3/13",dur:"27m",type:"Discovery",stage:"Early Discovery",s:{r:7,d:8,v:7,a:7,c:7,e:7},w:7.25,tr:75,m:{M:1,E:0,DC:0,DP:1,IP:1,Ch:0,Co:0},str:["Excellent discovery across multiple business lines \u2014 identified both mortgage and consumer/auto loan use cases with massive volume (8,000 auto apps/month)", "Good understanding of the decision process \u2014 Tyler outlined the vendor evaluation path clearly (AVP of lending, VP of real estate)", "Identified Meridian Link and Bluesage as their tech stack, showing strong technical discovery"],opp:["Talk ratio of 75% is too high for a discovery call \u2014 Charlie should be asking more and talking less", "Did not quantify the pain in dollar terms \u2014 8,000 auto apps with 4-8 docs each is a huge manual burden but no time/cost estimate was discussed"],q:"If they find the value and they think it works, they would move forward and we tend to sign things.",qt:"22:00",coach:"Productive first discovery call with Tyler at Service Credit Union. You uncovered a dual opportunity — both mortgage and consumer/auto lending — with significant volume. Eight thousand auto loan applications per month with 4-8 documents each is a massive operational burden that Ocrolus can directly address. That is potentially a much larger deal than a mortgage-only engagement.<br><br>Your discovery questions were well-targeted. You quickly identified their tech stack (Bluesage, Meridian Link), their document intake process (portal with manual review), and their decision-making structure (Tyler evaluates, AVP of lending and VP of real estate decide by vertical). Tyler even told you 'we tend to sign things' once the vertical leaders see value — that is critical Decision Process intelligence.<br><br>The area for improvement is your talk ratio at 75%. For a first discovery call, you want to be closer to 50/50 or even 40/60 in the prospect's favor. You spent significant time explaining Ocrolus capabilities when Tyler was willing to share information. The fraud detection example (Beacon Funding, 6-7 fraudulent apps per month) was a nice case study, but you could have asked Tyler about their fraud exposure first and then tailored the story.<br><br>The next step structure is good — follow-up invite for 3/19, Tyler will meet with AVP of lending and VP of real estate early next week, and you will send documentation. Tyler's request for 'a list of questions so I can make sure I have all the information' is a strong buying signal — he is doing your job for you by preparing for the internal sell. Make sure those questions are strategic and help him build the business case.<br><br>The auto loan opportunity could be the bigger play here. Make sure you understand the consumer lending workflow as well as the mortgage side before the next meeting.",prep:["Send documentation and case studies to Tyler as promised, covering both mortgage and consumer/auto use cases", "Prepare the list of questions Tyler requested \u2014 focus on volume, current process pain, and decision criteria for each vertical", "Research Service Credit Union's auto lending operation and identify specific pain points in document processing at scale", "Send calendar invite for 3/19 at the same time", "Prepare a two-track proposal framework: one for mortgage, one for consumer/auto, showing how they can evaluate both simultaneously"],url:"https://us-29990.app.gong.io/call?id=512639078247501348"},
{id:31,rep:"spencer",title:"Home Financing Center Proposal",prospect:"Quinton",date:"Tue 3/11",dur:"14m",type:"Pricing / Proposal",stage:"Late-stage / Contract",s:{r:8,d:5,v:7,a:8,c:7,e:7},w:6.7,tr:70,m:{M:1,E:0,DC:0,DP:1,IP:0,Ch:0,Co:0},str:["Good rapport \u2014 the golf conversation at the end built genuine personal connection with Quinton", "Clean pricing presentation with multiple options ($30/app, $10K commitment, $15K for more coverage)", "Identified the right signer (Claudine, not Quinton) \u2014 critical for deal execution"],opp:["Create more dialogue moments during pricing \u2014 pause after each option and ask how it compares to expectations", "Ensure March incentive pricing deadline is clearly communicated to create natural urgency"],q:"",qt:"",coach:"Clean pricing conversation with clear options presented ($30/app, $10K commitment, $15K for more coverage). The product updates (Fannie Mae integration, guideline toggle, detect signals) were walked through effectively and Quinton had a clear understanding of what has changed.<br><br>Identifying Claudine as the actual signer was a smart and important move. Too many reps would have assumed Quinton signs and then lost time when the contract lands on the wrong desk. Getting the next-day follow-up at 2pm locked in keeps momentum going — good deal control.<br><br>Quinton's question about per-app vs. per-file billing was a buying signal worth noting — he was doing the internal math on how this maps to his business. On pricing calls, creating more of those moments is valuable. After each option, pause: 'How does that compare to what you had in mind?' Let the prospect think out loud about how they would use the product. That is where the real commitment forms.<br><br>The golf conversation at the end built genuine personal connection — that kind of rapport pays dividends over the life of the relationship.",prep:["Send contract to Claudine (not Quinton) as discussed", "Confirm the 2pm next-day follow-up and prepare a brief agenda", "Research why the 2024 and 2025 conversations did not convert \u2014 check Gong history and CRM notes", "Prepare a simple comparison of the $10K vs. $15K commitment options to help Quinton decide", "Set a deadline on the March incentive pricing to create urgency"],url:"https://us-29990.app.gong.io/call?id=1419750158146524040"},
{id:32,rep:"spencer",title:"Pricing and Next Steps with Ajay",prospect:"Ajay",date:"Thu 3/13",dur:"13m",type:"Strategy / Competitive Intel",stage:"Mid-Late / Multi-thread",s:{r:7,d:9,v:8,a:8,c:8,e:9},w:8.25,tr:50,m:{M:1,E:1,DC:0,DP:1,IP:1,Ch:1,Co:1},str:["Exceptional deal intelligence \u2014 Ajay volunteered that Gateless/Loanbeam has already been decided against, a critical competitive win", "Identified multiple champions (Ajay, Deep) and the key executive (COO Joe) for the consolidation play", "Strategic framing of the FDM/Absolute/Mortgage Equity Partners merger as a consolidation opportunity (600 LOs, 2500 rolling apps)"],opp:["Could have pushed for a firmer date for the Joe (COO) meeting rather than leaving it as 'post-ICE conference'", "The POS partnership angle was identified but not developed \u2014 needs a concrete next step"],q:"Getting rid of Loanbeam has already been decided.",qt:"6:30",coach:"This was the highest-quality strategic call of the week across all four reps. In 13 minutes, you extracted an extraordinary amount of deal intelligence from Ajay. The fact that he volunteered the Gateless/Loanbeam competitive intel — 35 conditions on a single file, processors complaining, and the decision to get rid of them already made — is a testament to the champion relationship you have built with him.<br><br>Your discovery was outstanding. You mapped the merger landscape (FDM, Absolute, Mortgage Equity Partners), sized the opportunity (600 LOs, 2,500 rolling apps), identified multiple champions (Ajay and Deep), and surfaced the COO (Joe) as the executive buyer for the consolidation play. That is MEDDPICC executed at a high level in a single 13-minute conversation.<br><br>The talk ratio at approximately 50/50 is exactly where you want it for a strategic planning call. This was a true collaboration — you and Ajay were thinking through the deal together, which is the best position a rep can be in. Ajay is not just a champion; he is a co-conspirator in getting this deal done.<br><br>The one area to tighten up is the timeline. 'Post-ICE conference' is directionally correct but too vague for a deal with this much momentum. You should propose specific dates for the Joe meeting and frame it around the merger timeline. If the consolidation is happening, there is a window where the COO is making vendor decisions — you need to be in that window, not after it.<br><br>The POS partnership angle is intriguing and could be a significant strategic lever. Make sure you bring that to the Joe conversation as a differentiated value prop that no competitor can match.",prep:["Propose 2-3 specific dates for the COO (Joe) meeting before ICE creates a scheduling gap", "Prepare a consolidation proposal showing how Ocrolus replaces Gateless/Loanbeam across all three entities", "Connect with Deep to validate champion alignment and get his perspective on the merger timeline", "Research the POS partnership angle and prepare a concrete value proposition for the Joe meeting", "Size the full opportunity: 600 LOs, 2500 apps, across all product lines \u2014 what is the potential ACV?"],url:"https://us-29990.app.gong.io/call?id=453824284057194747"}
];
const coaching={
sam:{
narrative:"Busiest week on the team — 11 prospect calls across discovery, demos, pricing, and POV check-ins. Standouts: HMA (8.55) where Amy volunteered her own ROI argument unprompted, and Superior National Pricing where Bill called it a 'no brainer.' Pipeline is moving across multiple stages. Consistent gaps: Metrics covered on only 3 of 11 calls, and next steps left too open on deals that deserve urgency.",
keep:"<strong>Team selling produces the highest-quality buying signals on the team.</strong> HMA: Amy articulated the ROI before it was presented — the prospect making the case to themselves. Armed Forces Bank: identified Holly Dowd as decision maker and locked ICE meeting on the spot.",
start:"<strong>Quantify pain in dollar terms.</strong> Metrics on 3 of 11 calls. Shea had a CFO in the room — missed layup. Arvest volunteered 2,900 hours/year of manual review — convert that to dollars and anchor the deal to it.",
stop:"<strong>Prospect-controlled timelines on high-value deals.</strong> LCF ended with 'let us know what makes sense.' Republic Bank: 'follow up in about a week.' Shea: 'we will reach out.' Always propose a specific date and action — professional urgency, not passive deference.",
frameworkCoaching:"The pattern across 11 calls: <strong>trust is being earned, but not yet converted into quantified business cases</strong>.<br><br>Gap Selling requires current state, future state, and the measurable gap between them. The current state diagnosis is strong — Nicole's union borrower workflow, Saleem admitting he has 'no idea' how his team matches Decision Logic data, Arvest's 2,900 hours of manual review. But the future state stays abstract. When someone gives a pain metric, the next question should turn it into money. 'If your team spends 2,900 hours a year on manual review, what does that cost in headcount and overtime?' The prospect's number is always more powerful than a slide deck.<br><br>On deal advancement, the Challenger model draws a clear line between constructive tension and passive accommodation. HMA (follow-up booked live), VanDyk ($130K commit), Armed Forces Bank (ICE meeting locked) — constructive tension. LCF, Republic Bank, Shea — passive accommodation. The difference: one group proposed a specific next step with a date. The other left it open.<br><br>One tactical add from Voss: <strong>mirrors</strong>. When the Shea CFO said 'we need to get our numbers dialed' — repeat back: 'Get your numbers dialed?' It draws out what 'numbers' means without a direct question. When Bill mentioned AI policy — 'AI policy?' would have surfaced whether it is a real blocker or a formality. One mirror per call next week."
},
kyle:{
narrative:"Eight calls anchored by the HomeBridge close (8.90) — highest across all reps — with same-day signature and phase 2 already planted. The MFS arc is equally strong: POV kickoff (8.60) through Results Sync (7.95), with Debbie calling BNPL detection 'huge' and Kelly asking about reps and warrants. Deal control and champion activation are elite. Blind spots: competition probed on only 2 of 8, economic buyer identified on only 3 of 8.",
keep:"<strong>Deal control and champion activation are best-in-class.</strong> HomeBridge: navigated NFTYDoor departure, closed same-day, planted phase 2. Kelly at MFS prepped 11 test files unprompted — by the Results Sync her underwriters were calling capabilities 'huge.' That is a champion selling when you are not in the room.",
start:"<strong>Probe competition on every call.</strong> 2 of 8 this week. At pricing/closing stages, an unknown competitor changes the entire strategy. On Mega Capital, one question would have protected the deal: 'Is there any reason you would not move forward by end of month?'",
stop:"<strong>Leaving the Economic Buyer unidentified in late-stage deals.</strong> 3 of 8 calls. On MFS — the strongest champion relationship on the team — the question remains unanswered: who signs the check? Must be resolved before March 24th.",
frameworkCoaching:"The closing instinct is elite — HomeBridge (8.90), MFS arc from kickoff (8.60) through results (7.95), Mega Capital's 21-minute pricing call. <strong>These behaviors build revenue.</strong><br><br>The gap is equally consequential: <strong>Competition and Economic Buyer are the two MEDDPICC elements that can derail otherwise well-executed deals</strong>. On Mega Capital, qualification was strong across every dimension — except Competition was never addressed. If an alternative exists, it changes pricing strategy and close timeline. On MFS, Kelly is the champion — but when she brings commercial numbers to leadership, who is she presenting to? That must be answered before March 24th. Two questions for every call prep card: 'Who else are you evaluating?' and 'Who approves the budget?' Ten seconds each.<br><br>From Voss: Kelly's 'I do not believe a damn word you say' was a trust signal worth mirroring. 'You do not believe a word we say?' — then silence. She fills that pause with every past vendor disappointment. That intel makes the rest of the deal bulletproof."
},
charlie:{
narrative:"Six prospect calls across demos, POV reviews, alignment, and discovery. Standout: Presidential POV Review #2 (8.00) — 108 rental properties tested, Brooke volunteered she loves the product. Competitive intelligence improving (Gateless intel on Presidential, competitor navigation on Felix). Consistent gap: implicit champions in several deals never explicitly activated, and talk ratio runs high on discovery calls (AACU 76%, Service CU 75%).",
keep:"<strong>POV execution produces real buying signals.</strong> Presidential: live file testing, 108-unit record broken, prospect volunteered she loves the product, Gateless intel gathered. When a POV is structured with clear criteria and the prospect does the testing, the product sells itself.",
start:"<strong>Activate implicit champions.</strong> 4 of 6 calls had no champion explicitly identified. When Brooke says she loves the product, the next move: 'Would you be willing to share that perspective with leadership when we get to commercials?' One question turns a supporter into an advocate.",
stop:"<strong>High talk ratio on discovery calls.</strong> AACU: 76%. Service CU: 75%. On calls designed to learn, three-quarters of the talking is happening on the wrong side. Prepare calibrated questions ahead. Let the prospect reveal priorities.",
frameworkCoaching:"The central theme: <strong>the instincts are right, but champion activation needs to become deliberate</strong>. Presidential (8.00) proves what happens when data leads — the prospect tested edge cases, broke records, and volunteered they love the product. That was earned through structured POV management.<br><br>On discovery, the Voss calibrated question framework directly addresses the talk ratio pattern. AACU (76%) and Service CU (75%) are inverted from where they should be. Questions like 'What does your current workflow look like end to end?' create space for the prospect to reveal pain, process, and priorities. When Susan at AACU mentioned Lender Toolkit and said their program is 'embedded' in Ocrolus, that was high-value competitive intel that deserved deep exploration. Same with Stephanie at Intelliloan mentioning other vendors. These moments contain positioning intelligence — pulling the thread is how Gap Selling identifies which gaps the prospect cares about most.<br><br>The MEDDPICC Champion test is simple: will this person sell when you are not in the room? Brooke at Presidential, Rosie at Intelliloan, Tyler at Service CU — all showed champion potential. None were explicitly asked to advocate. 'When we get to the commercial conversation, would you be willing to share your experience with the leadership team?' That single question is the difference between a supporter and an advocate."
