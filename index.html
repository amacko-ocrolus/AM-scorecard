<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:24px 20px;max-width:960px;margin:0 auto}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:.5px}

.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:#10b981}.dot-off{background:#334155}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
.tab{padding:8px 16px;border-radius:7px;background:transparent;border:1px solid #1e293b;text-align:left;transition:all .15s}
.tab.active{border-color:#3b82f6;background:#1e293b}
.tab .name{font-size:13px;font-weight:600}.tab .sub{font-size:10px;color:#475569}
.vtab{padding:4px 10px;font-size:10px;border-radius:4px;border:1px solid #1e293b;background:transparent;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.vtab.active{border-color:#3b82f6;background:#1e293b;color:#93c5fd}
.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}
</style>
</head>

plore expansion and strategic roadmap alignment that went unexplored.","prep":["Research client's loan processing KPIs to quantify impact of classification issues","Prepare Compass integration timeline and related product roadmap updates","Identify other high-volume document types for potential form onboarding discussion"],"url":"https://us-29990.app.gong.io/call?id=6541116782545081068","ml":"AM I","mls":"The AM was primarily reactive, responding to client questions about form types and technical issues rather than proactively exploring strategic opportunities or business outcomes.","val":{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"medium"}},{"id":5,"rep":"anjelica","title":"Cliffco Mortgage x Ocrolus - Weekly Sync","prospect":"Multiple stakeholders","date":"Tue 3/31","dur":"36m","type":"Client Call","s":{"rq":7,"cd":4,"vd":6,"sa":5,"ce":8},"w":5.65,"tr":52,"p":{"KDM":1,"CS":0,"AV":1,"PR":0},"keyAreas":["Expansion"],"str":["Strong client rapport evidenced by client saying 'I love this call' and 'you guys are great'","Responsive to technical implementation questions about automation workflows"],"opp":["Missed opportunity to validate implementation success metrics or ROI during rollout phase","Limited discovery questions about volume trends, user adoption rates, or business impact"],"q":"I love the fact that aqualist will still like if there's something in a bucket, we just have to, how do we turn that on to make sure it listens for our income, asset and credit buckets?","qt":"Client","coach":"While the client relationship is strong, this call missed key opportunities for strategic advancement. When the client mentioned 'trial and error portion' with underwriters, probe deeper: 'What specific challenges are the underwriters facing?' or 'How are you measuring adoption success?' The client's enthusiasm about automation workflows was a perfect opening to explore expansion: 'Beyond these three buckets, what other document types could benefit from automation?' Instead of just answering technical questions, position yourself as a strategic partner by connecting implementation progress to business outcomes.","prep":["Prepare specific questions about underwriter adoption rates and efficiency metrics","Research Cliffco's loan volume trends to discuss capacity planning","Identify additional automation use cases beyond current income/asset/credit buckets"],"url":"https://us-29990.app.gong.io/call?id=714969639554634699","ml":"AM I","mls":"The AM was primarily reactive, responding to client implementation updates and technical questions rather than proactively driving discovery or strategic conversations.","val":{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"medium"}},{"id":6,"rep":"anjelica","title":"AmFed x Ocrolus - Auto Conditions Feedback","prospect":"Multiple stakeholders","date":"Tue 3/31","dur":"32m","type":"Client Call","s":{"rq":7,"cd":6,"vd":6,"sa":5,"ce":8},"w":6.25,"tr":3,"p":{"KDM":1,"CS":1,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Strong empathy and active listening - acknowledged client's business challenges with rates and volume decline","High ownership - committed to following up on loan numbers and technical issues"],"opp":["Missed opportunity to explore expansion when client mentioned bringing processors and underwriters into the workflow","Could have been more proactive in discovery about the client's processor selection process and how Ocrolus could differentiate"],"q":"I mean, the income product does a really good job that took a period of time to get there, you know, but, you know, it's a it'll, I, I'm fully comfortable. It's going to get there.","qt":"Andrew","coach":"While you demonstrated strong relationship management and gathered valuable product feedback, you missed a key expansion signal when Andrew mentioned bringing processors and underwriters into the workflow. Instead of just acknowledging this, you could have asked 'What would success look like for y n risks. Also, when discussing the tax returns improvements, you could have quantified the business impact by asking 'How much time will this save your team weekly?' to reinforce ROI and potentially explore volume growth.","prep":["Follow up on the autoflow document selection logic question with specific technical details","Prepare ROI metrics showing time savings from the tax return classification improvements","Research client's loan portfolio to identify potential new use cases for the improved processing capabilities"],"url":"https://us-29990.app.gong.io/call?id=190605179752050666","ml":"AM II","mls":"The AM demonstrated strategic account planning by working through technical implementation challenges and connecting product roadmap items to client workflows, while maintaining trusted advisor status during problem resolution.","val":{"empathy":"high","curiosity":"medium","humility":"high","ownership":"high"}},{"id":8,"rep":"anjelica","title":"REV Federal Credit Union x Ocrolus - Auto Conditions Demo","prospect":"Multiple stakeholders","date":"Wed 4/1","dur":"25m","type":"Client Call","s":{"rq":7,"cd":6,"vd":7,"sa":6,"ce":8},"w":6.5,"tr":38,"p":{"KDM":1,"CS":1,"AV":1,"PR":1},"keyAreas":["Retention"],"str":["Strong empathy and responsiveness - when clients raised specific pain points about income calculations and manual processes, the AM immediately acknowledged the feedback and committed to deeper follow-up sessions","Excellent ownership of next steps - clearly outlined action items including scheduling time with specific team members to understand workflows and make product enhancements"],"opp":["Missed opportunity for deeper discovery during the call - when clients mentioned specific pain points like manual income calculations taking hours, could have asked 'How often does this happen?' or 'What's the business impact of these manual processes?'","Could have quantified value better by asking about time savings potential or volume of loans affected by the new conditions feature"],"q":"I recently had one where I think it was three years worth of pay stubs. We had to manually calculate it because the year to date didn't like the year to date didn't break down the income and the written voe, provided wasn't accurate to us. So we had to manually calculate that and that took hours","qt":"Jenaveve","coach":"While you handled the client feedback well and demonstrated strong ownership, you missed opportunities to quantify the business impact during the call itself. When Jenaveve mentioned manual calculations taking 'hours,' you could have asked 'How many loans per month require this manual process?' or 'What would it mean to your team if we could automate this?' This would help you build a stronger business case for product enhancements and demonstrate ROI more effectively. Also consider asking about decision-making authority when scheduling follow-ups - 'Who else should we include in these workflow sessions to ensure we can move quickly on improvements?'","prep":["Schedule individual workflow sessions with Rhonda and Jenaveve to understand specific pain points in detail","Prepare questions about volume and frequency of manual calculation scenarios to quantify business impact","Research REV Federal's loan volume and underwriting team size to better contextualize efficiency improvements"],"url":"https://us-29990.app.gong.io/call?id=1123322968657351741","ml":"AM II","mls":"The AM demonstrated strategic thinking by positioning the demo as part of ongoing product enhancement and proactively scheduling follow-up sessions to address specific client pain points.","val":{"empathy":"high","curiosity":"medium","humility":"high","ownership":"high"}},{"id":9,"rep":"anjelica","title":"Southern Bank x Ocrolus - 31 business review","prospect":"Multiple stakeholders","date":"Wed 4/1","dur":"47m","type":"Client Call","s":{"rq":6,"cd":3,"vd":7,"sa":2,"ce":6},"w":4.65,"tr":37,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":[],"str":["Strong product expertise demonstrated through detailed walkthrough of K1 income calculations and toggle functionality","Patient technical guidance helping client navigate complex tax document scenarios"],"opp":["Missed opportunity to explore broader business context - why is this client processing these specific documents and what are their volume trends","No strategic advancement - call ended with technical resolution but no next steps for account growth or relationship deepening"],"q":"I gave them the list of what I needed. So, maybe they added more than that. I'm not sure.","qt":"Client","coach":"This was a solid technical support session, but missed opportunities for strategic account management. When the client said 'I gave them the list of what I needed. So, maybe they added more than that,' this was a perfect opening to ask 'Tell me about your current document processing workflow - are you seeing volume changes or new document types?' Instead of just resolving the immediate technical question, use these moments to understand broader business context. The call ended abruptly without establishing next steps beyond 'we'll pick this up at two' - always close with concrete action items and timeline.","prep":["Research client's typical loan volume and seasonal patterns to ask informed discovery questions","Prepare questions about their broader underwriting workflow beyond just K1 processing","Come with specific examples of how other banks have expanded Ocrolus usage for similar document types"],"url":"https://us-29990.app.gong.io/call?id=824941640003365665","ml":"AM I","mls":"The AM demonstrated foundational product knowledge by walking through Ocrolus features and resolving technical questions, but remained reactive throughout the session without proactive discovery or strategic advancement.","val":{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"medium"}},{"id":10,"rep":"anjelica","title":"United Community Bank x Ocrolus - Weekly Sync","prospect":"Multiple sta h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px"><div><h2 style="font-size:16px;font-weight:700"><a href="${det.url}" target="_blank" style="color:#e2e8f0;text-decoration:none;border-bottom:1px solid #3b82f6;padding-bottom:1px;transition:color .15s" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#e2e8f0'">${det.title} ↗</a></h2><div style="font-size:11px;color:#64748b;margin-top:2px">${det.prospect} · ${det.date} · ${det.dur} · ${det.type}</div><div style="font-size:10px;color:#475569">Talk: <span style="color:${det.tr<=60?"#10b981":"#f59e0b"}">${det.tr}%</span></div></div><div style="text-align:center"><div style="font-size:28px;font-weight:700;color:${sc(det.w)}">${det.w}</div><div class="mono" style="font-size:9px;color:#475569">WEIGHTED</div></div></div>`;
DK.forEach(d=>{
const s=det.s[d];const bg=sc(s);
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0"><span style="font-size:11px;color:#94a3b8;min-width:110px">${DL[d]} <span style="color:#475569;font-size:9px">(${DW[d]})</span></span><div style="display:flex;align-items:center;gap:6px"><div class="bar"><div class="fill" style="width:${s*10}%;background:${bg}"></div></div><span style="font-size:11px;font-weight:600;color:${bg};min-width:20px">${s}</span></div></div>`;
});
h+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px">`;
PK.forEach(k=>{h+=`<div class="tag mono" style="background:${det.p[k]?"rgba(16,185,129,0.12)":"rgba(100,116,139,0.06)"};color:${det.p[k]?"#10b981":"#475569"};border:1px solid ${det.p[k]?"rgba(16,185,129,0.25)":"#1e293b"}">${k} <span style="font-size:8px;font-weight:400">${PL[k]}</span></div>`});
h+=`</div>`;
if(det.keyAreas&&det.keyAreas.length){h+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">`;const ac={Retention:"#10b981",Expansion:"#3b82f6",Advocacy:"#8b5cf6"};det.keyAreas.forEach(a=>{h+=`<span class="tag" style="background:${ac[a]||"#475569"}22;color:${ac[a]||"#475569"};border:1px solid ${ac[a]||"#475569"}44;font-size:10px">${a}</span>`});h+=`</div>`}
if(det.ml){const mlc=det.ml.includes("Senior")?"#10b981":det.ml.includes("II")?"#3b82f6":"#8b5cf6";h+=`<div style="margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="tag mono" style="background:${mlc}18;color:${mlc};border:1px solid ${mlc}33;font-size:10px;font-weight:600">${det.ml}</span>`;if(det.mls){h+=`<span style="font-size:11px;color:#64748b;font-style:italic">${det.mls}</span>`}h+=`</div>`}
h+=`</div>`;
h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0" class="detail-grid">`;
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:6px">STRENGTHS</div>`;
det.str.forEach(s=>{h+=`<div class="strength">${s}</div>`});
h+=`</div><div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:6px">OPPORTUNITIES</div>`;
det.opp.forEach(o=>{h+=`<div class="opp">${o}</div>`});
h+=`</div></div>`;
if(det.coach){h+=`<div class="card" style="border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:6px">COACHING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${det.coach}</div></div>`}
if(det.prep&&det.prep.length){h+=`<div class="card" style="border-left:3px solid #10b981"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:8px">NEXT CALL PREP</div>`;det.prep.forEach((p,i)=>{h+=`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:${i<det.prep.length-1?8:0}px"><div style="min-width:18px;height:18px;border-radius:4px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);display:flex;align-items:center;justify-content:center;font-size:9px;color:#10b981;font-weight:600">${i+1}</div><div style="font-size:12px;color:#94a3b8;line-height:1.5">${p}</div></div>`});h+=`</div>`}
if(det.q){h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:4px">KEY QUOTE</div><div style="font-size:13px;color:#e2e8f0;font-style:italic;border-left:3px solid #8b5cf6;padding-left:10px">"${det.q}"${det.qt?` <span class="mono" style="font-size:9px;color:#475569;font-style:normal">${det.qt}</span>`:""}</div></div>`}
h+=`<a href="${det.url}" target="_blank" class="mono" style="font-size:10px;display:inline-block;margin-top:8px">View in Gong →</a>`;
}

h+=`<div style="margin-top:20px;text-align:center;font-size:9px;color:#1e293b" class="mono">AM Scorecard v1.1 · RQ 20% · CD 25% · VD 25% · SA 20% · CE 10% · ${calls.length} calls · ${reps.length} reps</div>`;
el.innerHTML=h;
}
render();
</script>
</div><!-- end dashboard-content -->
<script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}
function authCheck(){
  var e=document.getElementById('auth-email').value.trim().toLowerCase();
  if(e.endsWith('@ocrolus.com')){
    localStorage.setItem('am-scorecard-auth',e);
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(e,'login');
  } else {
    document.getElementById('auth-error').style.display='block';
  }
}
(function(){
  var saved=localStorage.getItem('am-scorecard-auth');
  if(saved && saved.endsWith('@ocrolus.com')){
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(saved,'return_visit');
  }
})();
</script>
