<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:24px 20px;max-width:960px;margin:0 auto}

button{cursor:pointer;font-family:inherit;border:none;outline:none}
.tab{padding:8px 16px;border-radius:7px;background:transparent;border:1px solid #1e293b;text-align:left;transition:all .15s}
.tab.active{border-color:#3b82f6;background:#1e293b}
.tab .name{font-size:13px;font-weight:600}.tab .sub{font-size:10px;color:#475569}

.vtab.active{border-color:#3b82f6;background:#1e293b;color:#93c5fd}
.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}
</style>

ue by asking 'How much time is the automated processing saving you compared to manual work?' Focus on turning support moments into strategic conversations.","prep":["Follow up on Schedule E technical issue resolution with specific timeline","Prepare expansion conversation framework for TPO team rollout opportunity","Research client's manual processing pain points to reinforce automation value"],"url":"https://us-29990.app.gong.io/call?id=5873261226164110736","ml":"AM I","mls":"The AM primarily responded to client issues and provided basic support, escalating technical problems appropriately but not proactively exploring strategic opportunities or demonstrating advanced discovery skills.","val":{"empathy":"medium","curiosity":"low","humility":"high","ownership":"medium"}},{"id":6,"rep":"noah","title":"Ocrolus / Service First - Implementation Weekly Call","prospect":"Multiple stakeholders","date":"Mon 4/20","dur":"25m","type":"Client Call","s":{"rq":6,"cd":4,"vd":5,"sa":4,"ce":7},"w":4.95,"tr":7,"p":{"KDM":0,"CS":0,"AV":0,"PR":0},"keyAreas":[],"str":["Strong ownership demonstrated by personally following up on the widget feature flag issue and providing clear guidance on reps and warrants","Good rapport building with personal check-ins and maintaining a collaborative tone throughout the implementation process"],"opp":["Missed opportunity to conduct discovery about business impact or success metrics during this critical implementation phase","Failed to explore expansion opportunities or discuss product roadmap despite being at a key milestone with full user rollout"],"q":"Well, I'm excited about training tomorrow and Thursday","qt":"Client","coach":"This was a missed opportunity to elevate the conversation beyond implementation logistics. When the client said 'this is the week that the rubber meets the road,' you could have asked 'What does success look like for your team once everyone is fully onboarded?' or 'How will you measure the impact on your loan processing wor nce during training. Also, when they said they want to expand 'as fast as possible,' explore the business driver: 'What's driving the urgency to scale this quickly - is it volume growth, efficiency targets, or something else?' This positions you as a strategic partner understanding their business context.","prep":["Prepare specific ROI metrics and efficiency benchmarks to discuss after the first week of usage","Research Southwest Funding's loan volume trends to contextualize expansion timeline discussions","Confirm Fannie Mae integration status and prepare roadmap discussion for processing team onboarding"],"url":"https://us-29990.app.gong.io/call?id=5051930801314665808","ml":"AM II","mls":"The AM proactively managed implementation risks by setting clear expectations about potential bottlenecks and offering pivot strategies, while building strategic roadmaps for phased rollout from underwriting to processing teams.","val":{"empathy":"high","curiosity":"medium","humility":"high","ownership":"high"}},{"id":8,"rep":"noah","title":"Ocrolus / Service First - Ocrolus Training!","prospect":"Multiple stakeholders","date":"Tue 4/21","dur":"89m","type":"Client Call","s":{"rq":6,"cd":4,"vd":7,"sa":3,"ce":7},"w":5.25,"tr":67,"p":{"KDM":0,"CS":0,"AV":0,"PR":1},"keyAreas":[],"str":["Strong product knowledge demonstration with detailed platform walkthrough and feature explanations","High ownership with clear next steps and support resource guidance"],"opp":["Missed discovery opportunities about client workflows, pain points, and business context during the training session","No exploration of expansion opportunities or additional value delivery beyond basic platform training"],"q":"Dee did a great job setting us up as far as what we're here to do today","qt":"AM","coach":"This was a solid training delivery, but you missed valuable discovery opportunities with multiple stakeholders present. Instead of diving straight into features, try opening with 'Before we jump into the platform, help me understand your current income verification process and biggest pain points.' During feature demonstrations, connect capabilities to their specific workflows: 'How would this bank statement analysis fit into your current QM process?' The client showed engagement with questions about standardization and calculations - these were perfect moments to explore their volume, use cases, and potential expansion needs.","prep":["Prepare discovery questions about their current income verification workflows and pain points","Research Service First's loan volume and business model to identify expansion opportunities","Plan follow-up on training feedback and identify which attendees are key decision makers"],"url":"https://us-29990.app.gong.io/call?id=2609141882361684786","ml":"AM I","mls":"The AM delivered foundational product training and handled basic platform education, demonstrating core product knowledge but without strategic discovery or account advancement behaviors.","val":{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"high"}},{"id":9,"rep":"noah","title":"FCM / Ocrolus - Income Calculations (Analyze) Training!","prospect":"Multiple stakeholders","date":"Tue 4/21","dur":"57m","type":"Client Call","s":{"rq":6,"cd":3,"vd":7,"sa":4,"ce":6},"w":5.15,"tr":84,"p":{"KDM":0,"CS":0,"AV":1,"PR":1},"keyAreas":["Retention"],"str":["Strong product knowledge demonstrated through detailed walkthrough of income calculation features and dashboard functionality","High ownership shown by committing to send follow-up resources and offering additional deep-dive sessions"],"opp":["Missed discovery about client's current workflow challenges, volume patterns, or business goals beyond basic product usage","Could have explored expansion opportunities by asking about other use cases or departments that might benefit from Ocrolus capabilities"],"q":"To do a deeper dive on it at any point, we are happy to do that","qt":"Client","coach":"While the product training was thorough, you missed opportunities to understand the client's current workflow and pain points. Instead of jumping straight into feature explanations, try opening with discovery: 'Before we dive into the tool, help me understand your current income verification process - what's working well and where do you see bottlenecks?' This would have allowed you to tailor the training to their specific needs and identify expansion opportunities. When clients showed engagement, you could have asked 'How do you see this fitting into your current underwriting timeline?' to connect features to business value.","prep":["Research client's current verification workflow and typical loan volumes","Prepare questions about other departments or use cases that might benefit from Ocrolus","Identify specific ROI metrics to discuss based on their lending focus"],"url":"https://us-29990.app.gong.io/call?id=589320629083774520","ml":"AM I","mls":"The AM executed a foundational product training session with clear explanations and follow-up commitments, but remained reactive to client questions rather than proactively exploring strategic opportunities or business context.","val":{"empathy":"medium","curiosity":"low","humility":"medium","ownership":"high"}},{"id":10,"rep":"noah","title":"Ocrolus / VanDyk - Weekly Sync","prospect":"Multiple stakeholders","date":"Tue 4/21","dur":"31m","type":"Client Call","s":{"rq":7,"cd":4,"vd":6,"sa":5,"ce":6},"w":5.45,"tr":48,"p":{"KDM":1,"CS":0,"AV":0,"PR":0},"keyAreas":["Retention"],"str":["Strong ownership of implementation coordination with clear next steps and follow-up commitments","Good collaborative approach facilitating between technical teams and client stakeholders"],"opp":["Missed opportunity to explore how the implementation connects to VanDyk's business goals or success metrics","Limited discovery about client satisfaction, volume expectations, or potential expansion areas beyond the current implementation"],"q":"I can make a recommendation for ho <script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}
function authCheck(){
  var e=document.getElementById('auth-email').value.trim().toLowerCase();
  if(e.endsWith('@ocrolus.com')){
    localStorage.setItem('am-scorecard-auth',e);
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(e,'login');
  } else {
    document.getElementById('auth-error').style.display='block';
  }
}
(function(){
  var saved=localStorage.getItem('am-scorecard-auth');
  if(saved && saved.endsWith('@ocrolus.com')){
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(saved,'return_visit');
  }
})();
</script>
