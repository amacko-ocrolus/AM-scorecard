<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Weekly Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:24px 20px;max-width:960px;margin:0 auto}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:.5px}
.card{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:16px;margin-bottom:10px}
.bar{height:4px;background:#1e293b;border-radius:2px;overflow:hidden;width:90px}
.fill{height:100%;border-radius:2px}
.green{color:#10b981}.blue{color:#3b82f6}.amber{color:#f59e0b}.red{color:#ef4444}.purple{color:#8b5cf6}
.bg-green{background:#10b981}.bg-blue{background:#3b82f6}.bg-amber{background:#f59e0b}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:#10b981}.dot-off{background:#334155}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
.tab{padding:8px 16px;border-radius:7px;background:transparent;border:1px solid #1e293b;text-align:left;transition:all .15s}
.tab.active{border-color:#3b82f6;background:#1e293b}
.tab .name{font-size:13px;font-weight:600}.tab .sub{font-size:10px;color:#475569}
.vtab{padding:4px 10px;font-size:10px;border-radius:4px;border:1px solid #1e293b;background:transparent;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.vtab.active{border-color:#3b82f6;background:#1e293b;color:#93c5fd}
.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}
</style>
</head>
<body>
<!-- Email Gate -->
<div id="auth-gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column">
<div style="background:#111827;border:1px solid #1e293b;border-radius:12px;padding:40px;max-width:380px;width:100%;text-align:center">
<div class="mono" style="font-size:10px;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Ocrolus · AM Scorecard v1</div>
<h2 style="font-size:18px;font-weight:600;margin-bottom:4px">Weekly Call Scorecard</h2>
<p style="font-size:12px;color:#64748b;margin-bottom:24px">Enter your Ocrolus email to continue</p>
<input id="auth-email" type="email" placeholder="you@ocrolus.com" style="width:100%;padding:10px 14px;border-radius:6px;border:1px solid #334155;background:#0a0f1a;color:#e2e8f0;font-family:'IBM Plex Sans',sans-serif;font-size:13px;outline:none;margin-bottom:12px" onkeydown="if(event.key==='Enter')authCheck()">
<button onclick="authCheck()" style="width:100%;padding:10px;border-radius:6px;border:none;background:#2E75B6;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer">Continue</button>
<p id="auth-error" style="font-size:11px;color:#FFC7CE;margin-top:10px;display:none">Please use an @ocrolus.com email address</p>
</div>
</div>
<div id="dashboard-content" style="display:none">
<div style="margin-bottom:20px">
<div class="mono" style="font-size:10px;color:#475569;letter-spacing:2px;text-transform:uppercase">Ocrolus · AM Scorecard v1</div>
<h1 style="font-size:22px;font-weight:700;margin:4px 0 0">Weekly Call Scorecard</h1>
<div style="font-size:11px;color:#475569;margin-top:2px">Week of Mar 17–24, 2026 · 5 reps · 0 calls · Retention · Expansion · Advocacy</div>
</div>
<div id="app"></div>
<script>
const reps=[{"id":"anjelica","name":"Anjelica Purnell","title":"Account Manager","profile":"","avg":0,"n":0},{"id":"noah","name":"Noah Jones","title":"Account Manager","profile":"","avg":0,"n":0},{"id":"elizabeth","name":"Elizabeth Spade","title":"Account Manager","profile":"","avg":0,"n":0},{"id":"madeline","name":"Madeline Mazzella","title":"Account Manager","profile":"","avg":0,"n":0},{"id":"spencer","name":"Spencer Schultz","title":"Account Manager","profile":"","avg":0,"n":0}];
const PK=["KDM","CS","AV","PR"];
const PL={KDM:"Key Decision Maker",CS:"Client Success",AV:"Additional Value",PR:"Product Roadmap"};
const DK=["rq","cd","vd","sa","ce"];
const DL={rq:"Relationship Quality",cd:"Client Discovery",vd:"Value Delivery",sa:"Strategic Advancement",ce:"Client Engagement"};
const DW={rq:"20%",cd:"25%",vd:"25%",sa:"20%",ce:"10%"};
const calls=[];

const coaching={"anjelica":{"narrative":"Anjelica Purnell had 0 qualifying calls this week.","keep":"No data this week.","start":"No data this week.","stop":"Review needed.","pillarCoaching":""},"noah":{"narrative":"Noah Jones had 0 qualifying calls this week.","keep":"No data this week.","start":"No data this week.","stop":"Review needed.","pillarCoaching":""},"elizabeth":{"narrative":"Elizabeth Spade had 0 qualifying calls this week.","keep":"No data this week.","start":"No data this week.","stop":"Review needed.","pillarCoaching":""},"madeline":{"narrative":"Madeline Mazzella had 0 qualifying calls this week.","keep":"No data this week.","start":"No data this week.","stop":"Review needed.","pillarCoaching":""},"spencer":{"narrative":"Spencer Schultz had 0 qualifying calls this week.","keep":"No data this week.","start":"No data this week.","stop":"Review needed.","pillarCoaching":""}};

// History data — populated weekly by automation. Each entry is one week's snapshot.
// After 3+ entries, the history tab becomes active.
const history=[{"weekOf":"Week of Mar 17–24, 2026","reps":[{"id":"anjelica","avg":0,"n":0,"scores":{"rq":0,"cd":0,"vd":0,"sa":0,"ce":0},"coaching":{"keep":"No data this week.","start":"No data this week.","stop":"Review needed."}},{"id":"noah","avg":0,"n":0,"scores":{"rq":0,"cd":0,"vd":0,"sa":0,"ce":0},"coaching":{"keep":"No data this week.","start":"No data this week.","stop":"Review needed."}},{"id":"elizabeth","avg":0,"n":0,"scores":{"rq":0,"cd":0,"vd":0,"sa":0,"ce":0},"coaching":{"keep":"No data this week.","start":"No data this week.","stop":"Review needed."}},{"id":"madeline","avg":0,"n":0,"scores":{"rq":0,"cd":0,"vd":0,"sa":0,"ce":0},"coaching":{"keep":"No data this week.","start":"No data this week.","stop":"Review needed."}},{"id":"spencer","avg":0,"n":0,"scores":{"rq":0,"cd":0,"vd":0,"sa":0,"ce":0},"coaching":{"keep":"No data this week.","start":"No data this week.","stop":"Review needed."}}]}];

let st={rep:"anjelica",sel:null,view:"overview"};
function sc(s){return s>=8.5?"#10b981":s>=7.5?"#3b82f6":"#f59e0b"}
function render(){
const el=document.getElementById("app");
const f=calls.filter(c=>c.rep===st.rep);
const rd=reps.find(r=>r.id===st.rep);
const avg=f.length?(f.reduce((a,c)=>a+c.w,0)/f.length).toFixed(2):"—";
const best=f.length?f.reduce((a,c)=>c.w>a.w?c:a,f[0]):null;
const det=st.sel?calls.find(c=>c.id===st.sel):null;
const co=coaching[st.rep];
let h="";

// Rep tabs
h+=`<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">`;
reps.forEach(r=>{
h+=`<button class="tab ${st.rep===r.id?"active":""}" onclick="st.rep='${r.id}';st.sel=null;st.view='overview';render()"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><div><div class="name" style="color:${st.rep===r.id?"#e2e8f0":"#64748b"}">${r.name}</div><div class="sub">${r.title} · ${r.n} calls</div></div><div style="font-size:18px;font-weight:700;color:${sc(r.avg)}">${r.avg}</div></div></button>`;
});
h+=`</div>`;

// View tabs
h+=`<div style="display:flex;gap:6px;margin-bottom:14px">`;
["overview","pillars","compare","history"].forEach(v=>{
h+=`<button class="vtab mono ${st.view===v?"active":""}" onclick="st.view='${v}';st.sel=null;render()">${v}</button>`;
});
h+=`</div>`;

// KPIs
h+=`<div class="kpi-grid">`;
h+=`<div class="card kpi"><div class="label mono">Avg Score</div><div style="font-size:24px;font-weight:700;color:${avg==="—"?"#475569":sc(parseFloat(avg))}">${avg}</div></div>`;
h+=`<div class="card kpi"><div class="label mono">Best Call</div><div style="font-size:24px;font-weight:700;color:${best?sc(best.w):"#475569"}">${best?best.w:"—"}</div></div>`;
h+=`<div class="card kpi"><div class="label mono">Calls</div><div style="font-size:24px;font-weight:700;color:#8b5cf6">${f.length}</div></div>`;
h+=`<div class="card kpi"><div class="label mono">Profile</div><div style="font-size:15px;font-weight:700;color:#f59e0b">${rd.profile}</div></div>`;
h+=`<div class="card kpi"><div class="label mono">Call Level</div><div style="font-size:15px;font-weight:700;color:${(rd.maturityLevel||"").includes("Senior")?"#10b981":(rd.maturityLevel||"").includes("II")?"#3b82f6":"#8b5cf6"}">${rd.maturityLevel||"—"}</div></div>`;
h+=`</div>`;

// ── COMPARE VIEW ──
if(st.view==="compare"&&!det){
h+=`<div class="card" style="overflow-x:auto"><div class="mono" style="font-size:11px;font-weight:600;color:#93c5fd;margin-bottom:12px;letter-spacing:1px">REP COMPARISON</div><table><thead><tr><th>Metric</th>`;
reps.forEach(r=>{h+=`<th style="text-align:center">${r.name.split(" ")[0]}</th>`});
h+=`</tr></thead><tbody>`;
[{l:"Avg Score",f:r=>r.avg},{l:"Calls",f:r=>r.n},{l:"Profile",f:r=>r.profile},{l:"Call Level",f:r=>r.maturityLevel||"—"},{l:"Pillars %",f:r=>{const rc=calls.filter(c=>c.rep===r.id);const t=rc.length*4;const h2=rc.reduce((s,c)=>s+PK.filter(k=>c.p[k]).length,0);return t?Math.round(h2/t*100)+"%":"0%"}}].forEach(row=>{
h+=`<tr><td style="color:#94a3b8">${row.l}</td>`;
reps.forEach(r=>{const v=row.f(r);h+=`<td style="text-align:center;font-weight:${typeof v==="number"?700:400};color:${typeof v==="number"?sc(v):"#94a3b8"}">${v}</td>`});
h+=`</tr>`;
});
// Dimension comparison
DK.forEach(d=>{
h+=`<tr><td style="color:#94a3b8">${DL[d]} <span style="color:#475569;font-size:9px">(${DW[d]})</span></td>`;
reps.forEach(r=>{
const rc=calls.filter(c=>c.rep===r.id);
const davg=rc.length?(rc.reduce((a,c)=>a+c.s[d],0)/rc.length).toFixed(1):"—";
h+=`<td style="text-align:center;font-weight:600;color:${davg>=8?"#10b981":davg>=7?"#3b82f6":"#f59e0b"}">${davg}</td>`;
});
h+=`</tr>`;
});
h+=`</tbody></table></div>`;
}

// ── OVERVIEW VIEW ──
if(st.view==="overview"&&!det){
h+=`<div class="card" style="margin-bottom:14px;border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Week in Review: ${rd.name}</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${co.narrative}</div></div>`;
// Keep / Start / Stop
h+=`<div class="card" style="margin-bottom:10px"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Coaching: ${rd.name}</div>`;
h+=`<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:6px;letter-spacing:0.5px">✦ KEEP DOING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7;padding-left:10px;border-left:2px solid rgba(16,185,129,0.3)">${co.keep}</div></div>`;
h+=`<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:6px;letter-spacing:0.5px">▲ START DOING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7;padding-left:10px;border-left:2px solid rgba(245,158,11,0.3)">${co.start}</div></div>`;
h+=`<div><div style="font-size:10px;font-weight:600;color:#ef4444;margin-bottom:6px;letter-spacing:0.5px">■ STOP DOING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7;padding-left:10px;border-left:2px solid rgba(239,68,68,0.3)">${co.stop}</div></div>`;
h+=`</div>`;
// Framework Coaching (combined)
if(co.pillarCoaching){
h+=`<div class="card" style="margin-bottom:14px;border-left:3px solid #8b5cf6"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase">Pillar Coaching: ${rd.name}</div>`;
h+=`<div style="font-size:12px;color:#94a3b8;line-height:1.8">${co.pillarCoaching}</div>`;
h+=`</div>`;
}
// Call list (below coaching)
h+=`<div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Calls This Week</div>`;
f.forEach(c=>{
h+=`<div class="card call-row" style="border-left-color:${sc(c.w)}" onclick="st.sel=${c.id};render()"><div style="display:flex;justify-content:space-between;align-items:center;gap:6px"><div style="flex:1;min-width:160px"><div style="font-size:13px;font-weight:600">${c.title}</div><div style="font-size:10px;color:#64748b">${c.prospect} · ${c.date} · ${c.dur}</div></div><div style="display:flex;gap:2px" class="dots-wrap">`;
PK.forEach(k=>{h+=`<span class="dot ${c.p[k]?"dot-on":"dot-off"}"></span>`});
h+=`</div><div style="display:flex;gap:3px;flex-wrap:wrap">`;
if(c.keyAreas)c.keyAreas.forEach(a=>{const ac={Retention:"#10b981",Expansion:"#3b82f6",Advocacy:"#8b5cf6"};h+=`<span class="tag" style="background:${ac[a]||"#475569"}22;color:${ac[a]||"#475569"};border:1px solid ${ac[a]||"#475569"}44">${a}</span>`});
h+=`</div><div style="font-size:18px;font-weight:700;color:${sc(c.w)};min-width:36px;text-align:right">${c.w}</div><div style="color:#475569">›</div></div></div>`;
});
}

// ── PILLARS VIEW ──
if(st.view==="pillars"&&!det){
const pf=PK.map(k=>({k,l:PL[k],n:f.filter(c=>c.p[k]).length,f:f.filter(c=>c.p[k]).length>=Math.ceil(f.length*.7)?"Always":f.filter(c=>c.p[k]).length>=Math.ceil(f.length*.3)?"Sometimes":"Rarely"}));
h+=`<div class="card" style="overflow-x:auto"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">FOUR PILLARS — ${rd.name} (${f.length} calls)</div><table><thead><tr><th>Pillar</th>`;
f.forEach(c=>{h+=`<th style="text-align:center;font-size:9px;max-width:70px">${c.title.split(" ")[0]}</th>`});
h+=`<th style="text-align:center">Freq</th></tr></thead><tbody>`;
pf.forEach(p=>{
h+=`<tr><td><span class="mono" style="color:#93c5fd;font-size:10px;margin-right:3px">${p.k}</span><span style="color:#94a3b8">${p.l}</span></td>`;
f.forEach(c=>{h+=`<td style="text-align:center"><div style="width:18px;height:18px;border-radius:3px;margin:0 auto;display:flex;align-items:center;justify-content:center;background:${c.p[p.k]?"rgba(16,185,129,0.15)":"rgba(100,116,139,0.06)"};color:${c.p[p.k]?"#10b981":"#475569"};font-size:11px;font-weight:600">${c.p[p.k]?"✓":"—"}</div></td>`});
const fc=p.f==="Always"?"#10b981":p.f==="Sometimes"?"#f59e0b":"#ef4444";
const fb=p.f==="Always"?"rgba(16,185,129,0.15)":p.f==="Sometimes"?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.1)";
h+=`<td style="text-align:center"><span class="tag mono" style="background:${fb};color:${fc}">${p.f}</span></td></tr>`;
});
h+=`</tbody></table></div>`;
}

// ── HISTORY VIEW ──
if(st.view==="history"&&!det){
const repHist=history.map(w=>{const rh=w.reps.find(r=>r.id===st.rep);return rh?{weekOf:w.weekOf,...rh}:null}).filter(Boolean);
if(history.length<3){
h+=`<div class="card" style="text-align:center;padding:40px 20px">`;
h+=`<div style="font-size:48px;margin-bottom:12px;opacity:0.3">📊</div>`;
h+=`<div style="font-size:16px;font-weight:600;color:#64748b;margin-bottom:6px">Collecting History</div>`;
h+=`<div style="font-size:12px;color:#475569;line-height:1.6">Score trends and weekly coaching will appear here after 3 weeks of data.<br>`;
h+=`<span style="color:#3b82f6;font-weight:600">${history.length}/3 weeks</span> collected so far.</div>`;
h+=`<div style="margin-top:16px;display:flex;gap:6px;justify-content:center">`;
for(let i=0;i<3;i++){
h+=`<div style="width:32px;height:32px;border-radius:6px;border:2px solid ${i<history.length?"#10b981":"#1e293b"};background:${i<history.length?"rgba(16,185,129,0.1)":"transparent"};display:flex;align-items:center;justify-content:center;font-size:11px;color:${i<history.length?"#10b981":"#475569"}">${i<history.length?"✓":i+1}</div>`;
}
h+=`</div></div>`;
} else {
// Score trend table
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">SCORE TREND — ${rd.name}</div>`;
h+=`<table><thead><tr><th>Week</th><th style="text-align:center">Avg</th><th style="text-align:center">Calls</th>`;
DK.forEach(d=>{h+=`<th style="text-align:center">${DL[d].slice(0,3)}</th>`});
h+=`</tr></thead><tbody>`;
repHist.forEach(w=>{
h+=`<tr><td class="mono" style="color:#94a3b8;font-size:10px">${w.weekOf}</td>`;
h+=`<td style="text-align:center;font-weight:700;color:${sc(w.avg)}">${w.avg}</td>`;
h+=`<td style="text-align:center;color:#8b5cf6">${w.n}</td>`;
DK.forEach(d=>{
const v=w.scores[d];
h+=`<td style="text-align:center;color:${v>=8?"#10b981":v>=7?"#3b82f6":"#f59e0b"}">${v.toFixed(1)}</td>`;
});
h+=`</tr>`;
});
h+=`</tbody></table></div>`;

// Visual trend bars
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">WEEKLY TREND</div>`;
h+=`<div style="display:flex;align-items:end;gap:8px;height:60px;padding:0 4px">`;
repHist.forEach((w,i)=>{
const pct=Math.max(((w.avg-5)/5)*100,5);
h+=`<div style="flex:1;text-align:center"><div style="height:${pct}%;background:${sc(w.avg)};border-radius:3px 3px 0 0;min-height:8px;margin:0 auto;max-width:40px;position:relative">`;
h+=`<div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:${sc(w.avg)}">${w.avg}</div>`;
h+=`</div><div class="mono" style="font-size:8px;color:#475569;margin-top:4px">${w.weekOf.slice(5)}</div></div>`;
});
h+=`</div></div>`;

// Weekly coaching history
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">COACHING HISTORY — ${rd.name}</div>`;
repHist.slice().reverse().forEach(w=>{
h+=`<div class="history-week"><div class="mono" style="font-size:10px;color:#64748b;margin-bottom:6px">Week of ${w.weekOf}</div>`;
h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px">`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#10b981;margin-bottom:2px">KEEP</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.keep}</div></div>`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#f59e0b;margin-bottom:2px">START</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.start}</div></div>`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#ef4444;margin-bottom:2px">STOP</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.stop}</div></div>`;
h+=`</div></div>`;
});
h+=`</div>`;
}
}

// ── CALL DETAIL VIEW ──
if(det){
h+=`<button class="vtab mono" onclick="st.sel=null;render()" style="margin-bottom:10px">← Back</button>`;
h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px"><div><h2 style="font-size:16px;font-weight:700"><a href="${det.url}" target="_blank" style="color:#e2e8f0;text-decoration:none;border-bottom:1px solid #3b82f6;padding-bottom:1px;transition:color .15s" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#e2e8f0'">${det.title} ↗</a></h2><div style="font-size:11px;color:#64748b;margin-top:2px">${det.prospect} · ${det.date} · ${det.dur} · ${det.type}</div><div style="font-size:10px;color:#475569">Talk: <span style="color:${det.tr<=60?"#10b981":"#f59e0b"}">${det.tr}%</span></div></div><div style="text-align:center"><div style="font-size:28px;font-weight:700;color:${sc(det.w)}">${det.w}</div><div class="mono" style="font-size:9px;color:#475569">WEIGHTED</div></div></div>`;
DK.forEach(d=>{
const s=det.s[d];const bg=sc(s);
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0"><span style="font-size:11px;color:#94a3b8;min-width:110px">${DL[d]} <span style="color:#475569;font-size:9px">(${DW[d]})</span></span><div style="display:flex;align-items:center;gap:6px"><div class="bar"><div class="fill" style="width:${s*10}%;background:${bg}"></div></div><span style="font-size:11px;font-weight:600;color:${bg};min-width:20px">${s}</span></div></div>`;
});
h+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px">`;
PK.forEach(k=>{h+=`<div class="tag mono" style="background:${det.p[k]?"rgba(16,185,129,0.12)":"rgba(100,116,139,0.06)"};color:${det.p[k]?"#10b981":"#475569"};border:1px solid ${det.p[k]?"rgba(16,185,129,0.25)":"#1e293b"}">${k} <span style="font-size:8px;font-weight:400">${PL[k]}</span></div>`});
h+=`</div>`;
if(det.keyAreas&&det.keyAreas.length){h+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">`;const ac={Retention:"#10b981",Expansion:"#3b82f6",Advocacy:"#8b5cf6"};det.keyAreas.forEach(a=>{h+=`<span class="tag" style="background:${ac[a]||"#475569"}22;color:${ac[a]||"#475569"};border:1px solid ${ac[a]||"#475569"}44;font-size:10px">${a}</span>`});h+=`</div>`}
if(det.ml){const mlc=det.ml.includes("Senior")?"#10b981":det.ml.includes("II")?"#3b82f6":"#8b5cf6";h+=`<div style="margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="tag mono" style="background:${mlc}18;color:${mlc};border:1px solid ${mlc}33;font-size:10px;font-weight:600">${det.ml}</span>`;if(det.mls){h+=`<span style="font-size:11px;color:#64748b;font-style:italic">${det.mls}</span>`}h+=`</div>`}
h+=`</div>`;
h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0" class="detail-grid">`;
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:6px">STRENGTHS</div>`;
det.str.forEach(s=>{h+=`<div class="strength">${s}</div>`});
h+=`</div><div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:6px">OPPORTUNITIES</div>`;
det.opp.forEach(o=>{h+=`<div class="opp">${o}</div>`});
h+=`</div></div>`;
if(det.coach){h+=`<div class="card" style="border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:6px">COACHING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${det.coach}</div></div>`}
if(det.prep&&det.prep.length){h+=`<div class="card" style="border-left:3px solid #10b981"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:8px">NEXT CALL PREP</div>`;det.prep.forEach((p,i)=>{h+=`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:${i<det.prep.length-1?8:0}px"><div style="min-width:18px;height:18px;border-radius:4px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);display:flex;align-items:center;justify-content:center;font-size:9px;color:#10b981;font-weight:600">${i+1}</div><div style="font-size:12px;color:#94a3b8;line-height:1.5">${p}</div></div>`});h+=`</div>`}
if(det.q){h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:4px">KEY QUOTE</div><div style="font-size:13px;color:#e2e8f0;font-style:italic;border-left:3px solid #8b5cf6;padding-left:10px">"${det.q}"${det.qt?` <span class="mono" style="font-size:9px;color:#475569;font-style:normal">${det.qt}</span>`:""}</div></div>`}
h+=`<a href="${det.url}" target="_blank" class="mono" style="font-size:10px;display:inline-block;margin-top:8px">View in Gong →</a>`;
}

h+=`<div style="margin-top:20px;text-align:center;font-size:9px;color:#1e293b" class="mono">AM Scorecard v1.1 · RQ 20% · CD 25% · VD 25% · SA 20% · CE 10% · ${calls.length} calls · ${reps.length} reps</div>`;
el.innerHTML=h;
}
render();
</script>
</div><!-- end dashboard-content -->
<script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}
function authCheck(){
  var e=document.getElementById('auth-email').value.trim().toLowerCase();
  if(e.endsWith('@ocrolus.com')){
    localStorage.setItem('am-scorecard-auth',e);
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(e,'login');
  } else {
    document.getElementById('auth-error').style.display='block';
  }
}
(function(){
  var saved=localStorage.getItem('am-scorecard-auth');
  if(saved && saved.endsWith('@ocrolus.com')){
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(saved,'return_visit');
  }
})();
</script>
</body>
